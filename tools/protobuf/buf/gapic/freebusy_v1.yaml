type: google.api.Service
config_version: 3
name: freebusy.ohtarnished.dev
title: FreeBusy API

apis:
  - name: freebusy.availability.v1.AvailabilityService
  - name: freebusy.booking.v1.BookingService
  - name: freebusy.organisation.v1.OrganisationService
  - name: freebusy.identity.v1.IdentityService
  - name: freebusy.resource.v1.ResourceService
  - name: freebusy.promocode.v1.PromoCodeService
  - name: freebusy.schedule.v1.ScheduleService

documentation:
  summary: |-
    Scheduling, booking and availability APIs for the FreeBusy platform.

# OAuth scopes / auth requirements for the generated clients. Adjust to match
# how freebusy.ohtarnished.dev actually authenticates callers.
authentication:
  rules:
    - selector: "freebusy.availability.v1.AvailabilityService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.booking.v1.BookingService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.organisation.v1.OrganisationService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.identity.v1.IdentityService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.resource.v1.ResourceService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.promocode.v1.PromoCodeService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
    - selector: "freebusy.schedule.v1.ScheduleService.*"
      oauth:
        canonical_scopes: "https://freebusy.ohtarnished.dev/auth/freebusy"
