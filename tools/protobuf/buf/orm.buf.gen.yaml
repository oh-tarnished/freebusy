version: v2
clean: true
managed:
  enabled: true
inputs:
  - directory: protobuf

plugins:
  # strategy: all is required — orm must see every proto file in one
  # invocation to resolve cross-service references and to merge each service's
  # tables into the single `freebusy` database. With buf's default
  # (strategy: directory) the plugin runs once per folder: cross-service FKs
  # degrade to soft FKs and GORM's per-schema models.go files collide and are
  # dropped. config= maps packages to the freebusy DB + per-service schemas.
  - local: protoc-gen-orm
    out: protobuf/generated/prisma
    strategy: all
    opt:
      - target=prisma
      - config=tools/protobuf/buf/config/orm.yaml
  - local: protoc-gen-orm
    out: ./internal/database/gorm
    strategy: all
    opt:
      - target=gorm
      - stores=true
      # Proto↔model converters (<Model>ToProto/<Model>FromProto + enum value
      # mappers) per schema package — the mechanical field mass the app's
      # per-service convert.go files otherwise hand-write.
      - converters=true
      # Import path of the gorm output dir (module path + out). The generated
      # stores import the shared gormx runtime package by this path, so it MUST
      # match the `out` dir above (internal/database/) — otherwise the
      # stores import gormx/common/shared paths that don't exist on disk.
      - go_module=github.com/oh-tarnished/freebusy/internal/database/gorm
      - config=tools/protobuf/buf/config/orm.yaml
      - otel=true
      # AIP-160 filter / AIP-132 order_by specs per schema + the shared filterx
      # engines (backend-neutral core, gorm + hasura engines) — one Spec drives
      # both providers' filter/order/List paths.
      - filters=true
      # Emit the pulse-go Observer adapter so repositories can trace/log the
      # generated list engines through shared.Pulse.
      - pulse=true
  # Proto-facing repository layer: provider-agnostic CRUD interfaces per
  # resource plus BOTH adapters — GORM (composing the generated models,
  # stores, converters, and filterx specs from gorm_module) and GraphQL
  # (composing the freebusyql client from graphql_module, with generated
  # proto↔row converters in protobuf.go). New(conn) picks the adapter from
  # the live handle: production runs hasura, open source runs gorm.
  - local: protoc-gen-orm
    out: ./internal/database/repository
    strategy: all
    opt:
      - target=repository
      - config=tools/protobuf/buf/config/orm.yaml
      - go_module=github.com/oh-tarnished/freebusy/internal/database/repository
      - gorm_module=github.com/oh-tarnished/freebusy/internal/database/gorm
      - graphql_module=github.com/oh-tarnished/freebusy/internal/database/hasura/freebusyql
  # Typed Hasura/DDN GraphQL client (freebusyql), generated by orm directly —
  # no separate generateql tool. The target introspects the engine named in the
  # config's graphql: block (the local DDN engine must be running; rebuild its
  # metadata first via `just hasura regen` after a schema change) and emits the
  # client under <out>/freebusyql. strategy: all — one invocation, not one per
  # proto directory (the target reads the endpoint, not the protos).
  - local: protoc-gen-orm
    out: ./internal/database/hasura
    strategy: all
    opt:
      - target=graphql
      - config=tools/protobuf/buf/config/orm.yaml
