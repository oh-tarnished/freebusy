# Base skeleton for the merged OpenAPI spec: everything that is fixed rather than
# derived from the per-service specs. Key order here is the output order.
# Embedded into the openapi tool (see main.go); override with `-base <file>`.
openapi: 3.0.0
info:
  title: FreeBusy API
  summary: Scheduling, availability, and booking platform API.
  description: |-
    FreeBusy is a scheduling platform that exposes resources, schedules, availability windows, bookings, organisations, and promotional codes over a RESTful, OpenAPI-described surface. This document is generated from Protocol Buffer service definitions and merged into a single specification.

    Authentication is performed via bearer tokens unless otherwise noted. All timestamps are RFC 3339 and all monetary amounts follow the associated currency's minor units.
  version: 1.0.0
  termsOfService: https://freebusy.oh-tarnished.dev/terms
  contact:
    name: FreeBusy API Support
    url: https://freebusy.oh-tarnished.dev/support
    email: support@oh-tarnished.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: FreeBusy API documentation
  url: https://freebusy.oh-tarnished.dev/docs
servers:
  - url: https://freebusy.oh-tarnished.dev
    description: Production
  - url: https://staging.freebusy.oh-tarnished.dev
    description: Staging
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Availability Service
  - name: Booking Service
  - name: Channel Service
  - name: Identity Service
  - name: Licence Service
  - name: Organisation Service
  - name: Promo Code Service
  - name: Property Service
  - name: Resource Service
  - name: Schedule Service
paths:
  /v1/properties/{property}/units/{unit}:checkAvailability:
    post:
      tags:
        - Availability Service
      description: Tests whether one exact span is bookable.
      operationId: AvailabilityService_CheckAvailability
      parameters:
        - name: property
          in: path
          description: The property id.
          required: true
          schema:
            type: string
        - name: unit
          in: path
          description: The unit id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAvailabilityRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Check Availability
  /v1/properties/{property}/units/{unit}:computeAvailability:
    post:
      tags:
        - Availability Service
      description: Computes availability for a unit over a window.
      operationId: AvailabilityService_ComputeAvailability
      parameters:
        - name: property
          in: path
          description: The property id.
          required: true
          schema:
            type: string
        - name: unit
          in: path
          description: The unit id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeAvailabilityRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Compute Availability
  /v1/properties/{property}/units/{unit}:computeBookableRanges:
    post:
      tags:
        - Availability Service
      description: Computes contiguous bookable ranges within a window.
      operationId: AvailabilityService_ComputeBookableRanges
      parameters:
        - name: property
          in: path
          description: The property id.
          required: true
          schema:
            type: string
        - name: unit
          in: path
          description: The unit id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeBookableRangesRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeBookableRangesResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Compute Bookable Ranges
  /v1/units:batchCompute:
    post:
      tags:
        - Availability Service
      description: Computes availability for several units at once.
      operationId: AvailabilityService_BatchComputeAvailability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchComputeAvailabilityRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchComputeAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Batch Compute Availability
  /v1/units:searchAvailability:
    post:
      tags:
        - Availability Service
      description: Searches the catalog for units bookable over a period.
      operationId: AvailabilityService_SearchAvailability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAvailabilityRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Search Availability
  /v1/bookings:
    get:
      tags:
        - Booking Service
      description: Lists bookings.
      operationId: BookingService_ListBookings
      parameters:
        - name: pageSize
          in: query
          description: Maximum number of bookings to return. The server may cap this.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Page token from a previous ListBookings call's next_page_token.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Filter expression (AIP-160), e.g. `unit = "properties/9/units/42"`,
             `customer = "users/7"`, `state = CONFIRMED`, or a window overlap predicate.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Sort order, e.g. "create_time desc" or "window.start_time".
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBookingsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Bookings
    post:
      tags:
        - Booking Service
      description: Creates a booking, placing a hold.
      operationId: BookingService_CreateBooking
      parameters:
        - name: requestId
          in: query
          description: |-
            Caller-supplied idempotency key that dedupes retries of this create. Reusing
             an id returns the booking created by the first call.
          schema:
            type: string
        - name: bookingId
          in: query
          description: Optional caller-chosen ID for the booking; the server generates one if unset.
          schema:
            type: string
        - name: validateOnly
          in: query
          description: |-
            If true, validate the request (availability + policy) and report what would
             happen, but place no hold.
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Booking
  /v1/bookings/{booking}:
    get:
      tags:
        - Booking Service
      description: Gets a single booking.
      operationId: BookingService_GetBooking
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Booking
  /v1/bookings/{booking}/guests:
    get:
      tags:
        - Booking Service
      description: Gets the staying party (guests and occupancy) on a booking.
      operationId: BookingService_GetBookingGuests
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingGuests'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Booking Guests
    patch:
      tags:
        - Booking Service
      description: Replaces the staying party (guests and occupancy) on a booking.
      operationId: BookingService_UpdateBookingGuests
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: Fields to overwrite. Omit to replace both guests and occupancy.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingGuests'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingGuests'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Booking Guests
  /v1/bookings/{booking}:cancel:
    post:
      tags:
        - Booking Service
      description: Cancels a booking.
      operationId: BookingService_CancelBooking
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelBookingRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Cancel Booking
  /v1/bookings/{booking}:confirm:
    post:
      tags:
        - Booking Service
      description: Confirms a held booking.
      operationId: BookingService_ConfirmBooking
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBookingRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Confirm Booking
  /v1/bookings/{booking}:previewCancellation:
    post:
      tags:
        - Booking Service
      description: Previews the refund a cancellation would yield now, without cancelling.
      operationId: BookingService_PreviewCancellation
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewCancellationRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewCancellationResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Preview Cancellation
  /v1/bookings/{booking}:reschedule:
    post:
      tags:
        - Booking Service
      description: Reschedules a booking to a new span.
      operationId: BookingService_RescheduleBooking
      parameters:
        - name: booking
          in: path
          description: The booking id.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RescheduleBookingRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Reschedule Booking
  /v1/channels:
    get:
      tags:
        - Channel Service
      description: Lists channels.
      operationId: ChannelService_ListChannels
      parameters:
        - name: pageSize
          in: query
          description: Maximum number of channels to return. The server may cap this.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Page token from a previous ListChannels call's next_page_token.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Filter expression (AIP-160), e.g. `property = "properties/9"`,
             `type = CHANNEL_TYPE_AGODA`, or `state = CHANNEL_STATE_CONNECTED`.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Sort order, e.g. "create_time desc".
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListChannelsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Channels
    post:
      tags:
        - Channel Service
      description: Creates a channel connection for a property.
      operationId: ChannelService_CreateChannel
      parameters:
        - name: channelId
          in: query
          description: Optional caller-chosen ID for the channel; the server generates one if unset.
          schema:
            type: string
        - name: requestId
          in: query
          description: Caller-supplied idempotency key; identical retries return the first result.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Channel
  /v1/channels/{channel}:
    get:
      tags:
        - Channel Service
      description: Gets a single channel.
      operationId: ChannelService_GetChannel
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Channel
    delete:
      tags:
        - Channel Service
      description: Deletes a channel connection.
      operationId: ChannelService_DeleteChannel
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: |-
            If true, delete the channel and its unit mappings; if false and mappings
             exist, the call fails.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Channel
    patch:
      tags:
        - Channel Service
      description: Updates a channel.
      operationId: ChannelService_UpdateChannel
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: updateMask
          in: query
          description: Fields to overwrite. Omit to replace all mutable fields.
          schema:
            type: string
            format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Channel
  /v1/channels/{channel}/syncEvents:
    get:
      tags:
        - Channel Service
      description: Lists a channel's sync events.
      operationId: ChannelService_ListSyncEvents
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: Maximum number of events to return.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Page token from a previous ListSyncEvents call's next_page_token.
          schema:
            type: string
        - name: filter
          in: query
          description: |-
            Filter expression (AIP-160), e.g. `direction = SYNC_DIRECTION_OUTBOUND`,
             `state = SYNC_STATE_FAILED`.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Sort order, e.g. "event_time desc".
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSyncEventsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Sync Events
  /v1/channels/{channel}/syncStatus:
    get:
      tags:
        - Channel Service
      description: Reports a channel's sync health.
      operationId: ChannelService_GetChannelSyncStatus
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelSyncStatus'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Channel Sync Status
  /v1/channels/{channel}/unitMappings:
    get:
      tags:
        - Channel Service
      description: Lists the unit mappings on a channel.
      operationId: ChannelService_ListUnitMappings
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: Maximum number of mappings to return.
          schema:
            type: integer
            format: int32
        - name: pageToken
          in: query
          description: Page token from a previous ListUnitMappings call's next_page_token.
          schema:
            type: string
        - name: filter
          in: query
          description: Filter expression (AIP-160), e.g. `state = MAPPING_STATE_UNMAPPED`.
          schema:
            type: string
        - name: orderBy
          in: query
          description: Sort order.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUnitMappingsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Unit Mappings
    post:
      tags:
        - Channel Service
      description: Maps a unit to the channel's external room type / rate plan.
      operationId: ChannelService_CreateUnitMapping
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: unitMappingId
          in: query
          description: Optional caller-chosen ID for the mapping; the server generates one if unset.
          schema:
            type: string
        - name: requestId
          in: query
          description: Caller-supplied idempotency key; identical retries return the first result.
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitMapping'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitMapping'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Unit Mapping
  /v1/channels/{channel}/unitMappings/{unitMapping}:
    get:
      tags:
        - Channel Service
      description: Gets a single unit mapping.
      operationId: ChannelService_GetUnitMapping
      parameters:
        - name: channel
          in: path
          description: The channel id.
          required: true
          schema:
            type: string
        - name: unitMapping
          in: path
          description: The unitMapping id.
          required: true
