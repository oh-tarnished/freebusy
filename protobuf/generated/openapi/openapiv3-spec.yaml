components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication using a JWT access token.
  schemas:
    AvailabilityMatch:
      type: object
      properties:
        resource:
          type: string
          description: "The matching resource.\n Format: resources/{resource}"
        displayName:
          type: string
          description: Cached display name of the resource, for convenience.
        mode:
          type: integer
          description: The resource's booking mode.
          format: enum
        bookable:
          type: boolean
          description: Whether the resource is bookable for the requested period and
            units.
        price:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: "Lead price for the requested period: the stay total for NIGHTLY,\
            \ or the slot\n price for TIME_SLOT. Used for sorting and display."
      description: "One resource matched by SearchAvailability, with a lead price\
        \ for the period.\n Detailed slots/nights are fetched per resource via ComputeAvailability."
    BatchComputeAvailabilityRequest:
      required:
      - requests
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/ComputeAvailabilityRequest'
          description: The individual compute requests. Results are returned in the
            same order.
      description: "Request message for BatchComputeAvailability. Each entry is a\
        \ full\n ComputeAvailabilityRequest (AIP-231), so per-resource duration, offering,\n\
        \ and units all work in batch exactly as they do in the single call."
    BatchComputeAvailabilityResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceAvailability'
          description: Availability per request, in request order.
      description: Response message for BatchComputeAvailability.
    BookableRange:
      type: object
      properties:
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: The bookable span.
        bookable:
          type: boolean
          description: Whether the whole span is bookable.
      description: A contiguous span that is bookable end to end.
    CheckAvailabilityRequest:
      required:
      - resource
      type: object
      properties:
        resource:
          type: string
          description: "The resource to test.\n Format: resources/{resource}"
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT resources.
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "A calendar-date range in the resource's timezone, the natural\
            \ form for\n NIGHTLY stays; end_date is the check-out date."
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
        offering:
          type: string
          description: "Offering whose duration/rules apply, when relevant.\n Format:\
            \ resources/{resource}/offerings/{offering}"
      description: Request message for CheckAvailability.
    CheckAvailabilityResponse:
      type: object
      properties:
        bookable:
          type: boolean
          description: Whether the span is bookable.
        freeCount:
          type: integer
          description: Free units across the span (the minimum over the span).
          format: int32
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/UnbookableReason'
          description: Why the span is not bookable, when bookable is false.
      description: Response message for CheckAvailability.
    ComputeAvailabilityRequest:
      required:
      - resource
      type: object
      properties:
        resource:
          type: string
          description: "The resource to compute availability for.\n Format: resources/{resource}"
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT resources.
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "A calendar-date range in the resource's timezone, the natural\
            \ form for\n NIGHTLY resources; end_date is the check-out date."
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: "Slot length for TIME_SLOT resources. Ignored when offering\
            \ is set or for\n NIGHTLY resources."
        offering:
          type: string
          description: "Offering to derive duration and price from. Takes precedence\
            \ over duration.\n Format: resources/{resource}/offerings/{offering}"
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
      description: Request message for ComputeAvailability.
    ComputeAvailabilityResponse:
      type: object
      properties:
        mode:
          type: integer
          description: Which shape is populated, matching the resource's booking_mode.
          format: enum
        slots:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
          description: Slots, when mode is TIME_SLOT.
        nights:
          type: array
          items:
            $ref: '#/components/schemas/NightAvailability'
          description: Per-night availability, when mode is NIGHTLY.
      description: Response message for ComputeAvailability.
    ComputeBookableRangesRequest:
      required:
      - resource
      type: object
      properties:
        resource:
          type: string
          description: "The resource to compute bookable ranges for.\n Format: resources/{resource}"
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT resources.
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "A calendar-date range in the resource's timezone, the natural\
            \ form for\n NIGHTLY resources."
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum span length for TIME_SLOT resources.
        offering:
          type: string
          description: "Offering to derive duration/rules from.\n Format: resources/{resource}/offerings/{offering}"
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
      description: Request message for ComputeBookableRanges.
    ComputeBookableRangesResponse:
      type: object
      properties:
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/BookableRange'
          description: The bookable ranges within the window.
      description: Response message for ComputeBookableRanges.
    DateRange:
      required:
      - startDate
      - endDate
      type: object
      properties:
        startDate:
          type: string
          description: Inclusive first date of the range.
          format: date
        endDate:
          type: string
          description: Exclusive end date of the range.
          format: date
      description: "A half-open range of calendar dates [start_date, end_date), evaluated\
        \ in the\n resource's local timezone. The natural query and exception shape\
        \ for NIGHTLY\n resources: end_date is the check-out date and is not itself\
        \ included."
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that
        describes the type of the serialized message.
    Money:
      type: object
      properties:
        currencyCode:
          type: string
          description: The three-letter currency code defined in ISO 4217.
        units:
          type: string
          description: "The whole units of the amount.\n For example if `currencyCode`\
            \ is `\"USD\"`, then 1 unit is one US dollar."
        nanos:
          type: integer
          description: "Number of nano (10^-9) units of the amount.\n The value must\
            \ be between -999,999,999 and +999,999,999 inclusive.\n If `units` is\
            \ positive, `nanos` must be positive or zero.\n If `units` is zero, `nanos`\
            \ can be positive, zero, or negative.\n If `units` is negative, `nanos`\
            \ must be negative or zero.\n For example $-1.75 is represented as `units`=-1\
            \ and `nanos`=-750,000,000."
          format: int32
      description: Represents an amount of money with its currency type.
    NightAvailability:
      type: object
      properties:
        night:
          type: string
          description: The night, in the resource's local timezone.
          format: date
        freeUnits:
          type: integer
          description: Number of units of the pool free that night.
          format: int32
        closed:
          type: boolean
          description: Whether the resource is closed that night (exception/blackout).
        price:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Nightly price, when an offering was supplied.
      description: Per-night availability, produced for NIGHTLY resources.
    ResourceAvailability:
      type: object
      properties:
        resource:
          type: string
          description: "The resource these results are for.\n Format: resources/{resource}"
        mode:
          type: integer
          description: Which shape is populated, matching the resource's booking_mode.
          format: enum
        slots:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
          description: Slots, when mode is TIME_SLOT.
        nights:
          type: array
          items:
            $ref: '#/components/schemas/NightAvailability'
          description: Per-night availability, when mode is NIGHTLY.
      description: Availability for one resource, used in batch responses.
    SearchAvailabilityRequest:
      type: object
      properties:
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT resources.
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "A calendar-date range in each resource's timezone, the natural\
            \ form for\n NIGHTLY resources; end_date is the check-out date."
        units:
          type: integer
          description: Number of units / party size required free. Defaults to 1.
          format: int32
        filter:
          type: string
          description: "Filter (AIP-160) over resource fields to narrow the catalog,\
            \ e.g.\n `type = RESOURCE_TYPE_ROOM`, `tags:\"beachfront\"`, or a display_name\
            \ match."
        orderBy:
          type: string
          description: "Sort order for matches, e.g. \"price\" or \"price desc\".\
            \ Defaults to price\n ascending."
        pageSize:
          type: integer
          description: Maximum number of matches to return. The server may cap this.
          format: int32
        pageToken:
          type: string
          description: Page token from a previous SearchAvailability call's next_page_token.
        includeUnavailable:
          type: boolean
          description: "If true, include resources that matched the filter but are\
            \ not bookable for\n the period (with bookable=false), instead of dropping\
            \ them."
      description: "Request message for SearchAvailability. Sweeps the catalog for\
        \ resources that\n are bookable over a period for a given party size, narrowed\
        \ by a resource\n filter and sorted for presentation. This is the storefront\
        \ query: one call\n returns the matching resources with a lead price, rather\
        \ than the caller\n listing resources and computing availability for each."
    SearchAvailabilityResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityMatch'
          description: The matching resources, ordered per order_by.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for SearchAvailability.
    Slot:
      type: object
      properties:
        startTime:
          type: string
          description: Inclusive start of the slot.
          format: date-time
        endTime:
          type: string
          description: Exclusive end of the slot (start + offering/requested duration).
          format: date-time
        freeCount:
          type: integer
          description: Number of units free in this slot (capacity minus overlapping
            bookings).
          format: int32
        bookable:
          type: boolean
          description: Whether the slot can actually be booked (free and passes policy).
        price:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Price for booking this slot, when an offering was supplied.
      description: A discrete bookable time slot, produced for TIME_SLOT resources.
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English.
            Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details]
            field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is
            a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable
        for different programming environments, including REST APIs and RPC APIs.
        It is used by [gRPC](https://github.com/grpc). Each `Status` message contains
        three pieces of data: error code, error message, and error details. You can
        find out more about this error model and how to work with it in the [API Design
        Guide](https://cloud.google.com/apis/design/errors).'
    TimeWindow:
      required:
      - startTime
      - endTime
      type: object
      properties:
        startTime:
          type: string
          description: Inclusive start of the interval.
          format: date-time
        endTime:
          type: string
          description: Exclusive end of the interval.
          format: date-time
      description: "A half-open time interval [start_time, end_time). Used for query\
        \ windows and\n for a booking's reserved span in both TIME_SLOT and NIGHTLY\
        \ modes."
    UnbookableReason:
      type: object
      properties:
        code:
          type: integer
          description: Why the span is not bookable.
          format: enum
        message:
          type: string
          description: Human-readable explanation suitable for display, not for parsing.
      description: "A reason a span is not bookable, as a machine-readable code plus\
        \ a\n human-readable explanation. Clients should branch on code, never on\
        \ message."
    Booking:
      required:
      - resource
      - window
      type: object
      properties:
        name:
          type: string
          description: "The booking name.\n Format: bookings/{booking}"
        resource:
          type: string
          description: "The resource being booked.\n Format: resources/{resource}"
        offering:
          type: string
          description: "The offering being booked, when applicable.\n Format: resources/{resource}/offerings/{offering}"
        customer:
          type: string
          description: "The user the booking is for.\n Format: users/{user}"
        contact:
          allOf:
          - $ref: '#/components/schemas/Contact'
          description: "Contact details for the booker. Required when `customer` is\
            \ unset (a guest /\n walk-in booking); when `customer` is set these supplement\
            \ or override the\n user's profile contact for this booking."
        units:
          type: integer
          description: Number of units / party size reserved. Defaults to 1.
          format: int32
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: The reserved span. For NIGHTLY resources this spans check-in
            to check-out.
        assignedUnit:
          readOnly: true
          type: string
          description: Which specific unit of the pool was assigned (the shell's atomic
            pick).
        state:
          readOnly: true
          type: integer
          description: Current lifecycle state.
          format: enum
        holdExpireTime:
          readOnly: true
          type: string
          description: When the pending hold lapses, if not confirmed first.
          format: date-time
        price:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Computed subtotal before discounts.
        promoCode:
          type: string
          description: "The promo code to apply to this booking, set at creation,\
            \ if any.\n Format: promoCodes/{promo_code}"
        discount:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Discount applied from the promo code.
        total:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Final total after discounts.
        priceComponents:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/PriceComponent'
          description: "Itemized breakdown behind the total: the base charge, each\
            \ fee and tax, and\n each discount, as signed lines. `price` is the TYPE_BASE\
            \ subtotal and\n `total` is the sum of every component; these lines expose\
            \ the fees and taxes\n in between. Empty for simple bookings with no fees\
            \ or taxes configured."
        notes:
          type: string
          description: Free-form notes on the booking.
        attributes:
          type: object
          description: Arbitrary attributes.
        cancelReason:
          readOnly: true
          type: integer
          description: Why the booking was cancelled, when state is CANCELLED.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp (when the hold was placed).
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        confirmTime:
          readOnly: true
          type: string
          description: When the booking was confirmed, if at all.
          format: date-time
        cancelTime:
          readOnly: true
          type: string
          description: When the booking was cancelled, if at all.
          format: date-time
        refundAmount:
          readOnly: true
          allOf:
          - $ref: '#/components/schemas/Money'
          description: "Amount refunded on cancellation, computed from the resource's\
            \ cancellation\n policy and how far ahead of the booking start it was\
            \ cancelled. Set only\n once the booking is CANCELLED. Use PreviewCancellation\
            \ to see this before\n committing."
        refundPercent:
          readOnly: true
          type: integer
          description: Percentage of the total that `refund_amount` represents (0-100).
          format: int32
        holdTtl:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: "Requested time-to-live of the hold, set at creation. The server\
            \ caps this\n and reflects the effective expiry in hold_expire_time."
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: "A reservation against a resource. The hold lifecycle lives here\
        \ as states\n rather than a separate service: CreateBooking places a PENDING_HOLD,\n\
        \ confirmation flips it to CONFIRMED, and an internal sweeper expires holds\
        \ that\n are never confirmed."
    CancelBookingRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: "The booking to cancel.\n Format: bookings/{booking}"
        reason:
          type: integer
          description: Why the booking is being cancelled.
          format: enum
        note:
          type: string
          description: Free-form note explaining the cancellation.
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the
            first result.
      description: Request message for CancelBooking.
    ConfirmBookingRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: "The booking to confirm.\n Format: bookings/{booking}"
        paymentRef:
          type: string
          description: Opaque reference to the payment/settlement that confirmed this
            booking.
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the
            first result.
      description: "Request message for ConfirmBooking. Confirmation normally arrives\
        \ via the\n payment webhook rather than a direct client call; either way it\
        \ flips a\n PENDING_HOLD to CONFIRMED."
    Contact:
      type: object
      properties:
        displayName:
          type: string
          description: Full name of the guest.
        email:
          type: string
          description: Email address for the confirmation and any follow-ups.
        phoneNumber:
          type: string
          description: Phone number in E.164 form (e.g. "+14155552671").
      description: "Contact details for the person a booking is for. When a booking\
        \ carries a\n `customer` (a users/{user} reference) these typically mirror\
        \ the user's\n profile; for walk-in or email-only bookings made by someone\
        \ who is not a\n registered user, this is the only contact information captured.\
        \ The server\n requires at least one reachable channel (email or phone) when\
        \ no customer is\n set."
    ListBookingsResponse:
      type: object
      properties:
        bookings:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
          description: The page of bookings.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for ListBookings.
    PreviewCancellationRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: "The booking to preview a cancellation for.\n Format: bookings/{booking}"
      description: "Request message for PreviewCancellation. Computes the refund a\
        \ cancellation\n would yield right now, under the resource's cancellation\
        \ policy, without\n cancelling the booking."
    PreviewCancellationResponse:
      type: object
      properties:
        refundable:
          type: boolean
          description: Whether cancelling now would refund anything.
        refundPercent:
          type: integer
          description: Percentage of the total that would be refunded (0-100).
          format: int32
        refundAmount:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Amount that would be refunded now.
        nonRefundableAmount:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Amount that would be retained (total minus refund_amount).
        policySummary:
          type: string
          description: Human-readable summary of the policy tier that applied, for
            display.
      description: Response message for PreviewCancellation.
    PriceComponent:
      type: object
      properties:
        type:
          type: integer
          description: Which kind of line this is.
          format: enum
        code:
          type: string
          description: "Stable machine code for the line, e.g. \"base\", \"cleaning_fee\"\
            ,\n \"occupancy_tax\", or a promo code. Clients key display and logic\
            \ off this."
        displayName:
          type: string
          description: Human-readable label suitable for display on an itemized receipt.
        amount:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: "Signed amount: positive for charges (base, fees, taxes), negative\
            \ for\n discounts. Summing every component yields the booking total."
      description: "One line in a price breakdown: a base charge, a fee, a tax, or\
        \ a discount.\n Clients branch on `type` and `code`; the signed `amount` rolls\
        \ up to the\n booking total (charges positive, discounts negative)."
    RescheduleBookingRequest:
      required:
      - name
      - window
      type: object
      properties:
        name:
          type: string
          description: "The booking to reschedule.\n Format: bookings/{booking}"
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: The new reserved span.
        offering:
          type: string
          description: "The new offering, when changing it as part of the reschedule.\n\
            \ Format: resources/{resource}/offerings/{offering}"
        requestId:
          type: string
          description: Caller-supplied idempotency key that dedupes retries of this
            reschedule.
      description: "Request message for RescheduleBooking. Atomically moves a booking\
        \ to a new\n span (and optionally offering), re-running availability and the\
        \ exclusion\n check on the new window."
    ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
          description: The page of users.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for ListUsers.
    MembershipSummary:
      type: object
      properties:
        organisation:
          readOnly: true
          type: string
          description: "The organisation.\n Format: organisations/{organisation}"
        orgDisplayName:
          readOnly: true
          type: string
          description: Cached display name of the organisation.
        role:
          readOnly: true
          type: string
          description: The user's role in the organisation (an OrganisationRole value
            name).
      description: A compact view of an organisation the user belongs to.
    User:
      type: object
      properties:
        name:
          type: string
          description: "The user name. The alias \"users/me\" resolves to the caller.\n\
            \ Format: users/{user}"
        email:
          readOnly: true
          type: string
          description: Email address, sourced from the IdP.
        displayName:
          type: string
          description: Display name.
        avatarUrl:
          type: string
          description: Avatar image URL.
        locale:
          type: string
          description: BCP 47 locale (e.g. "en-US").
        timeZone:
          type: string
          description: IANA time zone (e.g. "America/New_York").
        memberships:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/MembershipSummary'
          description: The organisations this user belongs to, with role.
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update.
      description: "A signed-in person. Identity is deliberately thin: actual login\
        \ is an OIDC\n redirect flow handled over plain HTTP by the IdP, so most of\
        \ \"auth\" never\n appears as an RPC. Email and identity come from the IdP\
        \ and are read-only\n here; only profile preferences are editable."
    InviteMemberRequest:
      required:
      - parent
      - email
      - role
      type: object
      properties:
        parent:
          type: string
          description: "The organisation to invite the member to.\n Format: organisations/{organisation}"
        email:
          type: string
          description: Email address to invite.
        role:
          type: integer
          description: Role to grant on acceptance.
          format: enum
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the
            first result.
      description: Request message for InviteMember.
    InviteMemberResponse:
      type: object
      properties:
        member:
          allOf:
          - $ref: '#/components/schemas/Member'
          description: The created member (in INVITED state).
      description: Response message for InviteMember.
    ListMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
          description: The page of members.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for ListMembers.
    ListOrganisationsResponse:
      type: object
      properties:
        organisations:
          type: array
          items:
            $ref: '#/components/schemas/Organisation'
          description: The page of organisations (those the caller belongs to).
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for ListOrganisations.
    Member:
      required:
      - email
      - role
      type: object
      properties:
        name:
          type: string
          description: "The member name.\n Format: organisations/{organisation}/members/{member}"
        user:
          readOnly: true
          type: string
          description: "The user, once the invite is accepted.\n Format: users/{user}"
        email:
          type: string
          description: The invited email address.
        displayName:
          readOnly: true
          type: string
          description: Cached display name of the member.
        role:
          type: integer
          description: The member's role in the organisation.
          format: enum
        state:
          readOnly: true
          type: integer
          description: Confirmation state of the membership.
          format: enum
        inviter:
          readOnly: true
          type: string
          description: "The user who issued the invite.\n Format: users/{user}"
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp (when the invite was created).
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: The membership of a user in an organisation, with their role.
    Organisation:
      required:
      - displayName
      type: object
      properties:
        name:
          type: string
          description: "The organisation name.\n Format: organisations/{organisation}"
        displayName:
          type: string
          description: Human-friendly organisation name (e.g. "Acme Inc.").
        slug:
          type: string
          description: URL-safe slug, unique across organisations.
        billingEmail:
          type: string
          description: Billing contact email.
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        settings:
          type: object
          description: Arbitrary organisation-level settings.
        memberCount:
          readOnly: true
          type: string
          description: Number of members across all states.
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: "A tenant. Organisation is the unit of multi-tenancy; the shell\
        \ enforces isolation\n with row-level security keyed off the caller's organisation,\
        \ so most resource names\n stay flat and the organisation appears explicitly\
        \ only here."
    ListPromoCodesResponse:
      type: object
      properties:
        promoCodes:
          type: array
          items:
            $ref: '#/components/schemas/PromoCode'
          description: The page of promo codes.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
      description: Response message for ListPromoCodes.
    PromoCode:
      required:
      - code
      - discountType
      type: object
      properties:
        name:
          type: string
          description: "The promo code name.\n Format: promoCodes/{promo_code}"
        code:
          type: string
          description: The human-entered code, unique across all promo codes (e.g.
            "SUMMER25").
        displayName:
          type: string
          description: Internal display name (not shown to customers).
        description:
          type: string
          description: Free-form description.
        discountType:
          type: integer
          description: Whether the discount is a percentage or a fixed amount.
          format: enum
        percentOff:
          type: integer
          description: Percentage off (1-100), when discount_type is PERCENTAGE.
          format: int32
        amountOff:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Fixed amount off, when discount_type is FIXED_AMOUNT.
        redeemStartTime:
          type: string
          description: Earliest the code can be redeemed. Unset means no lower bound.
          format: date-time
        redeemEndTime:
          type: string
          description: Latest the code can be redeemed. Unset means no upper bound.
          format: date-time
        maxRedemptions:
          type: string
          description: Maximum total redemptions across all customers. Zero means
            unlimited.
        perCustomerLimit:
          type: integer
          description: Maximum redemptions per customer. Zero means unlimited.
          format: int32
        minSubtotal:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Minimum subtotal required for the code to apply.
        applicableResources:
          type: array
          items:
            type: string
          description: "Resources the code applies to. Empty means all resources.\n\
            \ Format: resources/{resource}"
        applicableOfferings:
          type: array
          items:
            type: string
          description: "Offerings the code applies to. Empty means all offerings.\n\
            \ Format: resources/{resource}/offerings/{offering}"
        redemptionCount:
          readOnly: true
          type: string
          description: How many times the code has been redeemed.
        state:
          readOnly: true
          type: integer
          description: "Derived lifecycle state: ACTIVE, DISABLED (when `disabled`\
            \ is set), or\n EXPIRED (past the window or out of redemptions)."
          format: enum
        disabled:
          type: boolean
          description: If true, the code is manually disabled regardless of its window
            and caps.
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: "A redeemable discount applied to a booking's subtotal. Scoped\
        \ by a redemption\n window, usage caps, a minimum subtotal, and an optional\
        \ set of resources /\n offerings it applies to."
    ValidatePromoCodeRequest:
      required:
      - code
      - subtotal
      type: object
      properties:
        code:
          type: string
          description: The human-entered code to validate (e.g. "SUMMER25").
        subtotal:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Subtotal the discount would apply to.
        resource:
          type: string
          description: "Resource being booked, for scope checks.\n Format: resources/{resource}"
        offering:
          type: string
          description: "Offering being booked, for scope checks.\n Format: resources/{resource}/offerings/{offering}"
        customer:
          type: string
          description: "Customer redeeming the code, for per-customer limit checks.\n\
            \ Format: users/{user}"
      description: "Request message for ValidatePromoCode. Computes the discount a\
        \ code would\n apply to a prospective booking without redeeming it."
    ValidatePromoCodeResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the code is valid and applicable to the given context.
        reason:
          type: string
          description: Why the code is not valid, when valid is false.
        promoCode:
          type: string
          description: "The resolved promo code, when valid.\n Format: promoCodes/{promo_code}"
        discountAmount:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Discount the code applies to the subtotal.
        finalTotal:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Subtotal minus the discount.
      description: Response message for ValidatePromoCode.
    ArchiveResourceRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: "The resource to archive.\n Format: resources/{resource}"
      description: Request message for ArchiveResource.
    Fee:
      required:
      - code
      type: object
      properties:
        code:
          type: string
          description: Stable machine code, e.g. "cleaning_fee".
        displayName:
          type: string
          description: Human-readable label for receipts.
        amount:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Fixed fee amount, when charging a flat fee.
        percent:
          type: integer
          description: Percent of the base subtotal (1-100), when charging a proportional
            fee.
          format: int32
        pricingUnit:
          type: integer
          description: "What the fee is charged per (per booking, per night, per person).\
            \ Defaults\n to per booking."
          format: enum
        taxable:
          type: boolean
          description: Whether this fee is included in the taxable base.
      description: "A fee added on top of an offering's base subtotal. Exactly one\
        \ of `amount` or\n `percent` is set. Surfaces as a TYPE_FEE line in a booking's\
        \ price_components."
    ListOfferingsResponse:
      type: object
      properties:
        offerings:
          type: array
          items:
            $ref: '#/components/schemas/Offering'
          description: The page of offerings.
        nextPageToken:
          type: string
          description: next page token. Omitted if this is the last page.
      description: Response message for ListOfferings.
    ListResourcesResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
          description: The page of resources.
        nextPageToken:
          type: string
          description: Next page token, if more results remain. Omitted if this is
            the last page.
      description: Response message for ListResources.
    LosDiscount:
      required:
      - minNights
      type: object
      properties:
        minNights:
          type: integer
          description: Minimum nights for the discount to apply.
          format: int32
        percentOff:
          type: integer
          description: Percent off the subtotal (1-100), when discounting by percentage.
          format: int32
        amountOff:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Fixed amount off the subtotal, when discounting by a flat amount.
      description: "A discount applied to a NIGHTLY subtotal once the stay reaches\
        \ a minimum\n length. Exactly one of percent_off or amount_off is set."
    Offering:
      required:
      - displayName
      type: object
      properties:
        name:
          type: string
          description: "The offering name.\n Format: resources/{resource}/offerings/{offering}"
        displayName:
          type: string
          description: Human-friendly name (e.g. "30-min consult").
        description:
          type: string
          description: Free-form description.
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Slot length. Required for TIME_SLOT resources; ignored for
            NIGHTLY.
        price:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: Price charged for the offering, interpreted per pricing_unit.
        pricingUnit:
          type: integer
          description: What the price is charged per.
          format: enum
        rateOverrides:
          type: array
          items:
            $ref: '#/components/schemas/RateOverride'
          description: "Rate calendar: date- and weekday-scoped overrides of `price`.\
            \ For NIGHTLY\n resources this is the seasonal/weekend rate calendar;\
            \ for TIME_SLOT it\n varies slot price by date or day. `price` is the\
            \ default when no override\n matches. Later-listed overrides win where\
            \ they overlap."
        losDiscounts:
          type: array
          items:
            $ref: '#/components/schemas/LosDiscount'
          description: "Length-of-stay discounts applied to the NIGHTLY subtotal when\
            \ a stay is at\n least `min_nights` long. The most generous matching discount\
            \ applies."
        fees:
          type: array
          items:
            $ref: '#/components/schemas/Fee'
          description: "Fees added on top of the base subtotal (e.g. cleaning, service).\
            \ Each\n surfaces as a TYPE_FEE line in a booking's price_components."
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/Tax'
          description: "Taxes applied to the taxable base (subtotal plus taxable fees).\
            \ Each\n surfaces as a TYPE_TAX line in a booking's price_components."
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: "A specific way a resource can be booked, carrying its duration\
        \ and price. A\n \"30-min consult\" and a \"60-min session\" are two offerings\
        \ on the same\n provider. For NIGHTLY resources the duration is unused and\
        \ price is per-night."
    RateOverride:
      required:
      - price
      type: object
      properties:
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "Dates the override applies to, in the resource's timezone.\
            \ Unset means it\n applies on every date (a pure weekday rule)."
        weekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Weekdays the override applies to. Empty means every day within
            date_range.
        price:
          allOf:
          - $ref: '#/components/schemas/Money'
          description: The price in effect while this override matches.
      description: "A price override for a span of dates and/or specific weekdays,\
        \ layered over an\n offering's base `price`. The price is still interpreted\
        \ per the offering's\n pricing_unit (per night, per booking, per person)."
    Resource:
      required:
      - displayName
      - type
      - bookingMode
      - timeZone
      type: object
      properties:
        name:
          type: string
          description: "The resource name.\n Format: resources/{resource}"
        displayName:
          type: string
          description: 'Human-friendly name (e.g. "Dr. Lee", "Deluxe King", "Kayak
            #3").'
        description:
          type: string
          description: Free-form description.
        type:
          type: integer
          description: What kind of bookable thing this is.
          format: enum
        bookingMode:
          type: integer
          description: "How this resource is booked, and therefore the availability\
            \ shape it\n yields. Immutable: flipping it after bookings exist would\
            \ invalidate every\n existing booking and availability computation."
          format: enum
        capacity:
          type: integer
          description: Number of interchangeable units in the pool. Defaults to 1
            when unset.
          format: int32
        timeZone:
          type: string
          description: "IANA timezone (e.g. \"America/New_York\") the resource's hours\
            \ and dates are\n evaluated in. Required so availability is timezone-correct."
        tags:
          type: array
          items:
            type: string
          description: Arbitrary tags for grouping and filtering.
        attributes:
          type: object
          description: Arbitrary attributes used for templating, policy, and segmentation.
        offerings:
          readOnly: true
          type: array
          items:
            type: string
          description: "Resource names of the offerings attached to this resource\
            \ (e.g. \"30-min\n consult\"); manage them with the Offering standard\
            \ methods.\n Format: resources/{resource}/offerings/{offering}"
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
      description: "A bookable thing: a provider, room, piece of equipment, or a unit\
        \ type. A\n resource is a pool of `capacity` interchangeable units; the freebusy\
        \ engine\n computes how many are free for a given window. Its booking_mode\
        \ decides\n whether availability is produced as time slots or per-night counts."
    Tax:
      required:
      - code
      - percent
      type: object
      properties:
        code:
          type: string
          description: Stable machine code, e.g. "occupancy_tax" or "vat".
        displayName:
          type: string
          description: Human-readable label for receipts.
        percent:
          type: number
          description: Tax rate as a percentage, e.g. 8.5 for 8.5%.
          format: double
      description: "A tax applied to the taxable base (base subtotal plus taxable\
        \ fees). Surfaces\n as a TYPE_TAX line in a booking's price_components."
    UnarchiveResourceRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
          description: "The resource to restore to the active state.\n Format: resources/{resource}"
      description: Request message for UnarchiveResource.
    AvailabilityException:
      required:
      - kind
      type: object
      properties:
        name:
          type: string
          description: "The exception name.\n Format: resources/{resource}/availabilityExceptions/{availability_exception}"
        kind:
          type: integer
          description: Whether this span closes the resource or adds extra availability.
          format: enum
        window:
          allOf:
          - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT resources.
        dateRange:
          allOf:
          - $ref: '#/components/schemas/DateRange'
          description: "A range of whole calendar dates in the resource's timezone,\
            \ the natural\n form for NIGHTLY blackouts (e.g. \"closed Dec 24 through\
            \ Dec 26\")."
        reason:
          type: string
          description: Human-readable reason (e.g. "Public holiday").
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
      description: "An override of a resource's normal hours on a specific span: a\
        \ blackout /\n holiday closure, or extra hours beyond the recurring rules."
    BufferSettings:
      type: object
      properties:
        startDelta:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Prep time reserved before each booking.
        endDelta:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Turnover / cleaning time reserved after each booking.
        minNotice:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum lead time between now and a booking's start.
        maxAdvance:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: How far into the future bookings may be made.
        gap:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum gap enforced between two adjacent bookings.
      description: Buffer and notice settings applied around bookings.
    CancellationPolicy:
      type: object
      properties:
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/RefundTier'
          description: "Ordered refund tiers. For a given cancellation the tier with\
            \ the largest\n `cutoff` that is still satisfied (cancelled at least `cutoff`\
            \ before the\n booking start) determines the refund. If no tier is satisfied,\
            \ the booking\n is non-refundable."
      description: Refund rules graded by how far ahead of a booking's start it is
        cancelled.
    ListAvailabilityExceptionsResponse:
      type: object
      properties:
        availabilityExceptions:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityException'
          description: The page of exceptions.
        nextPageToken:
          type: string
          description: Token for the next page of results. Empty if there are no more
            pages.
      description: Response message for ListAvailabilityExceptions.
    RecurringRule:
      required:
      - rrule
      type: object
      properties:
        rrule:
          type: string
          description: RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
        opens:
          type: string
          description: "Local time-of-day the window opens, 24-hour \"HH:MM\" (e.g.\
            \ \"09:00\").\n Unset (with closes also unset) means open the whole day."
        closes:
          type: string
          description: "Local time-of-day the window closes, 24-hour \"HH:MM\" (e.g.\
            \ \"17:00\").\n A closes at or before opens means the span crosses midnight\
            \ into the next\n day (e.g. opens \"22:00\", closes \"02:00\")."
      description: "A recurring availability window expressed as an RRULE plus a daily\
        \ open span.\n The freebusy engine expands these against the resource's timezone."
    RefundTier:
      required:
      - cutoff
      - refundPercent
      type: object
      properties:
        cutoff:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum lead time before the booking start for this tier to
            apply (e.g. 48h).
        refundPercent:
          type: integer
          description: Percentage of the booking total refunded at this tier (0-100).
          format: int32
      description: "One tier of a CancellationPolicy: cancel at least `cutoff` before\
        \ the booking\n start to receive `refund_percent` of the total back."
    Schedule:
      type: object
      properties:
        name:
          type: string
          description: "The schedule name.\n Format: resources/{resource}/schedule"
        recurringRules:
          type: array
          items:
            $ref: '#/components/schemas/RecurringRule'
          description: Recurring working hours.
        buffers:
          allOf:
          - $ref: '#/components/schemas/BufferSettings'
          description: Buffer and notice settings.
        stayConstraints:
          allOf:
          - $ref: '#/components/schemas/StayConstraints'
          description: Stay rules (NIGHTLY resources).
        exceptions:
          readOnly: true
          type: array
          items:
            type: string
          description: "Resource names of the active exceptions; manage them with\
            \ the\n AvailabilityException standard methods.\n Format: resources/{resource}/availabilityExceptions/{availability_exception}"
        cancellationPolicy:
          allOf:
          - $ref: '#/components/schemas/CancellationPolicy'
          description: "Refund rules applied when a booking on this resource is cancelled.\
            \ Unset\n means cancellations are non-refundable by default."
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update.
      description: "Aggregate read view of a resource's availability configuration:\
        \ the inputs the\n freebusy engine consumes. Modeled as a singleton resource,\
        \ one per resource."
    StayConstraints:
      type: object
      properties:
        minNights:
          type: integer
          description: Minimum number of nights per booking.
          format: int32
        maxNights:
          type: integer
          description: Maximum number of nights per booking. Zero means no maximum.
          format: int32
        checkinWeekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Allowed check-in weekdays. Empty means any day.
        checkoutWeekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Allowed check-out weekdays. Empty means any day.
        advanceMinDays:
          type: integer
          description: Earliest a stay may begin, in days from now.
          format: int32
        advanceMaxDays:
          type: integer
          description: Latest a stay may begin, in days from now. Zero means no limit.
          format: int32
      description: Stay rules that affect bookability for NIGHTLY resources.
