openapi: 3.0.0
info:
  title: FreeBusy API
  summary: Scheduling, availability, and booking platform API.
  description: 'FreeBusy is a scheduling platform that exposes resources, schedules,
    availability windows, bookings, organisations, and promotional codes over a RESTful,
    OpenAPI-described surface. This document is generated from Protocol Buffer service
    definitions and merged into a single specification.
    Authentication is performed via bearer tokens unless otherwise noted. All timestamps
    are RFC 3339 and all monetary amounts follow the associated currency''s minor
    units.'
  version: 1.0.0
  termsOfService: https://freebusy.oh-tarnished.dev/terms
  contact:
    name: FreeBusy API Support
    url: https://freebusy.oh-tarnished.dev/support
    email: support@oh-tarnished.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: FreeBusy API documentation
  url: https://freebusy.oh-tarnished.dev/docs
servers:
- url: https://freebusy.oh-tarnished.dev
  description: Production
- url: https://staging.freebusy.oh-tarnished.dev
  description: Staging
- url: http://localhost:8080
  description: Local development
security:
- bearerAuth: []
tags:
- name: Availability Service
- name: Booking Service
- name: Identity Service
- name: Organisation Service
- name: Promo Code Service
- name: Resource Service
- name: Schedule Service
paths:
  /v1/resources/{resource}:checkAvailability:
    post:
      tags:
      - Availability Service
      description: Tests whether one exact span is bookable.
      operationId: AvailabilityService_CheckAvailability
      parameters:
      - name: resource
        in: path
        description: The resource id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckAvailabilityRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Check Availability
  /v1/resources/{resource}:computeAvailability:
    post:
      tags:
      - Availability Service
      description: Computes availability for a resource over a window.
      operationId: AvailabilityService_ComputeAvailability
      parameters:
      - name: resource
        in: path
        description: The resource id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeAvailabilityRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Compute Availability
  /v1/resources/{resource}:computeBookableRanges:
    post:
      tags:
      - Availability Service
      description: Computes contiguous bookable ranges within a window.
      operationId: AvailabilityService_ComputeBookableRanges
      parameters:
      - name: resource
        in: path
        description: The resource id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeBookableRangesRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeBookableRangesResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Compute Bookable Ranges
  /v1/resources:batchCompute:
    post:
      tags:
      - Availability Service
      description: Computes availability for several resources at once.
      operationId: AvailabilityService_BatchComputeAvailability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchComputeAvailabilityRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchComputeAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Batch Compute Availability
  /v1/resources:searchAvailability:
    post:
      tags:
      - Availability Service
      description: Searches the catalog for resources bookable over a period.
      operationId: AvailabilityService_SearchAvailability
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchAvailabilityRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchAvailabilityResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Search Availability
  /v1/bookings:
    get:
      tags:
      - Booking Service
      description: Lists bookings.
      operationId: BookingService_ListBookings
      parameters:
      - name: pageSize
        in: query
        description: Maximum number of bookings to return. The server may cap this.
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: Page token from a previous ListBookings call's next_page_token.
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression (AIP-160), e.g. `resource = \"resources/42\"\
          `,\n `customer = \"users/7\"`, `state = CONFIRMED`, or a window overlap\
          \ predicate."
        schema:
          type: string
      - name: orderBy
        in: query
        description: Sort order, e.g. "create_time desc" or "window.start_time".
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBookingsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Bookings
    post:
      tags:
      - Booking Service
      description: Creates a booking, placing a hold.
      operationId: BookingService_CreateBooking
      parameters:
      - name: requestId
        in: query
        description: "Caller-supplied idempotency key that dedupes retries of this\
          \ create. Reusing\n an id returns the booking created by the first call."
        schema:
          type: string
      - name: bookingId
        in: query
        description: Optional caller-chosen ID for the booking; the server generates
          one if unset.
        schema:
          type: string
      - name: validateOnly
        in: query
        description: "If true, validate the request (availability + policy) and report\
          \ what would\n happen, but place no hold."
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Booking
  /v1/bookings/{booking}:
    get:
      tags:
      - Booking Service
      description: Gets a single booking.
      operationId: BookingService_GetBooking
      parameters:
      - name: booking
        in: path
        description: The booking id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Booking
  /v1/bookings/{booking}:cancel:
    post:
      tags:
      - Booking Service
      description: Cancels a booking.
      operationId: BookingService_CancelBooking
      parameters:
      - name: booking
        in: path
        description: The booking id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelBookingRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Cancel Booking
  /v1/bookings/{booking}:confirm:
    post:
      tags:
      - Booking Service
      description: Confirms a held booking.
      operationId: BookingService_ConfirmBooking
      parameters:
      - name: booking
        in: path
        description: The booking id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBookingRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Confirm Booking
  /v1/bookings/{booking}:previewCancellation:
    post:
      tags:
      - Booking Service
      description: Previews the refund a cancellation would yield now, without cancelling.
      operationId: BookingService_PreviewCancellation
      parameters:
      - name: booking
        in: path
        description: The booking id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewCancellationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewCancellationResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Preview Cancellation
  /v1/bookings/{booking}:reschedule:
    post:
      tags:
      - Booking Service
      description: Reschedules a booking to a new span.
      operationId: BookingService_RescheduleBooking
      parameters:
      - name: booking
        in: path
        description: The booking id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RescheduleBookingRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Reschedule Booking
  /v1/users:
    get:
      tags:
      - Identity Service
      description: Lists users sharing an organisation with the caller.
      operationId: IdentityService_ListUsers
      parameters:
      - name: pageSize
        in: query
        description: Maximum number of users to return. The server may cap this.
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: Page token from a previous ListUsers call's next_page_token.
        schema:
          type: string
      - name: filter
        in: query
        description: "Filter expression (AIP-160), e.g. `organisation = \"organisations/7\"\
          ` or a\n match on display_name."
        schema:
          type: string
      - name: orderBy
        in: query
        description: Sort order, e.g. "display_name" or "create_time desc".
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Users
  /v1/users/{user}:
    get:
      tags:
      - Identity Service
      description: Returns a user. Use "users/me" for the signed-in caller.
      operationId: IdentityService_GetUser
      parameters:
      - name: user
        in: path
        description: The user id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get User
    patch:
      tags:
      - Identity Service
      description: Updates the signed-in user's profile.
      operationId: IdentityService_UpdateUser
      parameters:
      - name: user
        in: path
        description: The user id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
        description: Fields to overwrite. Omit to replace all mutable profile fields.
        schema:
          type: string
          format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update User
  /v1/organisations:
    get:
      tags:
      - Organisation Service
      description: Lists the organisations the caller belongs to.
      operationId: OrganisationService_ListOrganisations
      parameters:
      - name: pageSize
        in: query
        description: "Maximum number of organisations to return. The server may cap\
          \ this. Zero lets\n the server pick a default."
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: Page token from a previous ListOrganisations call's next_page_token.
        schema:
          type: string
      - name: filter
        in: query
        description: Filter expression over organisation fields (e.g. display_name).
        schema:
          type: string
      - name: orderBy
        in: query
        description: Sort order, e.g. "create_time desc".
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrganisationsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Organisations
    post:
      tags:
      - Organisation Service
      description: Creates an organisation. The caller becomes its first owner.
      operationId: OrganisationService_CreateOrganisation
      parameters:
      - name: organisationId
        in: query
        description: Optional caller-chosen ID for the organisation; the server generates
          one if unset.
        schema:
          type: string
      - name: requestId
        in: query
        description: Caller-supplied idempotency key; identical retries return the
          first result.
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organisation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Create Organisation
  /v1/organisations/{organisation}:
    get:
      tags:
      - Organisation Service
      description: Gets a single organisation.
      operationId: OrganisationService_GetOrganisation
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Organisation
    delete:
      tags:
      - Organisation Service
      description: Deletes an organisation.
      operationId: OrganisationService_DeleteOrganisation
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: force
        in: query
        description: "If true, delete the organisation and its members; otherwise\
          \ the call fails when\n the organisation still has members."
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Organisation
    patch:
      tags:
      - Organisation Service
      description: Updates an organisation.
      operationId: OrganisationService_UpdateOrganisation
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
        description: Fields to overwrite. Omit to replace all mutable fields.
        schema:
          type: string
          format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Organisation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisation'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Organisation
  /v1/organisations/{organisation}/members:
    get:
      tags:
      - Organisation Service
      description: Lists the members of an organisation.
      operationId: OrganisationService_ListMembers
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: pageSize
        in: query
        description: Maximum number of members to return. The server may cap this.
        schema:
          type: integer
          format: int32
      - name: pageToken
        in: query
        description: Page token from a previous ListMembers call's next_page_token.
        schema:
          type: string
      - name: filter
        in: query
        description: Filter expression (AIP-160), e.g. `role = ADMIN` or `state =
          ACTIVE`.
        schema:
          type: string
      - name: orderBy
        in: query
        description: Sort order, e.g. "create_time desc".
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembersResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: List Members
  /v1/organisations/{organisation}/members/{member}:
    get:
      tags:
      - Organisation Service
      description: Gets a single member.
      operationId: OrganisationService_GetMember
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: member
        in: path
        description: The member id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Get Member
    delete:
      tags:
      - Organisation Service
      description: Removes a member from an organisation.
      operationId: OrganisationService_DeleteMember
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: member
        in: path
        description: The member id.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Delete Member
    patch:
      tags:
      - Organisation Service
      description: Updates a member; the role is the only mutable field.
      operationId: OrganisationService_UpdateMember
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      - name: member
        in: path
        description: The member id.
        required: true
        schema:
          type: string
      - name: updateMask
        in: query
        description: Fields to overwrite. Omit to replace all mutable fields.
        schema:
          type: string
          format: field-mask
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Member'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
      summary: Update Member
  /v1/organisations/{organisation}/members:invite:
    post:
      tags:
      - Organisation Service
      description: Invites a member to an organisation.
      operationId: OrganisationService_InviteMember
      parameters:
      - name: organisation
        in: path
        description: The organisation id.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
        required: true
      responses:
