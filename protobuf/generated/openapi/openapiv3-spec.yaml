components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication using a JWT access token.
  schemas:
    AvailabilityMatch:
      type: object
      properties:
        unit:
          type: string
          description: |-
            The matching unit.
             Format: properties/{property}/units/{unit}
        displayName:
          type: string
          description: Cached display name of the unit, for convenience.
        mode:
          type: integer
          description: The unit's booking mode.
          format: enum
        bookable:
          type: boolean
          description: Whether the unit is bookable for the requested period and units.
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Lead price for the requested period: the stay total for NIGHTLY, or the slot
             price for TIME_SLOT. Used for sorting and display.
      description: |-
        One unit matched by SearchAvailability, with a lead price for the period.
         Detailed slots/nights are fetched per unit via ComputeAvailability.
    BatchComputeAvailabilityRequest:
      required:
        - requests
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/ComputeAvailabilityRequest'
          description: The individual compute requests. Results are returned in the same order.
      description: |-
        Request message for BatchComputeAvailability. Each entry is a full
         ComputeAvailabilityRequest (AIP-231), so per-unit duration and units all work
         in batch exactly as they do in the single call.
    BatchComputeAvailabilityResponse:
      type: object
      properties:
        units:
          type: array
          items:
            $ref: '#/components/schemas/UnitAvailability'
          description: Availability per request, in request order.
      description: Response message for BatchComputeAvailability.
    BookableRange:
      type: object
      properties:
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: The bookable span.
        bookable:
          type: boolean
          description: Whether the whole span is bookable.
      description: A contiguous span that is bookable end to end.
    CheckAvailabilityRequest:
      required:
        - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            The unit to test.
             Format: properties/{property}/units/{unit}
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT units.
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            A calendar-date range in the unit's timezone, the natural form for
             NIGHTLY stays; end_date is the check-out date.
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
      description: Request message for CheckAvailability.
    CheckAvailabilityResponse:
      type: object
      properties:
        bookable:
          type: boolean
          description: Whether the span is bookable.
        freeCount:
          type: integer
          description: Free units across the span (the minimum over the span).
          format: int32
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/UnbookableReason'
          description: Why the span is not bookable, when bookable is false.
      description: Response message for CheckAvailability.
    ComputeAvailabilityRequest:
      required:
        - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            The unit to compute availability for.
             Format: properties/{property}/units/{unit}
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT units.
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            A calendar-date range in the unit's timezone, the natural form for
             NIGHTLY units; end_date is the check-out date.
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: |-
            Slot length for TIME_SLOT units. Overrides the unit's default duration when
             set; ignored for NIGHTLY units.
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
      description: Request message for ComputeAvailability.
    ComputeAvailabilityResponse:
      type: object
      properties:
        mode:
          type: integer
          description: Which shape is populated, matching the unit's booking_mode.
          format: enum
        slots:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
          description: Slots, when mode is TIME_SLOT.
        nights:
          type: array
          items:
            $ref: '#/components/schemas/NightAvailability'
          description: Per-night availability, when mode is NIGHTLY.
      description: Response message for ComputeAvailability.
    ComputeBookableRangesRequest:
      required:
        - unit
      type: object
      properties:
        unit:
          type: string
          description: |-
            The unit to compute bookable ranges for.
             Format: properties/{property}/units/{unit}
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT units.
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            A calendar-date range in the unit's timezone, the natural form for
             NIGHTLY units.
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum span length for TIME_SLOT units.
        units:
          type: integer
          description: Number of units required to be free. Defaults to 1.
          format: int32
      description: Request message for ComputeBookableRanges.
    ComputeBookableRangesResponse:
      type: object
      properties:
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/BookableRange'
          description: The bookable ranges within the window.
      description: Response message for ComputeBookableRanges.
    DateRange:
      required:
        - startDate
        - endDate
      type: object
      properties:
        startDate:
          type: string
          description: Inclusive first date of the range.
          format: date
        endDate:
          type: string
          description: Exclusive end date of the range.
          format: date
      description: |-
        A half-open range of calendar dates [start_date, end_date), evaluated in the
         resource's local timezone. The natural query and exception shape for NIGHTLY
         resources: end_date is the check-out date and is not itself included.
    GoogleProtobufAny:
      type: object
      properties:
        '@type':
          type: string
          description: The type of the serialized message.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
    Money:
      type: object
      properties:
        currencyCode:
          type: string
          description: The three-letter currency code defined in ISO 4217.
        units:
          type: string
          description: |-
            The whole units of the amount.
             For example if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
        nanos:
          type: integer
          description: |-
            Number of nano (10^-9) units of the amount.
             The value must be between -999,999,999 and +999,999,999 inclusive.
             If `units` is positive, `nanos` must be positive or zero.
             If `units` is zero, `nanos` can be positive, zero, or negative.
             If `units` is negative, `nanos` must be negative or zero.
             For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
          format: int32
      description: Represents an amount of money with its currency type.
    NightAvailability:
      type: object
      properties:
        night:
          type: string
          description: The night, in the unit's local timezone.
          format: date
        freeUnits:
          type: integer
          description: Number of units of the pool free that night.
          format: int32
        closed:
          type: boolean
          description: Whether the unit is closed that night (exception/blackout).
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Nightly price, derived from the unit's pricing.
      description: Per-night availability, produced for NIGHTLY units.
    SearchAvailabilityRequest:
      type: object
      properties:
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT units.
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            A calendar-date range in each unit's timezone, the natural form for
             NIGHTLY units; end_date is the check-out date.
        units:
          type: integer
          description: Number of units / party size required free. Defaults to 1.
          format: int32
        filter:
          type: string
          description: |-
            Filter (AIP-160) over unit fields to narrow the catalog, e.g.
             `type = UNIT_TYPE_ROOM`, `tags:"beachfront"`, or a display_name match.
        orderBy:
          type: string
          description: |-
            Sort order for matches, e.g. "price" or "price desc". Defaults to price
             ascending.
        pageSize:
          type: integer
          description: Maximum number of matches to return. The server may cap this.
          format: int32
        pageToken:
          type: string
          description: Page token from a previous SearchAvailability call's next_page_token.
        includeUnavailable:
          type: boolean
          description: |-
            If true, include units that matched the filter but are not bookable for the
             period (with bookable=false), instead of dropping them.
        property:
          type: string
          description: |-
            Scope the search to a single property (hotel). Empty searches all properties.
             Format: properties/{property}
        organisation:
          type: string
          description: |-
            Scope the search to a single organisation (chain). Empty searches all
             organisations the caller can see.
             Format: organisations/{organisation}
      description: |-
        Request message for SearchAvailability. Sweeps the catalog for units that are
         bookable over a period for a given party size, narrowed by a filter and
         optionally scoped to one property (hotel) or organisation (chain), and sorted
         for presentation. This is the storefront query: one call returns the matching
         units with a lead price, rather than the caller listing units and computing
         availability for each.
    SearchAvailabilityResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityMatch'
          description: The matching units, ordered per order_by.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for SearchAvailability.
    Slot:
      type: object
      properties:
        startTime:
          type: string
          description: Inclusive start of the slot.
          format: date-time
        endTime:
          type: string
          description: Exclusive end of the slot (start + unit/requested duration).
          format: date-time
        freeCount:
          type: integer
          description: Number of units free in this slot (capacity minus overlapping bookings).
          format: int32
        bookable:
          type: boolean
          description: Whether the slot can actually be booked (free and passes policy).
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Price for booking this slot, derived from the unit's pricing.
      description: A discrete bookable time slot, produced for TIME_SLOT units.
    Status:
      type: object
      properties:
        code:
          type: integer
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
          format: int32
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/GoogleProtobufAny'
          description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
      description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
    TimeWindow:
      required:
        - startTime
        - endTime
      type: object
      properties:
        startTime:
          type: string
          description: Inclusive start of the interval.
          format: date-time
        endTime:
          type: string
          description: Exclusive end of the interval.
          format: date-time
      description: |-
        A half-open time interval [start_time, end_time). Used for query windows and
         for a booking's reserved span in both TIME_SLOT and NIGHTLY modes.
    UnbookableReason:
      type: object
      properties:
        code:
          type: integer
          description: Why the span is not bookable.
          format: enum
        message:
          type: string
          description: Human-readable explanation suitable for display, not for parsing.
      description: |-
        A reason a span is not bookable, as a machine-readable code plus a
         human-readable explanation. Clients should branch on code, never on message.
    UnitAvailability:
      type: object
      properties:
        unit:
          type: string
          description: |-
            The unit these results are for.
             Format: properties/{property}/units/{unit}
        mode:
          type: integer
          description: Which shape is populated, matching the unit's booking_mode.
          format: enum
        slots:
          type: array
          items:
            $ref: '#/components/schemas/Slot'
          description: Slots, when mode is TIME_SLOT.
        nights:
          type: array
          items:
            $ref: '#/components/schemas/NightAvailability'
          description: Per-night availability, when mode is NIGHTLY.
      description: Availability for one unit, used in batch responses.
    Attachment:
      type: object
      properties:
        filename:
          type: string
          description: Original filename as uploaded.
        mimeType:
          type: string
          description: MIME type of the file (e.g. "application/pdf", "image/jpeg").
        sizeBytes:
          type: string
          description: Size of the file in bytes.
        content:
          type: string
          description: |-
            Raw file content, stored inline in the database. Cleared once the file is
             migrated to object storage, at which point `uri` takes over.
          format: bytes
        uri:
          type: string
          description: |-
            Location of the file once moved to object storage (e.g. an s3:// or
             https:// URL). Unset while the file lives inline in `content`.
        uploadTime:
          readOnly: true
          type: string
          description: When the file was uploaded.
          format: date-time
      description: |-
        An uploaded file attached to a document- or licence-carrying record (e.g. a
         guest's IdDocument scan, or a property/unit licence certificate). The bytes
         are stored inline in `content` today; `uri` is populated once the file is
         migrated to object storage (S3 or any CDN-fronted host). At most one of the
         two is authoritative at a time — prefer `uri` when both are set.
    Booking:
      required:
        - unit
        - window
      type: object
      properties:
        name:
          type: string
          description: |-
            The booking name.
             Format: bookings/{booking}
        unit:
          type: string
          description: |-
            The unit being booked.
             Format: properties/{property}/units/{unit}
        customer:
          type: string
          description: |-
            The user the booking is for.
             Format: users/{user}
        contact:
          allOf:
            - $ref: '#/components/schemas/Contact'
          description: |-
            Contact details for the booker. Required when `customer` is unset (a guest /
             walk-in booking); when `customer` is set these supplement or override the
             user's profile contact for this booking. The booker is not necessarily one of
             the guests below.
        guests:
          type: array
          items:
            $ref: '#/components/schemas/Guest'
          description: |-
            The people staying under this booking (the party), with the registration
             details a hotel captures at check-in — name, nationality, ID, and the
             foreigner-registration fields required for foreign nationals — plus each
             guest's own preferences. The number of guests must not exceed
             `units × unit.max_occupancy`. Distinct from `customer`/`contact`, who is the
             booker.
        occupancy:
          allOf:
            - $ref: '#/components/schemas/Occupancy'
          description: |-
            Party-size breakdown, for capacity math and child pricing. When guests are
             listed the counts must reconcile with them; otherwise it stands alone as the
             occupancy. `adults + children` counts against `unit.max_occupancy`.
        units:
          type: integer
          description: Number of units / party size reserved. Defaults to 1.
          format: int32
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: The reserved span. For NIGHTLY units this spans check-in to check-out.
        assignedUnit:
          readOnly: true
          type: string
          description: Which specific unit of the pool was assigned (the shell's atomic pick).
        state:
          readOnly: true
          type: integer
          description: Current lifecycle state.
          format: enum
        holdExpireTime:
          readOnly: true
          type: string
          description: When the pending hold lapses, if not confirmed first.
          format: date-time
        price:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Computed subtotal before discounts.
        promoCode:
          type: string
          description: |-
            The promo code to apply to this booking, set at creation, if any.
             Format: promo-codes/{promo_code}
        discount:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Discount applied from the promo code.
        total:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Final total after discounts.
        priceComponents:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/PriceComponent'
          description: |-
            Itemized breakdown behind the total: the base charge, each fee and tax, and
             each discount, as signed lines. `price` is the TYPE_BASE subtotal and
             `total` is the sum of every component; these lines expose the fees and taxes
             in between. Empty for simple bookings with no fees or taxes configured.
        notes:
          type: string
          description: Free-form notes on the booking.
        attributes:
          type: object
          description: Arbitrary attributes.
        cancelReason:
          readOnly: true
          type: integer
          description: Why the booking was cancelled, when state is CANCELLED.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp (when the hold was placed).
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        confirmTime:
          readOnly: true
          type: string
          description: When the booking was confirmed, if at all.
          format: date-time
        cancelTime:
          readOnly: true
          type: string
          description: When the booking was cancelled, if at all.
          format: date-time
        refundAmount:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Amount refunded on cancellation, computed from the unit's cancellation
             policy and how far ahead of the booking start it was cancelled. Set only
             once the booking is CANCELLED. Use PreviewCancellation to see this before
             committing.
        refundPercent:
          readOnly: true
          type: integer
          description: Percentage of the total that `refund_amount` represents (0-100).
          format: int32
        holdTtl:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: |-
            Requested time-to-live of the hold, set at creation. The server caps this
             and reflects the effective expiry in hold_expire_time.
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A reservation against a unit. The hold lifecycle lives here as states
         rather than a separate service: CreateBooking places a PENDING_HOLD,
         confirmation flips it to CONFIRMED, and an internal sweeper expires holds that
         are never confirmed.
    BookingGuests:
      type: object
      properties:
        name:
          type: string
          description: |-
            The singleton resource name.
             Format: bookings/{booking}/guests
        guests:
          type: array
          items:
            $ref: '#/components/schemas/Guest'
          description: The guest party. An empty list clears the party.
        occupancy:
          allOf:
            - $ref: '#/components/schemas/Occupancy'
          description: The occupancy breakdown, replacing the existing one.
      description: |-
        BookingGuests is a singleton sub-resource of a Booking (AIP-156): the staying
         party attached to it. Exactly one exists per booking, addressed without an ID
         segment. Read and replaced via UpdateBookingGuests; there is no separate
         Create/Delete since it always exists alongside its parent Booking. It is an
         API shape over Booking.guests/occupancy, not a stored table — the party
         persists on the Booking row graph, so the ORM skips it (a generated table
         would bolt a second required parent FK onto every guest row).
    CancelBookingRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The booking to cancel.
             Format: bookings/{booking}
        reason:
          type: integer
          description: Why the booking is being cancelled.
          format: enum
        note:
          type: string
          description: Free-form note explaining the cancellation.
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the first result.
      description: Request message for CancelBooking.
    ConfirmBookingRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The booking to confirm.
             Format: bookings/{booking}
        paymentRef:
          type: string
          description: Opaque reference to the payment/settlement that confirmed this booking.
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the first result.
      description: |-
        Request message for ConfirmBooking. Confirmation normally arrives via the
         payment webhook rather than a direct client call; either way it flips a
         PENDING_HOLD to CONFIRMED.
    Contact:
      type: object
      properties:
        displayName:
          type: string
          description: Full name of the guest.
        email:
          type: string
          description: Email address for the confirmation and any follow-ups.
        phoneNumber:
          type: string
          description: Phone number in E.164 form (e.g. "+14155552671").
      description: |-
        Contact details for the person a booking is for. When a booking carries a
         `customer` (a users/{user} reference) these typically mirror the user's
         profile; for walk-in or email-only bookings made by someone who is not a
         registered user, this is the only contact information captured. The server
         requires at least one reachable channel (email or phone) when no customer is
         set.
    ForeignerDetails:
      type: object
      properties:
        visaNumber:
          type: string
          description: Visa number.
        visaType:
          type: string
          description: Visa type / category (e.g. "Tourist", "Business", "Employment").
        visaIssuePlace:
          type: string
          description: Place the visa was issued.
        visaIssueDate:
          type: string
          description: Date the visa was issued.
          format: date
        visaExpiryDate:
          type: string
          description: Date the visa expires.
          format: date
        arrivalDate:
          type: string
          description: Date the guest arrived in the country.
          format: date
        entryPort:
          type: string
          description: Port / place of entry into the country.
        origin:
          type: string
          description: Where the guest is arriving from (last city / country).
        nextDestination:
          type: string
          description: The guest's next destination after this stay.
        visitPurpose:
          type: string
          description: Purpose of visit (e.g. "Tourism", "Business", "Medical").
      description: |-
        Foreigner-registration details a hotel must capture for foreign nationals to
         file Form C with the FRRO within 24 hours of arrival (India). Nationals of
         exempt countries (e.g. Nepal, Bhutan) and diplomats may omit these.
    Guest:
      required:
        - displayName
      type: object
      properties:
        displayName:
          type: string
          description: Full legal name, exactly as on the presented ID / passport.
        primary:
          type: boolean
          description: |-
            Whether this is the lead / primary guest (the registered occupant the
             booking is held under). Exactly one guest in a party is primary.
        gender:
          type: integer
          description: Gender as recorded for registration.
          format: enum
        birthDate:
          type: string
          description: Date of birth.
          format: date
        ageGroup:
          type: integer
          description: Age bracket; given explicitly, or derived from birth_date by the server.
          format: enum
        nationality:
          type: string
          description: |-
            Nationality as an ISO 3166-1 alpha-2 country code (e.g. "IN", "GB", "US").
             Required for foreign-national registration.
        idDocument:
          allOf:
            - $ref: '#/components/schemas/IdDocument'
          description: Government identity document presented at check-in.
        email:
          type: string
          description: Contact email (typically only for the lead guest).
        phoneNumber:
          type: string
          description: Contact phone in E.164 form (typically only for the lead guest).
        permanentAddress:
          allOf:
            - $ref: '#/components/schemas/PostalAddress'
          description: Permanent / home address in the country of residence.
        localAddress:
          allOf:
            - $ref: '#/components/schemas/PostalAddress'
          description: |-
            Local address / reference in the country of stay (the "address in India"
             field on Form C).
        foreigner:
          allOf:
            - $ref: '#/components/schemas/ForeignerDetails'
          description: |-
            Foreigner-registration details, present when the guest is a foreign national
             (drives Form C / FRRO filing). Omitted for domestic guests.
        preferences:
          allOf:
            - $ref: '#/components/schemas/GuestPreferences'
          description: |-
            The guest's own stay preferences and special requests, kept with the guest
             so they travel with them across the booking.
      description: |-
        A guest is a person who stays under a booking. It is one of three distinct
         people the system models, all in the identity domain:
           - User   (identity.proto): the account that signs in and books online.
           - Guest  (this message):   a person actually staying — the party on a booking.
           - Member (organisation):   hotel staff who manage the chain/property.

         The booker (a User, or an anonymous contact) is not necessarily a guest, and a
         booking has one or more guests. This message captures what a hotel records on a
         Guest Registration Card at check-in — identity, nationality, and ID — plus the
         foreigner-registration details required for foreign nationals (e.g. India's
         Form C / FRRO), and the guest's own stay preferences. It is an embedded value
         on a booking, not an addressable account resource.
    GuestPreferences:
      type: object
      properties:
        smoking:
          type: integer
          description: Preferred smoking / non-smoking room.
          format: enum
        bed:
          type: integer
          description: Preferred bed type.
          format: enum
        dietary:
          type: array
          items:
            type: string
          description: |-
            Dietary requirements / requests (e.g. "vegetarian", "jain", "halal",
             "gluten-free").
        accessibility:
          type: array
          items:
            type: string
          description: |-
            Accessibility needs (e.g. "wheelchair", "hearing-accessible",
             "ground-floor").
        floorPreference:
          type: integer
          description: Preferred floor; 0 means no preference.
          format: int32
        loyaltyNumber:
          type: string
          description: Loyalty-programme membership number, if any.
        specialRequests:
          type: array
          items:
            type: string
          description: Free-form special requests (e.g. "late check-in", "crib", "high floor").
        notes:
          type: string
          description: Any additional free-text notes about the guest.
      description: |-
        A guest's stay preferences and special requests. All optional; used to guide
         unit assignment and to surface requests to housekeeping / front desk.
    IdDocument:
      required:
        - type
        - number
      type: object
      properties:
        type:
          type: integer
          description: Which kind of document this is.
          format: enum
        number:
          type: string
          description: The document number.
        issuingCountry:
          type: string
          description: Issuing country as an ISO 3166-1 alpha-2 code.
        issuePlace:
          type: string
          description: Place of issue (city / office), as printed on the document.
        issueDate:
          type: string
          description: Date the document was issued.
          format: date
        expiryDate:
          type: string
          description: Date the document expires.
          format: date
        attachment:
          allOf:
            - $ref: '#/components/schemas/Attachment'
          description: Scanned copy or photo of the document, uploaded at check-in.
      description: |-
        A government identity document. Passport fields are required for foreign
         nationals; domestic guests may present any accepted document type.
    ListBookingsResponse:
      type: object
      properties:
        bookings:
          type: array
          items:
            $ref: '#/components/schemas/Booking'
          description: The page of bookings.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListBookings.
    Occupancy:
      type: object
      properties:
        adults:
          type: integer
          description: Number of adults.
          format: int32
        children:
          type: integer
          description: Number of children.
          format: int32
        infants:
          type: integer
          description: Number of infants (usually not counted against occupancy).
          format: int32
      description: |-
        Occupancy is a party-size breakdown by age bracket. `adults + children` is the
         headcount charged against a unit's `max_occupancy`; infants are typically not
         counted. When a booking also lists `guests`, these counts must reconcile with
         that list.
    PostalAddress:
      type: object
      properties:
        revision:
          type: integer
          description: |-
            The schema revision of the `PostalAddress`. This must be set to 0, which is
             the latest revision.

             All new revisions **must** be backward compatible with old revisions.
          format: int32
        regionCode:
          type: string
          description: |-
            Required. CLDR region code of the country/region of the address. This
             is never inferred and it is up to the user to ensure the value is
             correct. See https://cldr.unicode.org/ and
             https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
             for details. Example: "CH" for Switzerland.
        languageCode:
          type: string
          description: |-
            Optional. BCP-47 language code of the contents of this address (if
             known). This is often the UI language of the input form or is expected
             to match one of the languages used in the address' country/region, or their
             transliterated equivalents.
             This can affect formatting in certain countries, but is not critical
             to the correctness of the data and will never affect any validation or
             other non-formatting related operations.

             If this value is not known, it should be omitted (rather than specifying a
             possibly incorrect default).

             Examples: "zh-Hant", "ja", "ja-Latn", "en".
        postalCode:
          type: string
          description: |-
            Optional. Postal code of the address. Not all countries use or require
             postal codes to be present, but where they are used, they may trigger
             additional validation with other parts of the address (for example,
             state or zip code validation in the United States).
        sortingCode:
          type: string
          description: |-
            Optional. Additional, country-specific, sorting code. This is not used
             in most regions. Where it is used, the value is either a string like
             "CEDEX", optionally followed by a number (for example, "CEDEX 7"), or just
             a number alone, representing the "sector code" (Jamaica), "delivery area
             indicator" (Malawi) or "post office indicator" (Côte d'Ivoire).
        administrativeArea:
          type: string
          description: |-
            Optional. Highest administrative subdivision which is used for postal
             addresses of a country or region.
             For example, this can be a state, a province, an oblast, or a prefecture.
             For Spain, this is the province and not the autonomous
             community (for example, "Barcelona" and not "Catalonia").
             Many countries don't use an administrative area in postal addresses. For
             example, in Switzerland, this should be left unpopulated.
        locality:
          type: string
          description: |-
            Optional. Generally refers to the city or town portion of the address.
             Examples: US city, IT comune, UK post town.
             In regions of the world where localities are not well defined or do not fit
             into this structure well, leave `locality` empty and use `address_lines`.
        sublocality:
          type: string
          description: |-
            Optional. Sublocality of the address.
             For example, this can be a neighborhood, borough, or district.
        addressLines:
          type: array
          items:
            type: string
          description: |-
            Unstructured address lines describing the lower levels of an address.

             Because values in `address_lines` do not have type information and may
             sometimes contain multiple values in a single field (for example,
             "Austin, TX"), it is important that the line order is clear. The order of
             address lines should be "envelope order" for the country or region of the
             address. In places where this can vary (for example, Japan),
             `address_language` is used to make it explicit (for example, "ja" for
             large-to-small ordering and "ja-Latn" or "en" for small-to-large). In this
             way, the most specific line of an address can be selected based on the
             language.

             The minimum permitted structural representation of an address consists
             of a `region_code` with all remaining information placed in the
             `address_lines`. It would be possible to format such an address very
             approximately without geocoding, but no semantic reasoning could be
             made about any of the address components until it was at least
             partially resolved.

             Creating an address only containing a `region_code` and `address_lines` and
             then geocoding is the recommended way to handle completely unstructured
             addresses (as opposed to guessing which parts of the address should be
             localities or administrative areas).
        recipients:
          type: array
          items:
            type: string
          description: |-
            Optional. The recipient at the address.
             This field may, under certain circumstances, contain multiline information.
             For example, it might contain "care of" information.
        organization:
          type: string
          description: Optional. The name of the organization at the address.
      description: |-
        Represents a postal address, such as for postal delivery or payments
         addresses. With a postal address, a postal service can deliver items to a
         premise, P.O. box, or similar. A postal address is not intended to model
         geographical locations like roads, towns, or mountains.

         In typical usage, an address would be created by user input or from importing
         existing data, depending on the type of process.

         Advice on address input or editing:

          - Use an internationalization-ready address widget such as
          https://github.com/google/libaddressinput.
          - Users should not be presented with UI elements for input or editing of
          fields outside countries where that field is used.

         For more guidance on how to use this schema, see:
         https://support.google.com/business/answer/6397478.
    PreviewCancellationRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The booking to preview a cancellation for.
             Format: bookings/{booking}
      description: |-
        Request message for PreviewCancellation. Computes the refund a cancellation
         would yield right now, under the unit's cancellation policy, without
         cancelling the booking.
    PreviewCancellationResponse:
      type: object
      properties:
        refundable:
          type: boolean
          description: Whether cancelling now would refund anything.
        refundPercent:
          type: integer
          description: Percentage of the total that would be refunded (0-100).
          format: int32
        refundAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Amount that would be refunded now.
        nonRefundableAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Amount that would be retained (total minus refund_amount).
        policySummary:
          type: string
          description: Human-readable summary of the policy tier that applied, for display.
      description: Response message for PreviewCancellation.
    PriceComponent:
      type: object
      properties:
        type:
          type: integer
          description: Which kind of line this is.
          format: enum
        code:
          type: string
          description: |-
            Stable machine code for the line, e.g. "base", "cleaning_fee",
             "occupancy_tax", or a promo code. Clients key display and logic off this.
        displayName:
          type: string
          description: Human-readable label suitable for display on an itemized receipt.
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Signed amount: positive for charges (base, fees, taxes), negative for
             discounts. Summing every component yields the booking total.
      description: |-
        One line in a price breakdown: a base charge, a fee, a tax, or a discount.
         Clients branch on `type` and `code`; the signed `amount` rolls up to the
         booking total (charges positive, discounts negative).
    RescheduleBookingRequest:
      required:
        - name
        - window
      type: object
      properties:
        name:
          type: string
          description: |-
            The booking to reschedule.
             Format: bookings/{booking}
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: The new reserved span.
        unit:
          type: string
          description: |-
            The new unit, when changing it as part of the reschedule.
             Format: properties/{property}/units/{unit}
        requestId:
          type: string
          description: Caller-supplied idempotency key that dedupes retries of this reschedule.
      description: |-
        Request message for RescheduleBooking. Atomically moves a booking to a new
         span (and optionally unit), re-running availability and the exclusion
         check on the new window.
    AriUpdate:
      required:
        - unit
        - date
      type: object
      properties:
        unit:
          type: string
          description: |-
            The unit this update is for.
             Format: properties/{property}/units/{unit}
        date:
          type: string
          description: The date (in the unit's timezone) the values apply to.
          format: date
        available:
          type: integer
          description: Number of units available to sell on this date.
          format: int32
        rate:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Nightly rate to publish for this date.
        restrictions:
          allOf:
            - $ref: '#/components/schemas/Restrictions'
          description: Booking restrictions to publish for this date.
      description: |-
        One day's availability, rate, and restrictions for a unit — the atomic unit of
         an outbound ARI push. It is the channel-facing projection of the unit's price
         and its Schedule's stay constraints for a single date.
    Channel:
      required:
        - property
        - type
      type: object
      properties:
        name:
          type: string
          description: |-
            The channel name.
             Format: channels/{channel}
        property:
          type: string
          description: |-
            The property this channel distributes.
             Format: properties/{property}
        type:
          type: integer
          description: |-
            Which OTA/GDS this connects to. Immutable: the adapter and external ID space
             are fixed per channel.
          format: enum
        displayName:
          type: string
          description: Human-friendly label (e.g. "Booking.com — Goa Resort").
        externalPropertyId:
          type: string
          description: The channel's own code for this hotel (e.g. the Booking.com hotel id).
        credentialRef:
          type: string
          description: |-
            Opaque handle to the stored credentials for this connection (a secret-manager
             key or vault path). The secrets themselves are never returned by the API.
        state:
          readOnly: true
          type: integer
          description: Connection state.
          format: enum
        lastSyncTime:
          readOnly: true
          type: string
          description: When ARI/reservations last synced successfully.
          format: date-time
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A connection between one property and one distribution channel (OTA/GDS). It
         is the anchor for 2-way ARI: availability/rates/inventory are pushed out per
         mapped unit, and reservations made on the channel are pulled in as bookings.
         Credentials are never carried in the API — only an opaque handle to where they
         are stored.
    ChannelSyncStatus:
      type: object
      properties:
        name:
          type: string
          description: |-
            The sync-status name.
             Format: channels/{channel}/syncStatus
        state:
          readOnly: true
          type: integer
          description: Current connection state.
          format: enum
        lastSyncTime:
          type: string
          description: When ARI/reservations last synced successfully.
          format: date-time
        pendingCount:
          type: integer
          description: Count of updates still queued.
          format: int32
        failedCount:
          type: integer
          description: Count of updates that failed since the last success.
          format: int32
        lastError:
          type: string
          description: Most recent error message, when the last sync failed.
      description: |-
        A rollup of a channel's sync health, modeled as a singleton sub-resource of the
         channel (one per channel) and read via GetChannelSyncStatus.
    DisableChannelRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The channel to disable (pause ARI push and reservation pull).
             Format: channels/{channel}
      description: Request message for DisableChannel.
    EnableChannelRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The channel to enable (resume ARI push and reservation pull).
             Format: channels/{channel}
      description: Request message for EnableChannel.
    ExternalReservation:
      required:
        - channel
        - externalId
        - unit
        - stay
        - op
      type: object
      properties:
        channel:
          type: string
          description: |-
            The channel the reservation came from.
             Format: channels/{channel}
        externalId:
          type: string
          description: |-
            The channel's own id for this reservation (used for idempotency and
             modify/cancel matching).
        unit:
          type: string
          description: |-
            The resolved freebusy unit being booked.
             Format: properties/{property}/units/{unit}
        guest:
          allOf:
            - $ref: '#/components/schemas/Contact'
          description: Guest contact details supplied by the channel.
        stay:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: 'The stay: check-in to check-out (end_date is the check-out date).'
        units:
          type: integer
          description: Number of units / rooms reserved. Defaults to 1.
          format: int32
        total:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: The reservation total as charged on the channel.
        op:
          type: integer
          description: Whether this is a create, modify, or cancel.
          format: enum
      description: |-
        A reservation as it exists on the channel, landed inbound so it can be
         reconciled into a freebusy Booking. The unit is resolved from the channel's
         external ids via the UnitMapping.
    ImportReservationRequest:
      required:
        - reservation
      type: object
      properties:
        reservation:
          allOf:
            - $ref: '#/components/schemas/ExternalReservation'
          description: The reservation as it exists on the channel.
      description: |-
        Request message for ImportReservation. Lands a reservation made on a channel so
         it reconciles into a freebusy Booking (create/modify/cancel).
    ImportReservationResponse:
      type: object
      properties:
        booking:
          type: string
          description: |-
            The freebusy booking created or updated from the reservation.
             Format: bookings/{booking}
      description: Response message for ImportReservation.
    ListChannelsResponse:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
          description: The page of channels.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListChannels.
    ListSyncEventsResponse:
      type: object
      properties:
        syncEvents:
          type: array
          items:
            $ref: '#/components/schemas/SyncEvent'
          description: The page of sync events.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListSyncEvents.
    ListUnitMappingsResponse:
      type: object
      properties:
        unitMappings:
          type: array
          items:
            $ref: '#/components/schemas/UnitMapping'
          description: The page of unit mappings.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListUnitMappings.
    PushAriRequest:
      required:
        - channel
        - updates
      type: object
      properties:
        channel:
          type: string
          description: |-
            The channel to push to.
             Format: channels/{channel}
        updates:
          type: array
          items:
            $ref: '#/components/schemas/AriUpdate'
          description: The per-unit, per-date updates to publish.
      description: |-
        Request message for PushAri. Pushes availability/rate/restriction updates for a
         channel's mapped units (AIP-231 batch shape). Unmapped units are rejected.
    PushAriResponse:
      type: object
      properties:
        accepted:
          type: integer
          description: Number of updates accepted for publishing.
          format: int32
        events:
          type: array
          items:
            $ref: '#/components/schemas/SyncEvent'
          description: Per-update sync events (queued or failed), for observability.
      description: Response message for PushAri.
    Restrictions:
      type: object
      properties:
        minStay:
          type: integer
          description: Minimum length of stay. Zero means no minimum.
          format: int32
        maxStay:
          type: integer
          description: Maximum length of stay. Zero means no maximum.
          format: int32
        arrivalClosed:
          type: boolean
          description: 'Closed to arrival: a stay may not start on this date.'
        departureClosed:
          type: boolean
          description: 'Closed to departure: a stay may not end on this date.'
        stopSell:
          type: boolean
          description: 'Stop-sell: the unit is not sellable on this date regardless of inventory.'
      description: Sell restrictions published to a channel for a date.
    SyncEvent:
      type: object
      properties:
        direction:
          type: integer
          description: Whether this was an outbound push or an inbound pull.
          format: enum
        channel:
          type: string
          description: |-
            The channel involved.
             Format: channels/{channel}
        unit:
          type: string
          description: |-
            The unit involved, when the event is unit-scoped.
             Format: properties/{property}/units/{unit}
        date:
          type: string
          description: The date the event concerned, when applicable.
          format: date
        state:
          readOnly: true
          type: integer
          description: Outcome.
          format: enum
        error:
          type: string
          description: Human-readable error when state is FAILED.
        eventTime:
          type: string
          description: When the event occurred.
          format: date-time
      description: |-
        A record of one sync attempt, for observability of the ARI push / reservation
         pull. Returned by ListSyncEvents; not a standalone resource.
    UnitMapping:
      required:
        - unit
        - externalRoomTypeId
      type: object
      properties:
        name:
          type: string
          description: |-
            The mapping name.
             Format: channels/{channel}/unitMappings/{unit_mapping}
        unit:
          type: string
          description: |-
            The freebusy unit being mapped.
             Format: properties/{property}/units/{unit}
        externalRoomTypeId:
          type: string
          description: The channel's room-type id this unit maps to.
        externalRatePlanId:
          type: string
          description: The channel's rate-plan id this unit maps to.
        state:
          readOnly: true
          type: integer
          description: Mapping state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        Maps a freebusy Unit to its counterpart on the channel. ARI for a unit only
         flows once a MAPPED mapping exists: the external room-type and rate-plan ids
         key the availability/rate/restriction push and resolve inbound reservations
         back to the right unit.
    ListUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
          description: The page of users.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListUsers.
    User:
      type: object
      properties:
        name:
          type: string
          description: |-
            The user name. The alias "users/me" resolves to the caller.
             Format: users/{user}
        email:
          readOnly: true
          type: string
          description: Email address, sourced from the IdP.
        displayName:
          type: string
          description: Display name.
        avatarUrl:
          type: string
          description: Avatar image URL.
        locale:
          type: string
          description: BCP 47 locale (e.g. "en-US").
        timeZone:
          type: string
          description: IANA time zone (e.g. "America/New_York").
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update.
      description: |-
        A signed-in person. Identity is deliberately thin: actual login is an OIDC
         redirect flow handled over plain HTTP by the IdP, so most of "auth" never
         appears as an RPC. Email and identity come from the IdP and are read-only
         here; only profile preferences are editable.
    InviteMemberRequest:
      required:
        - parent
        - email
        - role
      type: object
      properties:
        parent:
          type: string
          description: |-
            The organisation to invite the member to.
             Format: organisations/{organisation}
        email:
          type: string
          description: Email address to invite.
        role:
          type: integer
          description: Role to grant on acceptance.
          format: enum
        requestId:
          type: string
          description: Caller-supplied idempotency key; identical retries return the first result.
      description: Request message for InviteMember.
    InviteMemberResponse:
      type: object
      properties:
        member:
          allOf:
            - $ref: '#/components/schemas/Member'
          description: The created member (in INVITED state).
      description: Response message for InviteMember.
    ListMembersResponse:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
          description: The page of members.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListMembers.
    ListOrganisationsResponse:
      type: object
      properties:
        organisations:
          type: array
          items:
            $ref: '#/components/schemas/Organisation'
          description: The page of organisations (those the caller belongs to).
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
      description: Response message for ListOrganisations.
    Member:
      required:
        - email
        - role
      type: object
      properties:
        name:
          type: string
          description: |-
            The member name.
             Format: organisations/{organisation}/members/{member}
        user:
          readOnly: true
          type: string
          description: |-
            The user, once the invite is accepted.
             Format: users/{user}
        email:
          type: string
          description: The invited email address.
        displayName:
          readOnly: true
          type: string
          description: Cached display name of the member.
        role:
          type: integer
          description: The member's role in the organisation.
          format: enum
        state:
          readOnly: true
          type: integer
          description: Confirmation state of the membership.
          format: enum
        inviter:
          readOnly: true
          type: string
          description: |-
            The user who issued the invite.
             Format: users/{user}
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp (when the invite was created).
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: The membership of a user in an organisation, with their role.
    Organisation:
      required:
        - displayName
      type: object
      properties:
        name:
          type: string
          description: |-
            The organisation name.
             Format: organisations/{organisation}
        displayName:
          type: string
          description: Human-friendly organisation name (e.g. "Acme Inc.").
        slug:
          type: string
          description: URL-safe slug, unique across organisations.
        billingEmail:
          type: string
          description: Billing contact email.
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        settings:
          type: object
          description: Arbitrary organisation-level settings.
        memberCount:
          readOnly: true
          type: string
          description: Number of members across all states.
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A chain: the hotel brand/company that owns one or more properties, and the
         unit of multi-tenancy. The shell enforces isolation with row-level security
         keyed off the caller's organisation. Each Property references the Organisation
         it belongs to; members here are the chain's administrators, not its guests
         (guests relate to a property only through bookings).
    Discount:
      type: object
      properties:
        percentOff:
          type: integer
          description: Percentage off the subtotal (1-100).
          format: int32
        amountOff:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Fixed amount off the subtotal.
             Normalized into the shared common.moneys table (belongs-to via amount_off_id).
      description: |-
        Discount describes how a promo code reduces a subtotal. Nested value object →
         belongs-to child table promocode.discounts (FK discount_id on promo_codes).
         Exactly one of percent_off / amount_off is set; the oneof case is the
         discriminator, so no separate type enum is needed.
    ListPromoCodesResponse:
      type: object
      properties:
        promoCodes:
          type: array
          items:
            $ref: '#/components/schemas/PromoCode'
          description: The page of promo codes.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
        totalSize:
          type: integer
          description: |-
            Total number of promo codes matching the filter across all pages, when the
             server computes it; 0 if unknown. Useful for rendering page counts (AIP-132).
          format: int32
      description: Response message for ListPromoCodes.
    ListRedemptionsResponse:
      type: object
      properties:
        redemptions:
          type: array
          items:
            $ref: '#/components/schemas/Redemption'
          description: The page of redemptions, newest first by default.
        nextPageToken:
          type: string
          description: Token to pass as page_token to retrieve the next page; empty when no more.
        totalSize:
          type: integer
          description: |-
            Total number of redemptions for the promo code, when the server computes it;
             0 if unknown.
          format: int32
      description: Response message for ListRedemptions.
    PromoCode:
      required:
        - code
        - discount
      type: object
      properties:
        name:
          type: string
          description: |-
            The promo code name.
             Format: promoCodes/{promo_code}
        code:
          type: string
          description: The human-entered code, unique across all promo codes (e.g. "SUMMER25").
        displayName:
          type: string
          description: Internal display name (not shown to customers).
        description:
          type: string
          description: Free-form description.
        discount:
          allOf:
            - $ref: '#/components/schemas/Discount'
          description: How the discount is computed → belongs-to child table promocode.discounts.
        window:
          allOf:
            - $ref: '#/components/schemas/RedemptionWindow'
          description: When the code is redeemable → belongs-to promocode.redemption_windows.
        limits:
          allOf:
            - $ref: '#/components/schemas/UsageLimits'
          description: Redemption caps → belongs-to promocode.usage_limits.
        scope:
          allOf:
            - $ref: '#/components/schemas/Scope'
          description: What the code applies to (eligibility) → belongs-to promocode.scopes.
        redemptionCount:
          readOnly: true
          type: string
          description: |-
            How many times the code has been redeemed. Cheap summary on the resource;
             the individual redemptions are a paginated sub-collection
             (promoCodes/{promo_code}/redemptions) listed via ListRedemptions, not inlined
             here, so reads stay bounded as redemptions accumulate.
        state:
          readOnly: true
          type: integer
          description: |-
            Derived lifecycle state, recomputed on every read/validate (no background
             job): DISABLED when `disabled` is set; EXPIRED once now > window.end_time
             (the expiry) or the code is out of redemptions; otherwise ACTIVE. This is how
             a code auto-disables at its expiry without a stored flag to flip.
          format: enum
        disabled:
          type: boolean
          description: If true, the code is manually disabled regardless of its window and caps.
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A redeemable discount applied to a booking's subtotal. Scoped by a redemption
         window, usage caps, a minimum subtotal, and an optional set of properties /
         units it applies to.
    Redemption:
      required:
        - customer
        - booking
      type: object
      properties:
        name:
          type: string
          description: |-
            The redemption resource name.
             Format: promoCodes/{promo_code}/redemptions/{redemption}
        customer:
          type: string
          description: |-
            The customer who redeemed the code.
             Format: users/{user}
        booking:
          type: string
          description: |-
            The booking the code was applied to.
             Format: bookings/{booking}
        redeemedTime:
          readOnly: true
          type: string
          description: When the code was redeemed.
          format: date-time
        amountApplied:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/Money'
          description: The discount actually applied at redemption.
      description: |-
        Redemption is a single use of a promo code, modeled as a sub-resource of
         PromoCode rather than an inline list — so it has its own name/lifecycle and is
         listed with paging (ListRedemptions). The {promo_code} parent segment
         generates the promo_code_id FK back to the owning code (1:n into
         promocode.redemptions); amount_applied is the shared google.type.Money in
         common.moneys. Redemptions are created during CreateBooking, never directly.
    RedemptionWindow:
      type: object
      properties:
        startTime:
          type: string
          description: Earliest the code can be redeemed. Unset means no lower bound.
          format: date-time
        endTime:
          type: string
          description: |-
            The code's expiry: the latest moment it can be redeemed. Once now passes
             this, the derived PromoCode.state becomes EXPIRED. Unset means never expires.
          format: date-time
      description: |-
        RedemptionWindow bounds when a code can be redeemed; an unset bound is
         open-ended. Nested value object → belongs-to promocode.redemption_windows.
    Scope:
      type: object
      properties:
        minSubtotal:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Minimum subtotal required for the code to apply.
             Normalized into the shared common.moneys table (belongs-to via min_subtotal_id).
        applicableProperties:
          type: array
          items:
            type: string
          description: |-
            Properties the code applies to. Empty means all properties.
             Format: properties/{property}
        applicableUnits:
          type: array
          items:
            type: string
          description: |-
            Units the code applies to. Empty means all units.
             Format: properties/{property}/units/{unit}
      description: |-
        Scope restricts which bookings a code applies to. Nested value object →
         belongs-to promocode.scopes. Its repeated resource references and Money
         normalize one level deeper (array columns / common.moneys).
    UsageLimits:
      type: object
      properties:
        maxRedemptions:
          type: string
          description: Maximum total redemptions across all customers. Unset means unlimited.
        perCustomerLimit:
          type: integer
          description: Maximum redemptions per customer. Unset means unlimited.
          format: int32
      description: |-
        UsageLimits caps how often a code can be redeemed. Nested value object →
         belongs-to promocode.usage_limits. The caps are wrapper types so "unset"
         (unlimited) is distinct from an explicit value, including 0.
    ValidatePromoCodeRequest:
      required:
        - code
        - subtotal
      type: object
      properties:
        code:
          type: string
          description: The human-entered code to validate (e.g. "SUMMER25").
        subtotal:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Subtotal the discount would apply to.
        property:
          type: string
          description: |-
            Property being booked, for scope checks.
             Format: properties/{property}
        unit:
          type: string
          description: |-
            Unit being booked, for scope checks.
             Format: properties/{property}/units/{unit}
        customer:
          type: string
          description: |-
            Customer redeeming the code, for per-customer limit checks.
             Format: users/{user}
      description: |-
        Request message for ValidatePromoCode. Computes the discount a code would
         apply to a prospective booking without redeeming it.
    ValidatePromoCodeResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the code is valid and applicable to the given context.
        invalidReason:
          type: integer
          description: |-
            Structured reason the code is not valid, when valid is false; branch on this
             rather than parsing `reason`. UNSPECIFIED when valid is true.
          format: enum
        reason:
          type: string
          description: |-
            Human-readable detail for invalid_reason, suitable for display
             (e.g. "Minimum subtotal of $50 not met"). Empty when valid is true.
        promoCode:
          type: string
          description: |-
            The resolved promo code, when valid.
             Format: promoCodes/{promo_code}
        discountAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Discount the code applies to the subtotal.
        finalTotal:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Subtotal minus the discount.
      description: Response message for ValidatePromoCode.
    Licence:
      required:
        - type
      type: object
      properties:
        name:
          type: string
          description: |-
            The licence name.
             Format: properties/{property}/licences/{licence}
        target:
          readOnly: true
          type: integer
          description: |-
            What the licence covers: the whole property, or the single unit named in
             `unit`. Derived from whether `unit` is set at create time.
          format: enum
        unit:
          type: string
          description: |-
            The unit this licence covers, for a LICENCE_TARGET_UNIT licence; unset for
             a property-wide licence. Must belong to the parent property.
             Format: properties/{property}/units/{unit}
        type:
          type: integer
          description: What kind of licence/certificate this is.
          format: enum
        licenceNumber:
          type: string
          description: Licence/certificate number as printed by the issuing authority.
        issuingAuthority:
          type: string
          description: The authority or body that issued the licence (e.g. "Municipal Corporation of Goa").
        issueDate:
          type: string
          description: Date the licence was issued.
          format: date
        expiryDate:
          type: string
          description: |-
            Date the licence expires. List calls may filter on this field (e.g.
             `expiry_date <= 2026-08-01`) to find licences due for renewal.
          format: date
        attachment:
          allOf:
            - $ref: '#/components/schemas/Attachment'
          description: Scanned copy of the licence certificate.
        notes:
          type: string
          description: Any additional free-text notes.
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A regulatory licence or certificate held by a Property or one of its Units
         (e.g. trade licence, fire safety NOC, per-room liquor licence). One resource
         covers both: every licence is parented by the property, `target` says what it
         covers, and a unit licence names its unit in `unit`. Tracks the issuing
         authority and validity window so `expiry_date` can be filtered on to find
         licences due for renewal; the certificate itself is carried in `attachment`.
         A standalone resource (own Get/List/Create/Update/Delete), like Unit, rather
         than an embedded repeated field like Media, so a renewal doesn't require
         resending the whole Property.
    ListLicencesResponse:
      type: object
      properties:
        licences:
          type: array
          items:
            $ref: '#/components/schemas/Licence'
          description: The page of licences.
        nextPageToken:
          type: string
          description: Next page token. Omitted if this is the last page.
      description: Response message for ListLicences.
    ArchivePropertyRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The property to archive.
             Format: properties/{property}
      description: Request message for ArchiveProperty.
    Fee:
      required:
        - code
      type: object
      properties:
        code:
          type: string
          description: Stable machine code, e.g. "cleaning_fee".
        displayName:
          type: string
          description: Human-readable label for receipts.
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Fixed fee amount, when charging a flat fee.
        percent:
          type: integer
          description: Percent of the base subtotal (1-100), when charging a proportional fee.
          format: int32
        pricingUnit:
          type: integer
          description: |-
            What the fee is charged per (per booking, per night, per person). Defaults
             to per booking.
          format: enum
        taxable:
          type: boolean
          description: Whether this fee is included in the taxable base.
      description: |-
        A fee added on top of a unit's base subtotal. Exactly one of `amount` or
         `percent` is set. Surfaces as a TYPE_FEE line in a booking's price_components.
    ListPropertiesResponse:
      type: object
      properties:
        properties:
          type: array
          items:
            $ref: '#/components/schemas/Property'
          description: The page of properties.
        nextPageToken:
          type: string
          description: Next page token, if more results remain. Omitted if this is the last page.
      description: Response message for ListProperties.
    ListUnitsResponse:
      type: object
      properties:
        units:
          type: array
          items:
            $ref: '#/components/schemas/Unit'
          description: The page of units.
        nextPageToken:
          type: string
          description: Next page token. Omitted if this is the last page.
      description: Response message for ListUnits.
    LosDiscount:
      required:
        - minNights
      type: object
      properties:
        minNights:
          type: integer
          description: Minimum nights for the discount to apply.
          format: int32
        percentOff:
          type: integer
          description: Percent off the subtotal (1-100), when discounting by percentage.
          format: int32
        amountOff:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Fixed amount off the subtotal, when discounting by a flat amount.
      description: |-
        A discount applied to a NIGHTLY subtotal once the stay reaches a minimum
         length. Exactly one of percent_off or amount_off is set.
    Media:
      required:
        - uri
        - type
      type: object
      properties:
        uri:
          type: string
          description: Publicly reachable URL of the asset (an S3/CDN link or any HTTPS URL).
        type:
          type: integer
          description: What kind of asset this is; DOCUMENT covers PDFs/policies/house rules.
          format: enum
        title:
          type: string
          description: Short human-readable caption/title for display.
        description:
          type: string
          description: Longer description or alt text.
        mimeType:
          type: string
          description: MIME type of the asset (e.g. "image/jpeg", "application/pdf"), when known.
        sortOrder:
          type: integer
          description: Ordering hint within a gallery; lower sorts first.
          format: int32
        primary:
          type: boolean
          description: Whether this is the primary/hero asset of its gallery.
      description: |-
        A media asset in a Property's showcase gallery — an image, video, floor plan,
         virtual tour, or a document (PDF fact sheet, policy, house rules). The bytes
         live in object storage (S3 or any HTTP-reachable host); this message only
         carries the link and its presentation metadata. `UnitMedia` is the identical
         per-Unit gallery; they are separate messages so the ORM materializes each as a
         child table with a single owning parent.
    Policy:
      type: object
      properties:
        checkinTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          description: Local check-in time (e.g. 14:00).
        checkoutTime:
          allOf:
            - $ref: '#/components/schemas/TimeOfDay'
          description: Local check-out time (e.g. 11:00).
        houseRules:
          type: array
          items:
            type: string
          description: House rules shown to guests (e.g. "No smoking", "Pets on request").
        notes:
          type: string
          description: Any additional free-text notes displayed with the policy.
      description: |-
        Guest-facing, informational property policy: what to *display* to a guest
         (check-in/out hours, house rules). The enforced refund/stay rules that gate
         bookability live on each Unit's Schedule (freebusy.schedule.v1), not here, so
         there is a single source of truth for enforcement.
    Property:
      required:
        - organisation
        - displayName
        - timeZone
      type: object
      properties:
        name:
          type: string
          description: |-
            The property name.
             Format: properties/{property}
        organisation:
          type: string
          description: |-
            The chain/brand that owns this property.
             Format: organisations/{organisation}
        displayName:
          type: string
          description: Human-friendly name (e.g. "Grand Beach Resort, Goa").
        description:
          type: string
          description: Free-form description shown on the property's page.
        address:
          allOf:
            - $ref: '#/components/schemas/PostalAddress'
          description: Postal address of the property.
        timeZone:
          type: string
          description: IANA timezone (e.g. "Asia/Kolkata") the property operates in.
        media:
          type: array
          items:
            $ref: '#/components/schemas/Media'
          description: |-
            Showcase gallery and documents (images, video, floor plans, PDFs).
             Documents are Media with type DOCUMENT.
        policy:
          allOf:
            - $ref: '#/components/schemas/Policy'
          description: |-
            Guest-facing informational policy (display only). The enforced rules
             (cancellation, stay constraints, buffers) live per-Unit in the schedule
             service, not here.
        tags:
          type: array
          items:
            type: string
          description: Arbitrary tags for grouping and filtering (e.g. "beachfront", "5-star").
        attributes:
          type: object
          description: Arbitrary attributes used for templating, policy, and segmentation.
        units:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Resource names of the units (room types) under this property; manage them
             with the Unit standard methods.
             Format: properties/{property}/units/{unit}
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
        licences:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Resource names of the regulatory licences/certificates held by this
             property and its units (e.g. trade licence, fire safety NOC); manage them
             with the LicenceService. Derived from the licences' parent FK at read
             time, so no join table is materialized (orm skip).
             Format: properties/{property}/licences/{licence}
      description: |-
        A hotel (or other lodging property): the guest-facing venue a chain operates.
         A Property belongs to an Organisation (the chain/brand) and carries the
         showcase media, address, and informational policies shown to guests. Its
         bookable inventory lives in child Units (room types); pricing and availability
         are modeled there, not here.
    RateOverride:
      required:
        - price
      type: object
      properties:
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            Dates the override applies to, in the unit's timezone. Unset means it
             applies on every date (a pure weekday rule).
        weekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Weekdays the override applies to. Empty means every day within date_range.
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: The price in effect while this override matches.
      description: |-
        A price override for a span of dates and/or specific weekdays, layered over a
         unit's base `price`. The price is still interpreted per the unit's
         pricing_unit (per night, per booking, per person).
    Tax:
      required:
        - code
        - percent
      type: object
      properties:
        code:
          type: string
          description: Stable machine code, e.g. "occupancy_tax" or "gst".
        displayName:
          type: string
          description: Human-readable label for receipts.
        percent:
          type: number
          description: Tax rate as a percentage, e.g. 12 for 12% GST.
          format: double
      description: |-
        A tax applied to the taxable base (base subtotal plus taxable fees). Surfaces
         as a TYPE_TAX line in a booking's price_components.
    TimeOfDay:
      type: object
      properties:
        hours:
          type: integer
          description: |-
            Hours of a day in 24 hour format. Must be greater than or equal to 0 and
             typically must be less than or equal to 23. An API may choose to allow the
             value "24:00:00" for scenarios like business closing time.
          format: int32
        minutes:
          type: integer
          description: |-
            Minutes of an hour. Must be greater than or equal to 0 and less than or
             equal to 59.
          format: int32
        seconds:
          type: integer
          description: |-
            Seconds of a minute. Must be greater than or equal to 0 and typically must
             be less than or equal to 59. An API may allow the value 60 if it allows
             leap-seconds.
          format: int32
        nanos:
          type: integer
          description: |-
            Fractions of seconds, in nanoseconds. Must be greater than or equal to 0
             and less than or equal to 999,999,999.
          format: int32
      description: |-
        Represents a time of day. The date and time zone are either not significant
         or are specified elsewhere. An API may choose to allow leap seconds. Related
         types are [google.type.Date][google.type.Date] and
         `google.protobuf.Timestamp`.
    UnarchivePropertyRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The property to restore to the active state.
             Format: properties/{property}
      description: Request message for UnarchiveProperty.
    Unit:
      required:
        - displayName
        - type
        - bookingMode
        - timeZone
      type: object
      properties:
        name:
          type: string
          description: |-
            The unit name.
             Format: properties/{property}/units/{unit}
        displayName:
          type: string
          description: Human-friendly name (e.g. "Deluxe King", "Sea-View Suite").
        description:
          type: string
          description: Free-form description.
        type:
          type: integer
          description: What kind of unit this is.
          format: enum
        bookingMode:
          type: integer
          description: |-
            How this unit is booked, and therefore the availability shape it yields.
             Immutable: flipping it after bookings exist would invalidate every existing
             booking and availability computation.
          format: enum
        capacity:
          type: integer
          description: Number of interchangeable units in the pool. Defaults to 1 when unset.
          format: int32
        maxOccupancy:
          type: integer
          description: |-
            Maximum guests per unit (occupancy limit). A future policy layer (OPA)
             reads this to validate party size on a booking. Zero means unspecified.
          format: int32
        timeZone:
          type: string
          description: |-
            IANA timezone the unit's hours and dates are evaluated in. Required so
             availability is timezone-correct.
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: |-
            Base price, interpreted per pricing_unit. For NIGHTLY units this is the
             default nightly rate; rate_overrides layer seasonal/weekend rates on top.
        pricingUnit:
          type: integer
          description: What the price is charged per.
          format: enum
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Slot length. Required for TIME_SLOT units; ignored for NIGHTLY.
        rateOverrides:
          type: array
          items:
            $ref: '#/components/schemas/RateOverride'
          description: |-
            Rate calendar: date- and weekday-scoped overrides of `price`. For NIGHTLY
             units this is the seasonal/weekend rate calendar. `price` is the default
             when no override matches. Later-listed overrides win where they overlap.
        losDiscounts:
          type: array
          items:
            $ref: '#/components/schemas/LosDiscount'
          description: |-
            Length-of-stay discounts applied to the NIGHTLY subtotal when a stay is at
             least `min_nights` long. The most generous matching discount applies.
        fees:
          type: array
          items:
            $ref: '#/components/schemas/Fee'
          description: |-
            Fees added on top of the base subtotal (e.g. cleaning, service). Each
             surfaces as a TYPE_FEE line in a booking's price_components.
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/Tax'
          description: |-
            Taxes applied to the taxable base (subtotal plus taxable fees). Each
             surfaces as a TYPE_TAX line in a booking's price_components.
        media:
          type: array
          items:
            $ref: '#/components/schemas/UnitMedia'
          description: Showcase gallery and documents for this unit (images, video, floor plans).
        applicablePromoCodes:
          type: array
          items:
            type: string
          description: |-
            Promo codes advertised as applicable to this unit (an allow-list shown to
             guests). Actual eligibility/validation still happens at booking time.
             Format: promo-codes/{promo_code}
        tags:
          type: array
          items:
            type: string
          description: Arbitrary tags for grouping and filtering.
        attributes:
          type: object
          description: Arbitrary attributes used for templating, policy, and segmentation.
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A bookable unit type within a property: a pool of `capacity` interchangeable
         rooms/units of the same kind (e.g. "Deluxe King", capacity 12). A Unit carries
         its own pricing, media, occupancy limit, and the promo codes advertised for
         it. The freebusy engine computes how many units are free for a window; its
         booking_mode decides whether availability is time slots or per-night counts.
    UnitMedia:
      required:
        - uri
        - type
      type: object
      properties:
        uri:
          type: string
          description: Publicly reachable URL of the asset (an S3/CDN link or any HTTPS URL).
        type:
          type: integer
          description: What kind of asset this is; DOCUMENT covers PDFs/policies/house rules.
          format: enum
        title:
          type: string
          description: Short human-readable caption/title for display.
        description:
          type: string
          description: Longer description or alt text.
        mimeType:
          type: string
          description: MIME type of the asset (e.g. "image/jpeg", "application/pdf"), when known.
        sortOrder:
          type: integer
          description: Ordering hint within a gallery; lower sorts first.
          format: int32
        primary:
          type: boolean
          description: Whether this is the primary/hero asset of its gallery.
      description: |-
        A media asset in a Unit's gallery. Identical in shape to `Media`; kept a
         separate message so the ORM gives it its own child table owned solely by the
         Unit (a single unit_id foreign key).
    ArchiveResourceRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The resource to archive.
             Format: resources/{resource}
      description: Request message for ArchiveResource.
    ListOfferingsResponse:
      type: object
      properties:
        offerings:
          type: array
          items:
            $ref: '#/components/schemas/Offering'
          description: The page of offerings.
        nextPageToken:
          type: string
          description: next page token. Omitted if this is the last page.
      description: Response message for ListOfferings.
    ListResourcesResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
          description: The page of resources.
        nextPageToken:
          type: string
          description: Next page token, if more results remain. Omitted if this is the last page.
      description: Response message for ListResources.
    Offering:
      required:
        - displayName
      type: object
      properties:
        name:
          type: string
          description: |-
            The offering name.
             Format: resources/{resource}/offerings/{offering}
        displayName:
          type: string
          description: Human-friendly name (e.g. "30-min consult").
        description:
          type: string
          description: Free-form description.
        duration:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Slot length. Required for TIME_SLOT resources; ignored for NIGHTLY.
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Price charged for the offering, interpreted per pricing_unit.
        pricingUnit:
          type: integer
          description: What the price is charged per.
          format: enum
        rateOverrides:
          type: array
          items:
            $ref: '#/components/schemas/RateOverride'
          description: |-
            Rate calendar: date- and weekday-scoped overrides of `price`. For NIGHTLY
             resources this is the seasonal/weekend rate calendar; for TIME_SLOT it
             varies slot price by date or day. `price` is the default when no override
             matches. Later-listed overrides win where they overlap.
        losDiscounts:
          type: array
          items:
            $ref: '#/components/schemas/LosDiscount'
          description: |-
            Length-of-stay discounts applied to the NIGHTLY subtotal when a stay is at
             least `min_nights` long. The most generous matching discount applies.
        fees:
          type: array
          items:
            $ref: '#/components/schemas/Fee'
          description: |-
            Fees added on top of the base subtotal (e.g. cleaning, service). Each
             surfaces as a TYPE_FEE line in a booking's price_components.
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/Tax'
          description: |-
            Taxes applied to the taxable base (subtotal plus taxable fees). Each
             surfaces as a TYPE_TAX line in a booking's price_components.
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A specific way a resource can be booked, carrying its duration and price. A
         "30-min consult" and a "60-min session" are two offerings on the same
         provider. For NIGHTLY resources the duration is unused and price is per-night.
    Resource:
      required:
        - displayName
        - type
        - bookingMode
        - timeZone
      type: object
      properties:
        name:
          type: string
          description: |-
            The resource name.
             Format: resources/{resource}
        displayName:
          type: string
          description: 'Human-friendly name (e.g. "Dr. Lee", "Deluxe King", "Kayak #3").'
        description:
          type: string
          description: Free-form description.
        type:
          type: integer
          description: What kind of bookable thing this is.
          format: enum
        bookingMode:
          type: integer
          description: |-
            How this resource is booked, and therefore the availability shape it
             yields. Immutable: flipping it after bookings exist would invalidate every
             existing booking and availability computation.
          format: enum
        capacity:
          type: integer
          description: Number of interchangeable units in the pool. Defaults to 1 when unset.
          format: int32
        timeZone:
          type: string
          description: |-
            IANA timezone (e.g. "America/New_York") the resource's hours and dates are
             evaluated in. Required so availability is timezone-correct.
        tags:
          type: array
          items:
            type: string
          description: Arbitrary tags for grouping and filtering.
        attributes:
          type: object
          description: Arbitrary attributes used for templating, policy, and segmentation.
        offerings:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Resource names of the offerings attached to this resource (e.g. "30-min
             consult"); manage them with the Offering standard methods.
             Format: resources/{resource}/offerings/{offering}
        state:
          readOnly: true
          type: integer
          description: Lifecycle state.
          format: enum
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
        updateTime:
          readOnly: true
          type: string
          description: Last-modification timestamp.
          format: date-time
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
      description: |-
        A bookable thing: a provider, room, piece of equipment, or a unit type. A
         resource is a pool of `capacity` interchangeable units; the freebusy engine
         computes how many are free for a given window. Its booking_mode decides
         whether availability is produced as time slots or per-night counts.
    UnarchiveResourceRequest:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: |-
            The resource to restore to the active state.
             Format: resources/{resource}
      description: Request message for UnarchiveResource.
    AvailabilityException:
      required:
        - kind
      type: object
      properties:
        name:
          type: string
          description: |-
            The exception name.
             Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}
        kind:
          type: integer
          description: Whether this span closes the unit or adds extra availability.
          format: enum
        window:
          allOf:
            - $ref: '#/components/schemas/TimeWindow'
          description: An exact time window, the natural form for TIME_SLOT units.
        dateRange:
          allOf:
            - $ref: '#/components/schemas/DateRange'
          description: |-
            A range of whole calendar dates in the unit's timezone, the natural
             form for NIGHTLY blackouts (e.g. "closed Dec 24 through Dec 26").
        reason:
          type: string
          description: Human-readable reason (e.g. "Public holiday").
        createTime:
          readOnly: true
          type: string
          description: Creation timestamp.
          format: date-time
      description: |-
        An override of a unit's normal hours on a specific span: a blackout /
         holiday closure, or extra hours beyond the recurring rules.
    BufferSettings:
      type: object
      properties:
        startDelta:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Prep time reserved before each booking.
        endDelta:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Turnover / cleaning time reserved after each booking.
        minNotice:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum lead time between now and a booking's start.
        maxAdvance:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: How far into the future bookings may be made.
        gap:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum gap enforced between two adjacent bookings.
      description: Buffer and notice settings applied around bookings.
    CancellationPolicy:
      type: object
      properties:
        tiers:
          type: array
          items:
            $ref: '#/components/schemas/RefundTier'
          description: |-
            Ordered refund tiers. For a given cancellation the tier with the largest
             `cutoff` that is still satisfied (cancelled at least `cutoff` before the
             booking start) determines the refund. If no tier is satisfied, the booking
             is non-refundable.
      description: Refund rules graded by how far ahead of a booking's start it is cancelled.
    ListAvailabilityExceptionsResponse:
      type: object
      properties:
        availabilityExceptions:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityException'
          description: The page of exceptions.
        nextPageToken:
          type: string
          description: Token for the next page of results. Empty if there are no more pages.
      description: Response message for ListAvailabilityExceptions.
    RecurringRule:
      required:
        - rrule
      type: object
      properties:
        rrule:
          type: string
          description: RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
        opens:
          type: string
          description: |-
            Local time-of-day the window opens, 24-hour "HH:MM" (e.g. "09:00").
             Unset (with closes also unset) means open the whole day.
        closes:
          type: string
          description: |-
            Local time-of-day the window closes, 24-hour "HH:MM" (e.g. "17:00").
             A closes at or before opens means the span crosses midnight into the next
             day (e.g. opens "22:00", closes "02:00").
      description: |-
        A recurring availability window expressed as an RRULE plus a daily open span.
         The freebusy engine expands these against the unit's timezone.
    RefundTier:
      required:
        - cutoff
        - refundPercent
      type: object
      properties:
        cutoff:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Minimum lead time before the booking start for this tier to apply (e.g. 48h).
        refundPercent:
          type: integer
          description: Percentage of the booking total refunded at this tier (0-100).
          format: int32
      description: |-
        One tier of a CancellationPolicy: cancel at least `cutoff` before the booking
         start to receive `refund_percent` of the total back.
    Schedule:
      type: object
      properties:
        name:
          type: string
          description: |-
            The schedule name.
             Format: properties/{property}/units/{unit}/schedule
        recurringRules:
          type: array
          items:
            $ref: '#/components/schemas/RecurringRule'
          description: Recurring working hours.
        buffers:
          allOf:
            - $ref: '#/components/schemas/BufferSettings'
          description: Buffer and notice settings.
        stayConstraints:
          allOf:
            - $ref: '#/components/schemas/StayConstraints'
          description: Stay rules (NIGHTLY units).
        exceptions:
          readOnly: true
          type: array
          items:
            type: string
          description: |-
            Resource names of the active exceptions; manage them with the
             AvailabilityException standard methods.
             Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}
        cancellationPolicy:
          allOf:
            - $ref: '#/components/schemas/CancellationPolicy'
          description: |-
            Refund rules applied when a booking on this unit is cancelled. Unset
             means cancellations are non-refundable by default.
        etag:
          type: string
          description: Opaque version for optimistic concurrency (AIP-154); echo on update.
      description: |-
        Aggregate read view of a unit's availability configuration: the inputs the
         freebusy engine consumes. Modeled as a singleton resource, one per unit.
    StayConstraints:
      type: object
      properties:
        minNights:
          type: integer
          description: Minimum number of nights per booking.
          format: int32
        maxNights:
          type: integer
          description: Maximum number of nights per booking. Zero means no maximum.
          format: int32
        checkinWeekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Allowed check-in weekdays. Empty means any day.
        checkoutWeekdays:
          type: array
          items:
            type: integer
            format: enum
          description: Allowed check-out weekdays. Empty means any day.
        advanceMinDays:
          type: integer
          description: Earliest a stay may begin, in days from now.
          format: int32
        advanceMaxDays:
          type: integer
          description: Latest a stay may begin, in days from now. Zero means no limit.
          format: int32
      description: Stay rules that affect bookability for NIGHTLY units.
