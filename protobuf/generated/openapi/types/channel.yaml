components:
  schemas:
    freebusy.channel.v1.AriUpdate:
      description: One day's availability, rate, and restrictions for a unit — the
        atomic unit of an outbound ARI push. It is the channel-facing projection of
        the unit's price and its Schedule's stay constraints for a single date.
      properties:
        available:
          description: Number of units available to sell on this date.
          format: int32
          type: integer
        date:
          description: The date (in the unit's timezone) the values apply to.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        rate:
          description: Nightly rate to publish for this date.
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        restrictions:
          description: Booking restrictions to publish for this date.
          properties:
            arrivalClosed:
              description: 'Closed to arrival: a stay may not start on this date.'
              type: boolean
            departureClosed:
              description: 'Closed to departure: a stay may not end on this date.'
              type: boolean
            maxStay:
              description: Maximum length of stay. Zero means no maximum.
              format: int32
              type: integer
            minStay:
              description: Minimum length of stay. Zero means no minimum.
              format: int32
              type: integer
            stopSell:
              description: 'Stop-sell: the unit is not sellable on this date regardless
                of inventory.'
              type: boolean
          type: object
        unit:
          description: 'The unit this update is for. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.channel.v1.Channel:
      description: 'A connection between one property and one distribution channel
        (OTA/GDS). It is the anchor for 2-way ARI: availability/rates/inventory are
        pushed out per mapped unit, and reservations made on the channel are pulled
        in as bookings. Credentials are never carried in the API — only an opaque
        handle to where they are stored.'
      properties:
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        credentialRef:
          description: Opaque handle to the stored credentials for this connection
            (a secret-manager key or vault path). The secrets themselves are never
            returned by the API.
          type: string
        displayName:
          description: Human-friendly label (e.g. "Booking.com — Goa Resort").
          type: string
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
          type: string
        externalPropertyId:
          description: The channel's own code for this hotel (e.g. the Booking.com
            hotel id).
          type: string
        lastSyncTime:
          description: When ARI/reservations last synced successfully.
          format: date-time
          type: string
        name:
          description: 'The channel name. Format: channels/{channel}'
          type: string
        property:
          description: 'The property this channel distributes. Format: properties/{property}'
          type: string
        state:
          description: Connection state.
          enum:
          - CHANNEL_STATE_UNSPECIFIED
          - CHANNEL_STATE_CONNECTED
          - CHANNEL_STATE_DISABLED
          - CHANNEL_STATE_ERROR
          type: string
        type:
          description: 'Which OTA/GDS this connects to. Immutable: the adapter and
            external ID space are fixed per channel.'
          enum:
          - CHANNEL_TYPE_UNSPECIFIED
          - CHANNEL_TYPE_AGODA
          - CHANNEL_TYPE_BOOKING_COM
          - CHANNEL_TYPE_EXPEDIA
          - CHANNEL_TYPE_AIRBNB
          - CHANNEL_TYPE_MAKEMYTRIP
          - CHANNEL_TYPE_GOIBIBO
          - CHANNEL_TYPE_GDS
          - CHANNEL_TYPE_DIRECT
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
      type: object
    freebusy.channel.v1.ExternalReservation:
      description: A reservation as it exists on the channel, landed inbound so it
        can be reconciled into a freebusy Booking. The unit is resolved from the channel's
        external ids via the UnitMapping.
      properties:
        channel:
          description: 'The channel the reservation came from. Format: channels/{channel}'
          type: string
        externalId:
          description: The channel's own id for this reservation (used for idempotency
            and modify/cancel matching).
          type: string
        guest:
          description: Guest contact details supplied by the channel.
          properties:
            displayName:
              description: Full name of the guest.
              type: string
            email:
              description: Email address for the confirmation and any follow-ups.
              type: string
            phoneNumber:
              description: Phone number in E.164 form (e.g. "+14155552671").
              type: string
          type: object
        op:
          description: Whether this is a create, modify, or cancel.
          enum:
          - RESERVATION_OP_UNSPECIFIED
          - RESERVATION_OP_CREATE
          - RESERVATION_OP_MODIFY
          - RESERVATION_OP_CANCEL
          type: string
        stay:
          description: 'The stay: check-in to check-out (end_date is the check-out
            date).'
          properties:
            endDate:
              description: Exclusive end date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            startDate:
              description: Inclusive first date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
          type: object
        total:
          description: The reservation total as charged on the channel.
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        unit:
          description: 'The resolved freebusy unit being booked. Format: properties/{property}/units/{unit}'
          type: string
        units:
          description: Number of units / rooms reserved. Defaults to 1.
          format: int32
          type: integer
      type: object
    freebusy.channel.v1.Restrictions:
      description: Sell restrictions published to a channel for a date.
      properties:
        arrivalClosed:
          description: 'Closed to arrival: a stay may not start on this date.'
          type: boolean
        departureClosed:
          description: 'Closed to departure: a stay may not end on this date.'
          type: boolean
        maxStay:
          description: Maximum length of stay. Zero means no maximum.
          format: int32
          type: integer
        minStay:
          description: Minimum length of stay. Zero means no minimum.
          format: int32
          type: integer
        stopSell:
          description: 'Stop-sell: the unit is not sellable on this date regardless
            of inventory.'
          type: boolean
      type: object
    freebusy.channel.v1.SyncEvent:
      description: A record of one sync attempt, for observability of the ARI push
        / reservation pull. Returned by ListSyncEvents; not a standalone resource.
      properties:
        channel:
          description: 'The channel involved. Format: channels/{channel}'
          type: string
        date:
          description: The date the event concerned, when applicable.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        direction:
          description: Whether this was an outbound push or an inbound pull.
          enum:
          - SYNC_DIRECTION_UNSPECIFIED
          - SYNC_DIRECTION_OUTBOUND
          - SYNC_DIRECTION_INBOUND
          type: string
        error:
          description: Human-readable error when state is FAILED.
          type: string
        eventTime:
          description: When the event occurred.
          format: date-time
          type: string
        state:
          description: Outcome.
          enum:
          - SYNC_STATE_UNSPECIFIED
          - SYNC_STATE_PENDING
          - SYNC_STATE_SUCCESS
          - SYNC_STATE_FAILED
          type: string
        unit:
          description: 'The unit involved, when the event is unit-scoped. Format:
            properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.channel.v1.UnitMapping:
      description: 'Maps a freebusy Unit to its counterpart on the channel. ARI for
        a unit only flows once a MAPPED mapping exists: the external room-type and
        rate-plan ids key the availability/rate/restriction push and resolve inbound
        reservations back to the right unit.'
      properties:
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
          type: string
        externalRatePlanId:
          description: The channel's rate-plan id this unit maps to.
          type: string
        externalRoomTypeId:
          description: The channel's room-type id this unit maps to.
          type: string
        name:
          description: 'The mapping name. Format: channels/{channel}/unitMappings/{unit_mapping}'
          type: string
        state:
          description: Mapping state.
          enum:
          - MAPPING_STATE_UNSPECIFIED
          - MAPPING_STATE_MAPPED
          - MAPPING_STATE_UNMAPPED
          type: string
        unit:
          description: 'The freebusy unit being mapped. Format: properties/{property}/units/{unit}'
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
