          - ID_DOCUMENT_TYPE_DRIVING_LICENSE
          - ID_DOCUMENT_TYPE_AADHAAR
          - ID_DOCUMENT_TYPE_VOTER_ID
          - ID_DOCUMENT_TYPE_OTHER
          type: string
      type: object
