components:
  schemas:
    freebusy.identity.v1.ForeignerDetails:
      description: Foreigner-registration details a hotel must capture for foreign
        nationals to file Form C with the FRRO within 24 hours of arrival (India).
        Nationals of exempt countries (e.g. Nepal, Bhutan) and diplomats may omit
        these.
      properties:
        arrivalDate:
          description: Date the guest arrived in the country.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        entryPort:
          description: Port / place of entry into the country.
          type: string
        nextDestination:
          description: The guest's next destination after this stay.
          type: string
        origin:
          description: Where the guest is arriving from (last city / country).
          type: string
        visaExpiryDate:
          description: Date the visa expires.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        visaIssueDate:
          description: Date the visa was issued.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        visaIssuePlace:
          description: Place the visa was issued.
          type: string
        visaNumber:
          description: Visa number.
          type: string
        visaType:
          description: Visa type / category (e.g. "Tourist", "Business", "Employment").
          type: string
        visitPurpose:
          description: Purpose of visit (e.g. "Tourism", "Business", "Medical").
          type: string
      type: object
    freebusy.identity.v1.Guest:
      description: 'A guest is a person who stays under a booking. It is one of three
        distinct people the system models, all in the identity domain: - User (identity.proto):
        the account that signs in and books online. - Guest (this message): a person
        actually staying — the party on a booking. - Member (organisation): hotel
        staff who manage the chain/property.'
      properties:
        ageGroup:
          description: Age bracket; given explicitly, or derived from birth_date by
            the server.
          enum:
          - AGE_GROUP_UNSPECIFIED
          - AGE_GROUP_ADULT
          - AGE_GROUP_CHILD
          - AGE_GROUP_INFANT
          type: string
        birthDate:
          description: Date of birth.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        displayName:
          description: Full legal name, exactly as on the presented ID / passport.
          type: string
        email:
          description: Contact email (typically only for the lead guest).
          type: string
        foreigner:
          description: Foreigner-registration details, present when the guest is a
            foreign national (drives Form C / FRRO filing). Omitted for domestic guests.
          properties:
            arrivalDate:
              description: Date the guest arrived in the country.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            entryPort:
              description: Port / place of entry into the country.
              type: string
            nextDestination:
              description: The guest's next destination after this stay.
              type: string
            origin:
              description: Where the guest is arriving from (last city / country).
              type: string
            visaExpiryDate:
              description: Date the visa expires.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            visaIssueDate:
              description: Date the visa was issued.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            visaIssuePlace:
              description: Place the visa was issued.
              type: string
            visaNumber:
              description: Visa number.
              type: string
            visaType:
              description: Visa type / category (e.g. "Tourist", "Business", "Employment").
              type: string
            visitPurpose:
              description: Purpose of visit (e.g. "Tourism", "Business", "Medical").
              type: string
          type: object
        gender:
          description: Gender as recorded for registration.
          enum:
          - GENDER_UNSPECIFIED
          - GENDER_MALE
          - GENDER_FEMALE
          - GENDER_OTHER
          - GENDER_UNDISCLOSED
          type: string
        idDocument:
          description: Government identity document presented at check-in.
          properties:
            attachment:
              description: Scanned copy or photo of the document, uploaded at check-in.
              properties:
                content:
                  description: Raw file content, stored inline in the database. Cleared
                    once the file is migrated to object storage, at which point `uri`
                    takes over.
                  format: byte
                  type: string
                filename:
                  description: Original filename as uploaded.
                  type: string
                mimeType:
                  description: MIME type of the file (e.g. "application/pdf", "image/jpeg").
                  type: string
                sizeBytes:
                  description: Size of the file in bytes.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
                uploadTime:
                  description: When the file was uploaded.
                  format: date-time
                  type: string
                uri:
                  description: Location of the file once moved to object storage (e.g.
                    an s3:// or https:// URL). Unset while the file lives inline in
                    `content`.
                  type: string
              type: object
            expiryDate:
              description: Date the document expires.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            issueDate:
              description: Date the document was issued.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            issuePlace:
              description: Place of issue (city / office), as printed on the document.
              type: string
            issuingCountry:
              description: Issuing country as an ISO 3166-1 alpha-2 code.
              type: string
            number:
              description: The document number.
              type: string
            type:
              description: Which kind of document this is.
              enum:
              - ID_DOCUMENT_TYPE_UNSPECIFIED
              - ID_DOCUMENT_TYPE_PASSPORT
              - ID_DOCUMENT_TYPE_NATIONAL_ID
              - ID_DOCUMENT_TYPE_DRIVING_LICENSE
              - ID_DOCUMENT_TYPE_AADHAAR
              - ID_DOCUMENT_TYPE_VOTER_ID
              - ID_DOCUMENT_TYPE_OTHER
              type: string
          type: object
        localAddress:
          description: Local address / reference in the country of stay (the "address
            in India" field on Form C).
          properties:
            addressLines:
              description: Unstructured address lines describing the lower levels
                of an address.
              items:
                type: string
              type: array
            administrativeArea:
              description: Optional. Highest administrative subdivision which is used
                for postal addresses of a country or region. For example, this can
                be a state, a province, an oblast, or a prefecture. For Spain, this
                is the province and not the autonomous community (for example, "Barcelona"
                and not "Catalonia"). Many countries don't use an administrative area
                in postal addresses. For example, in Switzerland, this should be left
                unpopulated.
              type: string
            languageCode:
              description: Optional. BCP-47 language code of the contents of this
                address (if known). This is often the UI language of the input form
                or is expected to match one of the languages used in the address'
                country/region, or their transliterated equivalents. This can affect
                formatting in certain countries, but is not critical to the correctness
                of the data and will never affect any validation or other non-formatting
                related operations.
              type: string
            locality:
              description: 'Optional. Generally refers to the city or town portion
                of the address. Examples: US city, IT comune, UK post town. In regions
                of the world where localities are not well defined or do not fit into
                this structure well, leave `locality` empty and use `address_lines`.'
              type: string
            organization:
              description: Optional. The name of the organization at the address.
              type: string
            postalCode:
              description: Optional. Postal code of the address. Not all countries
                use or require postal codes to be present, but where they are used,
                they may trigger additional validation with other parts of the address
                (for example, state or zip code validation in the United States).
              type: string
            recipients:
              description: Optional. The recipient at the address. This field may,
                under certain circumstances, contain multiline information. For example,
                it might contain "care of" information.
              items:
                type: string
              type: array
            regionCode:
              description: 'Required. CLDR region code of the country/region of the
                address. This is never inferred and it is up to the user to ensure
                the value is correct. See https://cldr.unicode.org/ and https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
                for details. Example: "CH" for Switzerland.'
              type: string
            revision:
              description: The schema revision of the `PostalAddress`. This must be
                set to 0, which is the latest revision.
              format: int32
              type: integer
            sortingCode:
              description: Optional. Additional, country-specific, sorting code. This
                is not used in most regions. Where it is used, the value is either
                a string like "CEDEX", optionally followed by a number (for example,
                "CEDEX 7"), or just a number alone, representing the "sector code"
                (Jamaica), "delivery area indicator" (Malawi) or "post office indicator"
                (Côte d'Ivoire).
              type: string
            sublocality:
              description: Optional. Sublocality of the address. For example, this
                can be a neighborhood, borough, or district.
              type: string
          type: object
        nationality:
          description: Nationality as an ISO 3166-1 alpha-2 country code (e.g. "IN",
            "GB", "US"). Required for foreign-national registration.
          type: string
        permanentAddress:
          description: Permanent / home address in the country of residence.
          properties:
            addressLines:
              description: Unstructured address lines describing the lower levels
                of an address.
              items:
                type: string
              type: array
            administrativeArea:
              description: Optional. Highest administrative subdivision which is used
                for postal addresses of a country or region. For example, this can
                be a state, a province, an oblast, or a prefecture. For Spain, this
                is the province and not the autonomous community (for example, "Barcelona"
                and not "Catalonia"). Many countries don't use an administrative area
                in postal addresses. For example, in Switzerland, this should be left
                unpopulated.
              type: string
            languageCode:
              description: Optional. BCP-47 language code of the contents of this
                address (if known). This is often the UI language of the input form
                or is expected to match one of the languages used in the address'
                country/region, or their transliterated equivalents. This can affect
                formatting in certain countries, but is not critical to the correctness
                of the data and will never affect any validation or other non-formatting
                related operations.
              type: string
            locality:
              description: 'Optional. Generally refers to the city or town portion
                of the address. Examples: US city, IT comune, UK post town. In regions
                of the world where localities are not well defined or do not fit into
                this structure well, leave `locality` empty and use `address_lines`.'
              type: string
            organization:
              description: Optional. The name of the organization at the address.
              type: string
            postalCode:
              description: Optional. Postal code of the address. Not all countries
                use or require postal codes to be present, but where they are used,
                they may trigger additional validation with other parts of the address
                (for example, state or zip code validation in the United States).
              type: string
            recipients:
              description: Optional. The recipient at the address. This field may,
                under certain circumstances, contain multiline information. For example,
                it might contain "care of" information.
              items:
                type: string
              type: array
            regionCode:
              description: 'Required. CLDR region code of the country/region of the
                address. This is never inferred and it is up to the user to ensure
                the value is correct. See https://cldr.unicode.org/ and https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
                for details. Example: "CH" for Switzerland.'
              type: string
            revision:
              description: The schema revision of the `PostalAddress`. This must be
                set to 0, which is the latest revision.
              format: int32
              type: integer
            sortingCode:
              description: Optional. Additional, country-specific, sorting code. This
                is not used in most regions. Where it is used, the value is either
                a string like "CEDEX", optionally followed by a number (for example,
                "CEDEX 7"), or just a number alone, representing the "sector code"
                (Jamaica), "delivery area indicator" (Malawi) or "post office indicator"
                (Côte d'Ivoire).
              type: string
            sublocality:
              description: Optional. Sublocality of the address. For example, this
                can be a neighborhood, borough, or district.
              type: string
          type: object
        phoneNumber:
          description: Contact phone in E.164 form (typically only for the lead guest).
          type: string
        preferences:
          description: The guest's own stay preferences and special requests, kept
            with the guest so they travel with them across the booking.
          properties:
            accessibility:
              description: Accessibility needs (e.g. "wheelchair", "hearing-accessible",
                "ground-floor").
              items:
                type: string
              type: array
            bed:
              description: Preferred bed type.
              enum:
              - BED_PREFERENCE_UNSPECIFIED
              - BED_PREFERENCE_NO_PREFERENCE
              - BED_PREFERENCE_KING
              - BED_PREFERENCE_QUEEN
              - BED_PREFERENCE_TWIN
              - BED_PREFERENCE_SINGLE
              type: string
            dietary:
              description: Dietary requirements / requests (e.g. "vegetarian", "jain",
                "halal", "gluten-free").
              items:
                type: string
              type: array
            floorPreference:
              description: Preferred floor; 0 means no preference.
              format: int32
              type: integer
            loyaltyNumber:
              description: Loyalty-programme membership number, if any.
              type: string
            notes:
              description: Any additional free-text notes about the guest.
              type: string
            smoking:
              description: Preferred smoking / non-smoking room.
              enum:
              - SMOKING_PREFERENCE_UNSPECIFIED
              - SMOKING_PREFERENCE_NON_SMOKING
              - SMOKING_PREFERENCE_SMOKING
              type: string
            specialRequests:
              description: Free-form special requests (e.g. "late check-in", "crib",
                "high floor").
              items:
                type: string
              type: array
          type: object
        primary:
          description: Whether this is the lead / primary guest (the registered occupant
            the booking is held under). Exactly one guest in a party is primary.
          type: boolean
      type: object
    freebusy.identity.v1.GuestPreferences:
      description: A guest's stay preferences and special requests. All optional;
        used to guide unit assignment and to surface requests to housekeeping / front
        desk.
      properties:
        accessibility:
          description: Accessibility needs (e.g. "wheelchair", "hearing-accessible",
            "ground-floor").
          items:
            type: string
          type: array
        bed:
          description: Preferred bed type.
          enum:
          - BED_PREFERENCE_UNSPECIFIED
          - BED_PREFERENCE_NO_PREFERENCE
          - BED_PREFERENCE_KING
          - BED_PREFERENCE_QUEEN
          - BED_PREFERENCE_TWIN
          - BED_PREFERENCE_SINGLE
          type: string
        dietary:
          description: Dietary requirements / requests (e.g. "vegetarian", "jain",
            "halal", "gluten-free").
          items:
            type: string
          type: array
        floorPreference:
          description: Preferred floor; 0 means no preference.
          format: int32
          type: integer
        loyaltyNumber:
          description: Loyalty-programme membership number, if any.
          type: string
        notes:
          description: Any additional free-text notes about the guest.
          type: string
        smoking:
          description: Preferred smoking / non-smoking room.
          enum:
          - SMOKING_PREFERENCE_UNSPECIFIED
          - SMOKING_PREFERENCE_NON_SMOKING
          - SMOKING_PREFERENCE_SMOKING
          type: string
        specialRequests:
          description: Free-form special requests (e.g. "late check-in", "crib", "high
            floor").
          items:
            type: string
          type: array
      type: object
    freebusy.identity.v1.IdDocument:
      description: A government identity document. Passport fields are required for
        foreign nationals; domestic guests may present any accepted document type.
      properties:
        attachment:
          description: Scanned copy or photo of the document, uploaded at check-in.
