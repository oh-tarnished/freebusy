components:
  schemas:
    freebusy.shared.v1.IdempotencyKey:
      description: 'The record behind every `request_id` field in this API: it remembers
        what the first call with a given id returned, so a retry replays that response
        instead of attempting the write twice. Storage only — no service exposes it,
        and no caller constructs one. It lives in freebusy.shared.v1 because request_id
        is API-wide (booking, property, promo code, channel, organisation, schedule)
        and one interceptor records them all; homing it in any single service''s package
        would make every other service import that service to dedupe its own writes.'
      properties:
        createTime:
          description: When the key was claimed.
          format: date-time
          type: string
        method:
          description: 'Fully-qualified RPC that was called, e.g. "/freebusy.booking.v1.BookingService/CreateBooking".
            Part of the key: the same request_id replayed against a different method
            is a different request.'
          type: string
        name:
          description: 'The key name. The final segment is a digest of (method, request_id).
            Format: idempotencyKeys/{idempotency_key}'
          type: string
        requestId:
          description: The caller-supplied idempotency key, verbatim from the request's
            `request_id` field.
          type: string
        response:
          description: 'What the first call returned: a google.protobuf.Any holding
            the response message, encoded as protojson. Empty while IN_FLIGHT. Stored
            as text rather than bytes so it round-trips identically through GORM and
            through Hasura''s GraphQL, and self-describing (the Any carries its @type)
            so a replay can rebuild the exact response message without knowing which
            RPC wrote it.'
          type: string
        state:
          description: Whether the first call is still running or has settled.
          enum:
          - IDEMPOTENCY_STATE_UNSPECIFIED
          - IDEMPOTENCY_STATE_IN_FLIGHT
          - IDEMPOTENCY_STATE_DONE
          type: string
        updateTime:
          description: When the key settled to DONE.
          format: date-time
          type: string
      type: object
    freebusy.shared.v1.IdempotencyState:
      description: Lifecycle of a recorded request. A key is claimed IN_FLIGHT before
        the handler runs and settles to DONE once its response is recorded; a handler
        that fails deletes its key, so the caller may genuinely retry.
      enum:
      - IDEMPOTENCY_STATE_UNSPECIFIED
      - IDEMPOTENCY_STATE_IN_FLIGHT
      - IDEMPOTENCY_STATE_DONE
      type: string
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
