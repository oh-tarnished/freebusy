components:
  schemas:
    freebusy.identity.v1.GetUserRequest:
      description: Request message for GetUser.
      properties:
        name:
          description: 'The user to retrieve. Use "users/me" for the signed-in caller.
            Format: users/{user}'
          type: string
      type: object
    freebusy.identity.v1.ListUsersRequest:
      description: Request message for ListUsers. Users are global; use OrganisationService
        and the booking/property services to relate a user to a chain or property.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. a match on display_name or
            email.
          type: string
        orderBy:
          description: Sort order, e.g. "display_name" or "create_time desc".
          type: string
        pageSize:
          description: Maximum number of users to return. Must be at most 1000; larger
            values are rejected.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListUsers call's next_page_token.
          type: string
      type: object
    freebusy.identity.v1.ListUsersResponse:
      description: Response message for ListUsers.
      properties:
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
        users:
          description: The page of users.
          items:
            description: 'A signed-in person. Identity is deliberately thin: actual
              login is an OIDC redirect flow handled over plain HTTP by the IdP, so
              most of "auth" never appears as an RPC. Email and identity come from
              the IdP and are read-only here; only profile preferences are editable.'
            properties:
              avatarUrl:
                description: Avatar image URL.
                type: string
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              displayName:
                description: Display name.
                type: string
              email:
                description: Email address, sourced from the IdP.
                type: string
              etag:
                description: Opaque version for optimistic concurrency (AIP-154);
                  echo on update.
                type: string
              locale:
                description: BCP 47 locale (e.g. "en-US").
                type: string
              name:
                description: 'The user name. The alias "users/me" resolves to the
                  caller. Format: users/{user}'
                type: string
              timeZone:
                description: IANA time zone (e.g. "America/New_York").
                type: string
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
            type: object
          type: array
      type: object
    freebusy.identity.v1.UpdateUserRequest:
      description: Request message for UpdateUser.
      properties:
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable profile fields.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
        user:
          description: The user to update; its name identifies the target (typically
            "users/me").
          properties:
            avatarUrl:
              description: Avatar image URL.
              type: string
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            displayName:
              description: Display name.
              type: string
            email:
              description: Email address, sourced from the IdP.
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update.
              type: string
            locale:
              description: BCP 47 locale (e.g. "en-US").
              type: string
            name:
              description: 'The user name. The alias "users/me" resolves to the caller.
                Format: users/{user}'
              type: string
            timeZone:
              description: IANA time zone (e.g. "America/New_York").
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
      type: object
    freebusy.identity.v1.User:
      description: 'A signed-in person. Identity is deliberately thin: actual login
        is an OIDC redirect flow handled over plain HTTP by the IdP, so most of "auth"
        never appears as an RPC. Email and identity come from the IdP and are read-only
        here; only profile preferences are editable.'
      properties:
        avatarUrl:
          description: Avatar image URL.
          type: string
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        displayName:
          description: Display name.
          type: string
        email:
          description: Email address, sourced from the IdP.
          type: string
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update.
          type: string
        locale:
          description: BCP 47 locale (e.g. "en-US").
          type: string
        name:
          description: 'The user name. The alias "users/me" resolves to the caller.
            Format: users/{user}'
          type: string
        timeZone:
          description: IANA time zone (e.g. "America/New_York").
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
