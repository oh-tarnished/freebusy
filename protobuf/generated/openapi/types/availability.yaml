components:
  schemas:
    freebusy.availability.v1.AvailabilityMatch:
      description: One unit matched by SearchAvailability, with a lead price for the
        period. Detailed slots/nights are fetched per unit via ComputeAvailability.
      properties:
        bookable:
          description: Whether the unit is bookable for the requested period and units.
          type: boolean
        displayName:
          description: Cached display name of the unit, for convenience.
          type: string
        mode:
          description: The unit's booking mode.
          enum:
          - BOOKING_MODE_UNSPECIFIED
          - BOOKING_MODE_TIME_SLOT
          - BOOKING_MODE_NIGHTLY
          type: string
        price:
          description: 'Lead price for the requested period: the stay total for NIGHTLY,
            or the slot price for TIME_SLOT. Used for sorting and display.'
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        unit:
          description: 'The matching unit. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.availability.v1.BatchComputeAvailabilityRequest:
      description: Request message for BatchComputeAvailability. Each entry is a full
        ComputeAvailabilityRequest (AIP-231), so per-unit duration and units all work
        in batch exactly as they do in the single call.
      properties:
        requests:
          description: The individual compute requests. Results are returned in the
            same order.
          items:
            description: Request message for ComputeAvailability.
            properties:
              dateRange:
                description: A calendar-date range in the unit's timezone, the natural
                  form for NIGHTLY units; end_date is the check-out date.
                properties:
                  endDate:
                    description: Exclusive end date of the range.
                    properties:
                      day:
                        description: Day of a month. Must be from 1 to 31 and valid
                          for the year and month, or 0 to specify a year by itself
                          or a year and month where the day isn't significant.
                        format: int32
                        type: integer
                      month:
                        description: Month of a year. Must be from 1 to 12, or 0 to
                          specify a year without a month and day.
                        format: int32
                        type: integer
                      year:
                        description: Year of the date. Must be from 1 to 9999, or
                          0 to specify a date without a year.
                        format: int32
                        type: integer
                    type: object
                  startDate:
                    description: Inclusive first date of the range.
                    properties:
                      day:
                        description: Day of a month. Must be from 1 to 31 and valid
                          for the year and month, or 0 to specify a year by itself
                          or a year and month where the day isn't significant.
                        format: int32
                        type: integer
                      month:
                        description: Month of a year. Must be from 1 to 12, or 0 to
                          specify a year without a month and day.
                        format: int32
                        type: integer
                      year:
                        description: Year of the date. Must be from 1 to 9999, or
                          0 to specify a date without a year.
                        format: int32
                        type: integer
                    type: object
                type: object
              duration:
                description: Slot length for TIME_SLOT units. Overrides the unit's
                  default duration when set; ignored for NIGHTLY units.
                type: string
              unit:
                description: 'The unit to compute availability for. Format: properties/{property}/units/{unit}'
                type: string
              units:
                description: Number of units required to be free. Defaults to 1.
                format: int32
                type: integer
              window:
                description: An exact time window, the natural form for TIME_SLOT
                  units.
                properties:
                  endTime:
                    description: Exclusive end of the interval.
                    format: date-time
                    type: string
                  startTime:
                    description: Inclusive start of the interval.
                    format: date-time
                    type: string
                type: object
            type: object
          type: array
      type: object
    freebusy.availability.v1.BatchComputeAvailabilityResponse:
      description: Response message for BatchComputeAvailability.
      properties:
        units:
          description: Availability per request, in request order.
          items:
            description: Availability for one unit, used in batch responses.
            properties:
              mode:
                description: Which shape is populated, matching the unit's booking_mode.
                enum:
                - BOOKING_MODE_UNSPECIFIED
                - BOOKING_MODE_TIME_SLOT
                - BOOKING_MODE_NIGHTLY
                type: string
              nights:
                description: Per-night availability, when mode is NIGHTLY.
                items:
                  description: Per-night availability, produced for NIGHTLY units.
                  properties:
                    closed:
                      description: Whether the unit is closed that night (exception/blackout).
                      type: boolean
                    freeUnits:
                      description: Number of units of the pool free that night.
                      format: int32
                      type: integer
                    night:
                      description: The night, in the unit's local timezone.
                      properties:
                        day:
                          description: Day of a month. Must be from 1 to 31 and valid
                            for the year and month, or 0 to specify a year by itself
                            or a year and month where the day isn't significant.
                          format: int32
                          type: integer
                        month:
                          description: Month of a year. Must be from 1 to 12, or 0
                            to specify a year without a month and day.
                          format: int32
                          type: integer
                        year:
                          description: Year of the date. Must be from 1 to 9999, or
                            0 to specify a date without a year.
                          format: int32
                          type: integer
                      type: object
                    price:
                      description: Nightly price, derived from the unit's pricing.
                      properties:
                        currencyCode:
                          description: The three-letter currency code defined in ISO
                            4217.
                          type: string
                        nanos:
                          description: Number of nano (10^-9) units of the amount.
                            The value must be between -999,999,999 and +999,999,999
                            inclusive. If `units` is positive, `nanos` must be positive
                            or zero. If `units` is zero, `nanos` can be positive,
                            zero, or negative. If `units` is negative, `nanos` must
                            be negative or zero. For example $-1.75 is represented
                            as `units`=-1 and `nanos`=-750,000,000.
                          format: int32
                          type: integer
                        units:
                          description: The whole units of the amount. For example
                            if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                          format: int64
                          type: integer
                          x-kubernetes-int-or-string: true
                      type: object
                  type: object
                type: array
              slots:
                description: Slots, when mode is TIME_SLOT.
                items:
                  description: A discrete bookable time slot, produced for TIME_SLOT
                    units.
                  properties:
                    bookable:
                      description: Whether the slot can actually be booked (free and
                        passes policy).
                      type: boolean
                    endTime:
                      description: Exclusive end of the slot (start + unit/requested
                        duration).
                      format: date-time
                      type: string
                    freeCount:
                      description: Number of units free in this slot (capacity minus
                        overlapping bookings).
                      format: int32
                      type: integer
                    price:
                      description: Price for booking this slot, derived from the unit's
                        pricing.
                      properties:
                        currencyCode:
                          description: The three-letter currency code defined in ISO
                            4217.
                          type: string
                        nanos:
                          description: Number of nano (10^-9) units of the amount.
                            The value must be between -999,999,999 and +999,999,999
                            inclusive. If `units` is positive, `nanos` must be positive
                            or zero. If `units` is zero, `nanos` can be positive,
                            zero, or negative. If `units` is negative, `nanos` must
                            be negative or zero. For example $-1.75 is represented
                            as `units`=-1 and `nanos`=-750,000,000.
                          format: int32
                          type: integer
                        units:
                          description: The whole units of the amount. For example
                            if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                          format: int64
                          type: integer
                          x-kubernetes-int-or-string: true
                      type: object
                    startTime:
                      description: Inclusive start of the slot.
                      format: date-time
                      type: string
                  type: object
                type: array
              unit:
                description: 'The unit these results are for. Format: properties/{property}/units/{unit}'
                type: string
            type: object
          type: array
      type: object
    freebusy.availability.v1.BookableRange:
      description: A contiguous span that is bookable end to end.
      properties:
        bookable:
          description: Whether the whole span is bookable.
          type: boolean
        window:
          description: The bookable span.
          properties:
            endTime:
              description: Exclusive end of the interval.
              format: date-time
              type: string
            startTime:
              description: Inclusive start of the interval.
              format: date-time
              type: string
          type: object
      type: object
    freebusy.availability.v1.CheckAvailabilityRequest:
      description: Request message for CheckAvailability.
