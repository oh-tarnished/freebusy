    freebusy.availability.v1.SearchAvailabilityRequest:
      description: 'Request message for SearchAvailability. Sweeps the catalog for
        units that are bookable over a period for a given party size, narrowed by
        a filter and optionally scoped to one property (hotel) or organisation (chain),
        and sorted for presentation. This is the storefront query: one call returns
        the matching units with a lead price, rather than the caller listing units
        and computing availability for each.'
      properties:
        dateRange:
          description: A calendar-date range in each unit's timezone, the natural
            form for NIGHTLY units; end_date is the check-out date.
          properties:
            endDate:
              description: Exclusive end date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            startDate:
              description: Inclusive first date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
          type: object
        filter:
          description: Filter (AIP-160) over unit fields to narrow the catalog, e.g.
            `type = UNIT_TYPE_ROOM`, `tags:"beachfront"`, or a display_name match.
          type: string
        includeUnavailable:
          description: If true, include units that matched the filter but are not
            bookable for the period (with bookable=false), instead of dropping them.
          type: boolean
        orderBy:
          description: Sort order for matches, e.g. "price" or "price desc". Defaults
            to price ascending.
          type: string
        organisation:
          description: 'Scope the search to a single organisation (chain). Empty searches
            all organisations the caller can see. Format: organisations/{organisation}'
          type: string
        pageSize:
          description: Maximum number of matches to return. The server may cap this.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous SearchAvailability call's next_page_token.
          type: string
        property:
          description: 'Scope the search to a single property (hotel). Empty searches
            all properties. Format: properties/{property}'
          type: string
        units:
          description: Number of units / party size required free. Defaults to 1.
          format: int32
          type: integer
        window:
          description: An exact time window, the natural form for TIME_SLOT units.
          properties:
            endTime:
              description: Exclusive end of the interval.
              format: date-time
              type: string
            startTime:
              description: Inclusive start of the interval.
              format: date-time
              type: string
          type: object
      type: object
    freebusy.availability.v1.SearchAvailabilityResponse:
      description: Response message for SearchAvailability.
      properties:
        matches:
          description: The matching units, ordered per order_by.
          items:
            description: One unit matched by SearchAvailability, with a lead price
              for the period. Detailed slots/nights are fetched per unit via ComputeAvailability.
            properties:
              bookable:
                description: Whether the unit is bookable for the requested period
                  and units.
                type: boolean
              displayName:
                description: Cached display name of the unit, for convenience.
                type: string
              mode:
                description: The unit's booking mode.
                enum:
                - BOOKING_MODE_UNSPECIFIED
                - BOOKING_MODE_TIME_SLOT
                - BOOKING_MODE_NIGHTLY
                type: string
              price:
                description: 'Lead price for the requested period: the stay total
                  for NIGHTLY, or the slot price for TIME_SLOT. Used for sorting and
                  display.'
                properties:
                  currencyCode:
                    description: The three-letter currency code defined in ISO 4217.
                    type: string
                  nanos:
                    description: Number of nano (10^-9) units of the amount. The value
                      must be between -999,999,999 and +999,999,999 inclusive. If
                      `units` is positive, `nanos` must be positive or zero. If `units`
                      is zero, `nanos` can be positive, zero, or negative. If `units`
                      is negative, `nanos` must be negative or zero. For example $-1.75
                      is represented as `units`=-1 and `nanos`=-750,000,000.
                    format: int32
                    type: integer
                  units:
                    description: The whole units of the amount. For example if `currencyCode`
                      is `"USD"`, then 1 unit is one US dollar.
                    format: int64
                    type: integer
                    x-kubernetes-int-or-string: true
                type: object
              unit:
                description: 'The matching unit. Format: properties/{property}/units/{unit}'
                type: string
            type: object
          type: array
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
      type: object
    freebusy.availability.v1.Slot:
      description: A discrete bookable time slot, produced for TIME_SLOT units.
      properties:
        bookable:
          description: Whether the slot can actually be booked (free and passes policy).
          type: boolean
        endTime:
          description: Exclusive end of the slot (start + unit/requested duration).
          format: date-time
          type: string
        freeCount:
          description: Number of units free in this slot (capacity minus overlapping
            bookings).
          format: int32
          type: integer
        price:
          description: Price for booking this slot, derived from the unit's pricing.
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        startTime:
          description: Inclusive start of the slot.
          format: date-time
          type: string
      type: object
    freebusy.availability.v1.UnbookableReason:
      description: A reason a span is not bookable, as a machine-readable code plus
        a human-readable explanation. Clients should branch on code, never on message.
      properties:
        code:
          description: Why the span is not bookable.
          enum:
          - CODE_UNSPECIFIED
          - CODE_NO_CAPACITY
          - CODE_OUTSIDE_HOURS
          - CODE_CLOSED
          - CODE_MIN_NIGHTS
          - CODE_MAX_NIGHTS
          - CODE_CHECKIN_DAY
          - CODE_CHECKOUT_DAY
          - CODE_MIN_NOTICE
          - CODE_MAX_ADVANCE
          - CODE_BUFFER_CONFLICT
          - CODE_RESOURCE_ARCHIVED
          type: string
        message:
          description: Human-readable explanation suitable for display, not for parsing.
          type: string
      type: object
    freebusy.availability.v1.UnitAvailability:
      description: Availability for one unit, used in batch responses.
      properties:
        mode:
          description: Which shape is populated, matching the unit's booking_mode.
          enum:
          - BOOKING_MODE_UNSPECIFIED
          - BOOKING_MODE_TIME_SLOT
          - BOOKING_MODE_NIGHTLY
          type: string
        nights:
          description: Per-night availability, when mode is NIGHTLY.
          items:
            description: Per-night availability, produced for NIGHTLY units.
            properties:
              closed:
                description: Whether the unit is closed that night (exception/blackout).
                type: boolean
              freeUnits:
                description: Number of units of the pool free that night.
                format: int32
                type: integer
              night:
                description: The night, in the unit's local timezone.
                properties:
                  day:
                    description: Day of a month. Must be from 1 to 31 and valid for
                      the year and month, or 0 to specify a year by itself or a year
                      and month where the day isn't significant.
                    format: int32
                    type: integer
                  month:
                    description: Month of a year. Must be from 1 to 12, or 0 to specify
                      a year without a month and day.
                    format: int32
                    type: integer
                  year:
                    description: Year of the date. Must be from 1 to 9999, or 0 to
                      specify a date without a year.
                    format: int32
                    type: integer
                type: object
              price:
                description: Nightly price, derived from the unit's pricing.
                properties:
                  currencyCode:
                    description: The three-letter currency code defined in ISO 4217.
                    type: string
                  nanos:
                    description: Number of nano (10^-9) units of the amount. The value
                      must be between -999,999,999 and +999,999,999 inclusive. If
                      `units` is positive, `nanos` must be positive or zero. If `units`
                      is zero, `nanos` can be positive, zero, or negative. If `units`
                      is negative, `nanos` must be negative or zero. For example $-1.75
                      is represented as `units`=-1 and `nanos`=-750,000,000.
                    format: int32
                    type: integer
                  units:
                    description: The whole units of the amount. For example if `currencyCode`
                      is `"USD"`, then 1 unit is one US dollar.
                    format: int64
                    type: integer
                    x-kubernetes-int-or-string: true
                type: object
            type: object
          type: array
        slots:
          description: Slots, when mode is TIME_SLOT.
          items:
            description: A discrete bookable time slot, produced for TIME_SLOT units.
            properties:
              bookable:
                description: Whether the slot can actually be booked (free and passes
                  policy).
                type: boolean
              endTime:
                description: Exclusive end of the slot (start + unit/requested duration).
                format: date-time
                type: string
              freeCount:
                description: Number of units free in this slot (capacity minus overlapping
                  bookings).
                format: int32
                type: integer
              price:
                description: Price for booking this slot, derived from the unit's
                  pricing.
                properties:
                  currencyCode:
                    description: The three-letter currency code defined in ISO 4217.
                    type: string
                  nanos:
                    description: Number of nano (10^-9) units of the amount. The value
                      must be between -999,999,999 and +999,999,999 inclusive. If
                      `units` is positive, `nanos` must be positive or zero. If `units`
                      is zero, `nanos` can be positive, zero, or negative. If `units`
                      is negative, `nanos` must be negative or zero. For example $-1.75
                      is represented as `units`=-1 and `nanos`=-750,000,000.
                    format: int32
                    type: integer
                  units:
                    description: The whole units of the amount. For example if `currencyCode`
                      is `"USD"`, then 1 unit is one US dollar.
                    format: int64
                    type: integer
                    x-kubernetes-int-or-string: true
                type: object
              startTime:
                description: Inclusive start of the slot.
                format: date-time
                type: string
            type: object
          type: array
        unit:
          description: 'The unit these results are for. Format: properties/{property}/units/{unit}'
          type: string
      type: object
