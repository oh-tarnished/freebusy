      type: object
    freebusy.availability.v1.CheckAvailabilityResponse:
      description: Response message for CheckAvailability.
      properties:
        bookable:
          description: Whether the span is bookable.
          type: boolean
        freeCount:
          description: Free units across the span (the minimum over the span).
          format: int32
          type: integer
        reasons:
          description: Why the span is not bookable, when bookable is false.
          items:
            description: A reason a span is not bookable, as a machine-readable code
              plus a human-readable explanation. Clients should branch on code, never
              on message.
            properties:
              code:
                description: Why the span is not bookable.
                enum:
                - CODE_UNSPECIFIED
                - CODE_NO_CAPACITY
                - CODE_OUTSIDE_HOURS
                - CODE_CLOSED
                - CODE_MIN_NIGHTS
                - CODE_MAX_NIGHTS
                - CODE_CHECKIN_DAY
                - CODE_CHECKOUT_DAY
                - CODE_MIN_NOTICE
                - CODE_MAX_ADVANCE
                - CODE_BUFFER_CONFLICT
                - CODE_RESOURCE_ARCHIVED
                type: string
              message:
                description: Human-readable explanation suitable for display, not
                  for parsing.
                type: string
            type: object
          type: array
      type: object
