components:
  schemas:
    freebusy.organisation.v1.Member:
      description: The membership of a user in an organisation, with their role.
      properties:
        createTime:
          description: Creation timestamp (when the invite was created).
          format: date-time
          type: string
        displayName:
          description: Cached display name of the member.
          type: string
        email:
          description: The invited email address. Format is enforced at the entry
            point (InviteMemberRequest.email), not on the stored field, so legacy
            rows never brick a role update.
          type: string
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
          type: string
        inviter:
          description: 'The user who issued the invite. Format: users/{user}'
          type: string
        name:
          description: 'The member name. Format: organisations/{organisation}/members/{member}'
          type: string
        role:
          description: The member's role in the organisation.
          enum:
          - ORGANISATION_ROLE_UNSPECIFIED
          - ORGANISATION_ROLE_OWNER
          - ORGANISATION_ROLE_ADMIN
          - ORGANISATION_ROLE_MEMBER
          - ORGANISATION_ROLE_VIEWER
          type: string
        state:
          description: Confirmation state of the membership. New members start INVITED
            (database default).
          enum:
          - MEMBER_STATE_UNSPECIFIED
          - MEMBER_STATE_INVITED
          - MEMBER_STATE_ACTIVE
          - MEMBER_STATE_SUSPENDED
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
        user:
          description: 'The user, once the invite is accepted. Format: users/{user}'
          type: string
      type: object
    freebusy.organisation.v1.Organisation:
      description: 'A chain: the hotel brand/company that owns one or more properties,
        and the unit of multi-tenancy. The shell enforces isolation with row-level
        security keyed off the caller''s organisation. Each Property references the
        Organisation it belongs to; members here are the chain''s administrators,
        not its guests (guests relate to a property only through bookings).'
      properties:
        billingEmail:
          description: Billing contact email. Format is validated where the value
            enters the system (request-entry), not here — a stored value predating
            stricter rules must never brick an unrelated update.
          type: string
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        displayName:
          description: Human-friendly organisation name (e.g. "Acme Inc.").
          type: string
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update/delete.
          type: string
        memberCount:
          description: Number of members across all states.
          format: int64
          type: integer
          x-kubernetes-int-or-string: true
        name:
          description: 'The organisation name. Format: organisations/{organisation}'
          type: string
        settings:
          description: Arbitrary organisation-level settings.
          type: object
          x-kubernetes-preserve-unknown-fields: true
        slug:
          description: URL-safe slug, unique across organisations.
          type: string
        state:
          description: Lifecycle state. New organisations start ACTIVE (database default).
          enum:
          - ORGANISATION_STATE_UNSPECIFIED
          - ORGANISATION_STATE_ACTIVE
          - ORGANISATION_STATE_SUSPENDED
          type: string
        updateTime:
          description: Last-modification timestamp.
          format: date-time
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
