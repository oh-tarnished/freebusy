      type: object
    freebusy.resource.v1.ListOfferingsRequest:
      description: Request message for ListOfferings.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. a match on display_name.
          type: string
        orderBy:
          description: Sort order, e.g. "display_name" or "create_time desc".
          type: string
        pageSize:
          description: Maximum number of offerings to return.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListOfferings call's next_page_token.
