components:
  schemas:
    freebusy.resource.v1.ArchiveResourceRequest:
      description: Request message for ArchiveResource.
      properties:
        name:
          description: 'The resource to archive. Format: resources/{resource}'
          type: string
      type: object
    freebusy.resource.v1.CreateOfferingRequest:
      description: Request message for CreateOffering.
      properties:
        offering:
          description: The offering to create. Its name field is ignored.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            description:
              description: Free-form description.
              type: string
            displayName:
              description: Human-friendly name (e.g. "30-min consult").
              type: string
            duration:
              description: Slot length. Required for TIME_SLOT resources; ignored
                for NIGHTLY.
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            fees:
              description: Fees added on top of the base subtotal (e.g. cleaning,
                service). Each surfaces as a TYPE_FEE line in a booking's price_components.
              items:
                description: A fee added on top of an offering's base subtotal. Exactly
                  one of `amount` or `percent` is set. Surfaces as a TYPE_FEE line
                  in a booking's price_components.
                properties:
                  amount:
                    description: Fixed fee amount, when charging a flat fee.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  code:
                    description: Stable machine code, e.g. "cleaning_fee".
                    type: string
                  displayName:
                    description: Human-readable label for receipts.
                    type: string
                  percent:
                    description: Percent of the base subtotal (1-100), when charging
                      a proportional fee.
                    format: int32
                    type: integer
                  pricingUnit:
                    description: What the fee is charged per (per booking, per night,
                      per person). Defaults to per booking.
                    enum:
                    - PRICING_UNIT_UNSPECIFIED
                    - PRICING_UNIT_PER_BOOKING
                    - PRICING_UNIT_PER_NIGHT
                    - PRICING_UNIT_PER_PERSON
                    type: string
                  taxable:
                    description: Whether this fee is included in the taxable base.
                    type: boolean
                type: object
              type: array
            losDiscounts:
              description: Length-of-stay discounts applied to the NIGHTLY subtotal
                when a stay is at least `min_nights` long. The most generous matching
                discount applies.
              items:
                description: A discount applied to a NIGHTLY subtotal once the stay
                  reaches a minimum length. Exactly one of percent_off or amount_off
                  is set.
                properties:
                  amountOff:
                    description: Fixed amount off the subtotal, when discounting by
                      a flat amount.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  minNights:
                    description: Minimum nights for the discount to apply.
                    format: int32
                    type: integer
                  percentOff:
                    description: Percent off the subtotal (1-100), when discounting
                      by percentage.
                    format: int32
                    type: integer
                type: object
              type: array
            name:
              description: 'The offering name. Format: resources/{resource}/offerings/{offering}'
              type: string
            price:
              description: Price charged for the offering, interpreted per pricing_unit.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            pricingUnit:
              description: What the price is charged per.
              enum:
              - PRICING_UNIT_UNSPECIFIED
              - PRICING_UNIT_PER_BOOKING
              - PRICING_UNIT_PER_NIGHT
              - PRICING_UNIT_PER_PERSON
              type: string
            rateOverrides:
              description: 'Rate calendar: date- and weekday-scoped overrides of `price`.
                For NIGHTLY resources this is the seasonal/weekend rate calendar;
                for TIME_SLOT it varies slot price by date or day. `price` is the
                default when no override matches. Later-listed overrides win where
                they overlap.'
              items:
                description: A price override for a span of dates and/or specific
                  weekdays, layered over an offering's base `price`. The price is
                  still interpreted per the offering's pricing_unit (per night, per
                  booking, per person).
                properties:
                  dateRange:
                    description: Dates the override applies to, in the resource's
                      timezone. Unset means it applies on every date (a pure weekday
                      rule).
                    properties:
                      endDate:
                        description: Exclusive end date of the range.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      startDate:
                        description: Inclusive first date of the range.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                    type: object
                  price:
                    description: The price in effect while this override matches.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  weekdays:
                    description: Weekdays the override applies to. Empty means every
                      day within date_range.
                    items:
                      description: Day of the week, numbered to match google.type.DayOfWeek
                        (Monday = 1).
                      enum:
                      - WEEKDAY_UNSPECIFIED
                      - WEEKDAY_MONDAY
                      - WEEKDAY_TUESDAY
                      - WEEKDAY_WEDNESDAY
                      - WEEKDAY_THURSDAY
                      - WEEKDAY_FRIDAY
                      - WEEKDAY_SATURDAY
                      - WEEKDAY_SUNDAY
                      type: string
                    type: array
                type: object
              type: array
            state:
              description: Lifecycle state.
              enum:
              - OFFERING_STATE_UNSPECIFIED
              - OFFERING_STATE_ACTIVE
              - OFFERING_STATE_INACTIVE
              type: string
            taxes:
              description: Taxes applied to the taxable base (subtotal plus taxable
                fees). Each surfaces as a TYPE_TAX line in a booking's price_components.
              items:
                description: A tax applied to the taxable base (base subtotal plus
                  taxable fees). Surfaces as a TYPE_TAX line in a booking's price_components.
                properties:
                  code:
                    description: Stable machine code, e.g. "occupancy_tax" or "vat".
                    type: string
                  displayName:
                    description: Human-readable label for receipts.
                    type: string
                  percent:
                    description: Tax rate as a percentage, e.g. 8.5 for 8.5%.
                    type: number
                type: object
              type: array
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        offeringId:
          description: Optional caller-chosen ID for the offering; the server generates
            one if unset.
          type: string
        parent:
          description: 'The resource to attach the offering to. Format: resources/{resource}'
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
      type: object
    freebusy.resource.v1.CreateResourceRequest:
      description: Request message for CreateResource.
      properties:
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
        resource:
          description: The resource to create. The name, state, and offerings fields
            are ignored.
          properties:
            attributes:
              description: Arbitrary attributes used for templating, policy, and segmentation.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            bookingMode:
              description: 'How this resource is booked, and therefore the availability
                shape it yields. Immutable: flipping it after bookings exist would
                invalidate every existing booking and availability computation.'
              enum:
              - BOOKING_MODE_UNSPECIFIED
              - BOOKING_MODE_TIME_SLOT
              - BOOKING_MODE_NIGHTLY
              type: string
            capacity:
              description: Number of interchangeable units in the pool. Defaults to
                1 when unset.
              format: int32
              type: integer
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            description:
              description: Free-form description.
              type: string
            displayName:
              description: 'Human-friendly name (e.g. "Dr. Lee", "Deluxe King", "Kayak
                #3").'
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            name:
              description: 'The resource name. Format: resources/{resource}'
              type: string
            offerings:
              description: 'Resource names of the offerings attached to this resource
                (e.g. "30-min consult"); manage them with the Offering standard methods.
                Format: resources/{resource}/offerings/{offering}'
              items:
                type: string
              type: array
            state:
              description: Lifecycle state.
              enum:
              - RESOURCE_STATE_UNSPECIFIED
              - RESOURCE_STATE_ACTIVE
              - RESOURCE_STATE_ARCHIVED
              type: string
            tags:
              description: Arbitrary tags for grouping and filtering.
              items:
                type: string
              type: array
            timeZone:
              description: IANA timezone (e.g. "America/New_York") the resource's
                hours and dates are evaluated in. Required so availability is timezone-correct.
              type: string
            type:
              description: What kind of bookable thing this is.
              enum:
              - RESOURCE_TYPE_UNSPECIFIED
              - RESOURCE_TYPE_PROVIDER
              - RESOURCE_TYPE_ROOM
              - RESOURCE_TYPE_EQUIPMENT
              - RESOURCE_TYPE_UNIT_TYPE
              - RESOURCE_TYPE_SPACE
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        resourceId:
          description: Optional caller-chosen ID for the resource; the server generates
            one if unset.
          type: string
      type: object
    freebusy.resource.v1.DeleteOfferingRequest:
      description: Request message for DeleteOffering.
      properties:
        name:
