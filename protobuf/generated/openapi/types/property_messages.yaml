components:
  schemas:
    freebusy.property.v1.ArchivePropertyRequest:
      description: Request message for ArchiveProperty.
      properties:
        name:
          description: 'The property to archive. Format: properties/{property}'
          type: string
      type: object
    freebusy.property.v1.CreatePropertyRequest:
      description: Request message for CreateProperty.
      properties:
        property:
          description: The property to create. The name, state, and units fields are
            ignored.
          properties:
            address:
              description: Postal address of the property.
              properties:
                addressLines:
                  description: Unstructured address lines describing the lower levels
                    of an address.
                  items:
                    type: string
                  type: array
                administrativeArea:
                  description: Optional. Highest administrative subdivision which
                    is used for postal addresses of a country or region. For example,
                    this can be a state, a province, an oblast, or a prefecture. For
                    Spain, this is the province and not the autonomous community (for
                    example, "Barcelona" and not "Catalonia"). Many countries don't
                    use an administrative area in postal addresses. For example, in
                    Switzerland, this should be left unpopulated.
                  type: string
                languageCode:
                  description: Optional. BCP-47 language code of the contents of this
                    address (if known). This is often the UI language of the input
                    form or is expected to match one of the languages used in the
                    address' country/region, or their transliterated equivalents.
                    This can affect formatting in certain countries, but is not critical
                    to the correctness of the data and will never affect any validation
                    or other non-formatting related operations.
                  type: string
                locality:
                  description: 'Optional. Generally refers to the city or town portion
                    of the address. Examples: US city, IT comune, UK post town. In
                    regions of the world where localities are not well defined or
                    do not fit into this structure well, leave `locality` empty and
                    use `address_lines`.'
                  type: string
                organization:
                  description: Optional. The name of the organization at the address.
                  type: string
                postalCode:
                  description: Optional. Postal code of the address. Not all countries
                    use or require postal codes to be present, but where they are
                    used, they may trigger additional validation with other parts
                    of the address (for example, state or zip code validation in the
                    United States).
                  type: string
                recipients:
                  description: Optional. The recipient at the address. This field
                    may, under certain circumstances, contain multiline information.
                    For example, it might contain "care of" information.
                  items:
                    type: string
                  type: array
                regionCode:
                  description: 'Required. CLDR region code of the country/region of
                    the address. This is never inferred and it is up to the user to
                    ensure the value is correct. See https://cldr.unicode.org/ and
                    https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
                    for details. Example: "CH" for Switzerland.'
                  type: string
                revision:
                  description: The schema revision of the `PostalAddress`. This must
                    be set to 0, which is the latest revision.
                  format: int32
                  type: integer
                sortingCode:
                  description: Optional. Additional, country-specific, sorting code.
                    This is not used in most regions. Where it is used, the value
                    is either a string like "CEDEX", optionally followed by a number
                    (for example, "CEDEX 7"), or just a number alone, representing
                    the "sector code" (Jamaica), "delivery area indicator" (Malawi)
                    or "post office indicator" (Côte d'Ivoire).
                  type: string
                sublocality:
                  description: Optional. Sublocality of the address. For example,
                    this can be a neighborhood, borough, or district.
                  type: string
              type: object
            attributes:
              description: Arbitrary attributes used for templating, policy, and segmentation.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            description:
              description: Free-form description shown on the property's page.
              type: string
            displayName:
              description: Human-friendly name (e.g. "Grand Beach Resort, Goa").
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            media:
              description: Showcase gallery and documents (images, video, floor plans,
                PDFs). Documents are Media with type DOCUMENT.
              items:
                description: A reference to a media asset — a showcase image, video,
                  floor plan, virtual tour, or a document (PDF fact sheet, policy,
                  house rules). The bytes live in object storage (S3 or any HTTP-reachable
                  host); this message only carries the link and its presentation metadata.
                  Attached wherever a resource wants a gallery, e.g. a Property (hotel)
                  or a Unit (room).
                properties:
                  description:
                    description: Longer description or alt text.
                    type: string
                  mimeType:
                    description: MIME type of the asset (e.g. "image/jpeg", "application/pdf"),
                      when known.
                    type: string
                  primary:
                    description: Whether this is the primary/hero asset of its gallery.
                    type: boolean
                  sortOrder:
                    description: Ordering hint within a gallery; lower sorts first.
                    format: int32
                    type: integer
                  title:
                    description: Short human-readable caption/title for display.
                    type: string
                  type:
                    description: What kind of asset this is; DOCUMENT covers PDFs/policies/house
                      rules.
                    enum:
                    - MEDIA_TYPE_UNSPECIFIED
                    - MEDIA_TYPE_IMAGE
                    - MEDIA_TYPE_VIDEO
                    - MEDIA_TYPE_DOCUMENT
                    - MEDIA_TYPE_FLOORPLAN
                    - MEDIA_TYPE_VIRTUAL_TOUR
                    type: string
                  uri:
                    description: Publicly reachable URL of the asset (an S3/CDN link
                      or any HTTPS URL).
                    type: string
                type: object
              type: array
            name:
              description: 'The property name. Format: properties/{property}'
              type: string
            organisation:
              description: 'The chain/brand that owns this property. Format: organisations/{organisation}'
              type: string
            policy:
              description: Guest-facing informational policy (display only). The enforced
                rules (cancellation, stay constraints, buffers) live per-Unit in the
                schedule service, not here.
              properties:
                checkinTime:
                  description: Local check-in time (e.g. 14:00).
                  properties:
                    hours:
                      description: Hours of a day in 24 hour format. Must be greater
                        than or equal to 0 and typically must be less than or equal
                        to 23. An API may choose to allow the value "24:00:00" for
                        scenarios like business closing time.
                      format: int32
                      type: integer
                    minutes:
                      description: Minutes of an hour. Must be greater than or equal
                        to 0 and less than or equal to 59.
                      format: int32
                      type: integer
                    nanos:
                      description: Fractions of seconds, in nanoseconds. Must be greater
                        than or equal to 0 and less than or equal to 999,999,999.
                      format: int32
                      type: integer
                    seconds:
                      description: Seconds of a minute. Must be greater than or equal
                        to 0 and typically must be less than or equal to 59. An API
                        may allow the value 60 if it allows leap-seconds.
                      format: int32
                      type: integer
                  type: object
                checkoutTime:
                  description: Local check-out time (e.g. 11:00).
                  properties:
                    hours:
                      description: Hours of a day in 24 hour format. Must be greater
                        than or equal to 0 and typically must be less than or equal
                        to 23. An API may choose to allow the value "24:00:00" for
                        scenarios like business closing time.
                      format: int32
                      type: integer
                    minutes:
                      description: Minutes of an hour. Must be greater than or equal
                        to 0 and less than or equal to 59.
                      format: int32
                      type: integer
                    nanos:
                      description: Fractions of seconds, in nanoseconds. Must be greater
                        than or equal to 0 and less than or equal to 999,999,999.
                      format: int32
                      type: integer
                    seconds:
                      description: Seconds of a minute. Must be greater than or equal
                        to 0 and typically must be less than or equal to 59. An API
                        may allow the value 60 if it allows leap-seconds.
                      format: int32
                      type: integer
                  type: object
                houseRules:
                  description: House rules shown to guests (e.g. "No smoking", "Pets
                    on request").
                  items:
                    type: string
                  type: array
                notes:
                  description: Any additional free-text notes displayed with the policy.
                  type: string
              type: object
            state:
              description: Lifecycle state.
              enum:
              - PROPERTY_STATE_UNSPECIFIED
              - PROPERTY_STATE_ACTIVE
              - PROPERTY_STATE_ARCHIVED
              type: string
            tags:
              description: Arbitrary tags for grouping and filtering (e.g. "beachfront",
                "5-star").
              items:
                type: string
              type: array
            timeZone:
              description: IANA timezone (e.g. "Asia/Kolkata") the property operates
                in.
              type: string
            units:
              description: 'Resource names of the units (room types) under this property;
                manage them with the Unit standard methods. Format: properties/{property}/units/{unit}'
              items:
                type: string
              type: array
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        propertyId:
          description: Optional caller-chosen ID for the property; the server generates
            one if unset.
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
      type: object
    freebusy.property.v1.CreateUnitRequest:
      description: Request message for CreateUnit.
      properties:
        parent:
          description: 'The property to attach the unit to. Format: properties/{property}'
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
        unit:
          description: The unit to create. Its name and state fields are ignored.
          properties:
            applicablePromoCodes:
              description: 'Promo codes advertised as applicable to this unit (an
                allow-list shown to guests). Actual eligibility/validation still happens
                at booking time. Format: promo-codes/{promo_code}'
              items:
                type: string
              type: array
            attributes:
              description: Arbitrary attributes used for templating, policy, and segmentation.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            bookingMode:
              description: 'How this unit is booked, and therefore the availability
                shape it yields. Immutable: flipping it after bookings exist would
                invalidate every existing booking and availability computation.'
              enum:
              - BOOKING_MODE_UNSPECIFIED
              - BOOKING_MODE_TIME_SLOT
              - BOOKING_MODE_NIGHTLY
              type: string
            capacity:
              description: Number of interchangeable units in the pool. Defaults to
                1 when unset.
              format: int32
              type: integer
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            description:
              description: Free-form description.
              type: string
            displayName:
              description: Human-friendly name (e.g. "Deluxe King", "Sea-View Suite").
              type: string
            duration:
              description: Slot length. Required for TIME_SLOT units; ignored for
                NIGHTLY.
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            fees:
              description: Fees added on top of the base subtotal (e.g. cleaning,
                service). Each surfaces as a TYPE_FEE line in a booking's price_components.
              items:
                description: A fee added on top of a unit's base subtotal. Exactly
                  one of `amount` or `percent` is set. Surfaces as a TYPE_FEE line
                  in a booking's price_components.
                properties:
                  amount:
                    description: Fixed fee amount, when charging a flat fee.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  code:
                    description: Stable machine code, e.g. "cleaning_fee".
                    type: string
                  displayName:
                    description: Human-readable label for receipts.
                    type: string
                  percent:
                    description: Percent of the base subtotal (1-100), when charging
                      a proportional fee.
                    format: int32
                    type: integer
                  pricingUnit:
                    description: What the fee is charged per (per booking, per night,
                      per person). Defaults to per booking.
                    enum:
                    - PRICING_UNIT_UNSPECIFIED
                    - PRICING_UNIT_PER_BOOKING
                    - PRICING_UNIT_PER_NIGHT
                    - PRICING_UNIT_PER_PERSON
                    type: string
                  taxable:
                    description: Whether this fee is included in the taxable base.
                    type: boolean
                type: object
              type: array
            losDiscounts:
              description: Length-of-stay discounts applied to the NIGHTLY subtotal
                when a stay is at least `min_nights` long. The most generous matching
                discount applies.
              items:
                description: A discount applied to a NIGHTLY subtotal once the stay
                  reaches a minimum length. Exactly one of percent_off or amount_off
                  is set.
                properties:
                  amountOff:
                    description: Fixed amount off the subtotal, when discounting by
                      a flat amount.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  minNights:
                    description: Minimum nights for the discount to apply.
                    format: int32
                    type: integer
                  percentOff:
                    description: Percent off the subtotal (1-100), when discounting
                      by percentage.
                    format: int32
                    type: integer
                type: object
              type: array
            maxOccupancy:
              description: Maximum guests per unit (occupancy limit). A future policy
                layer (OPA) reads this to validate party size on a booking. Zero means
                unspecified.
              format: int32
              type: integer
            media:
              description: Showcase gallery and documents for this unit (images, video,
                floor plans).
              items:
                description: A reference to a media asset — a showcase image, video,
                  floor plan, virtual tour, or a document (PDF fact sheet, policy,
                  house rules). The bytes live in object storage (S3 or any HTTP-reachable
                  host); this message only carries the link and its presentation metadata.
                  Attached wherever a resource wants a gallery, e.g. a Property (hotel)
                  or a Unit (room).
                properties:
                  description:
                    description: Longer description or alt text.
                    type: string
                  mimeType:
                    description: MIME type of the asset (e.g. "image/jpeg", "application/pdf"),
                      when known.
                    type: string
                  primary:
                    description: Whether this is the primary/hero asset of its gallery.
                    type: boolean
                  sortOrder:
                    description: Ordering hint within a gallery; lower sorts first.
                    format: int32
                    type: integer
                  title:
                    description: Short human-readable caption/title for display.
                    type: string
                  type:
                    description: What kind of asset this is; DOCUMENT covers PDFs/policies/house
                      rules.
                    enum:
                    - MEDIA_TYPE_UNSPECIFIED
                    - MEDIA_TYPE_IMAGE
                    - MEDIA_TYPE_VIDEO
                    - MEDIA_TYPE_DOCUMENT
                    - MEDIA_TYPE_FLOORPLAN
                    - MEDIA_TYPE_VIRTUAL_TOUR
                    type: string
                  uri:
                    description: Publicly reachable URL of the asset (an S3/CDN link
                      or any HTTPS URL).
                    type: string
                type: object
              type: array
            name:
              description: 'The unit name. Format: properties/{property}/units/{unit}'
              type: string
            price:
              description: Base price, interpreted per pricing_unit. For NIGHTLY units
                this is the default nightly rate; rate_overrides layer seasonal/weekend
                rates on top.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            pricingUnit:
              description: What the price is charged per.
              enum:
              - PRICING_UNIT_UNSPECIFIED
              - PRICING_UNIT_PER_BOOKING
              - PRICING_UNIT_PER_NIGHT
              - PRICING_UNIT_PER_PERSON
              type: string
            rateOverrides:
              description: 'Rate calendar: date- and weekday-scoped overrides of `price`.
                For NIGHTLY units this is the seasonal/weekend rate calendar. `price`
                is the default when no override matches. Later-listed overrides win
                where they overlap.'
              items:
                description: A price override for a span of dates and/or specific
                  weekdays, layered over a unit's base `price`. The price is still
                  interpreted per the unit's pricing_unit (per night, per booking,
                  per person).
                properties:
                  dateRange:
                    description: Dates the override applies to, in the unit's timezone.
                      Unset means it applies on every date (a pure weekday rule).
                    properties:
                      endDate:
                        description: Exclusive end date of the range.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      startDate:
                        description: Inclusive first date of the range.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                    type: object
                  price:
                    description: The price in effect while this override matches.
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  weekdays:
                    description: Weekdays the override applies to. Empty means every
                      day within date_range.
                    items:
                      description: Day of the week, numbered to match google.type.DayOfWeek
                        (Monday = 1).
                      enum:
                      - WEEKDAY_UNSPECIFIED
                      - WEEKDAY_MONDAY
                      - WEEKDAY_TUESDAY
                      - WEEKDAY_WEDNESDAY
                      - WEEKDAY_THURSDAY
                      - WEEKDAY_FRIDAY
                      - WEEKDAY_SATURDAY
                      - WEEKDAY_SUNDAY
                      type: string
                    type: array
                type: object
              type: array
            state:
              description: Lifecycle state.
              enum:
              - UNIT_STATE_UNSPECIFIED
              - UNIT_STATE_ACTIVE
              - UNIT_STATE_ARCHIVED
              type: string
            tags:
              description: Arbitrary tags for grouping and filtering.
              items:
                type: string
              type: array
            taxes:
              description: Taxes applied to the taxable base (subtotal plus taxable
                fees). Each surfaces as a TYPE_TAX line in a booking's price_components.
              items:
                description: A tax applied to the taxable base (base subtotal plus
                  taxable fees). Surfaces as a TYPE_TAX line in a booking's price_components.
                properties:
                  code:
                    description: Stable machine code, e.g. "occupancy_tax" or "gst".
                    type: string
                  displayName:
                    description: Human-readable label for receipts.
                    type: string
                  percent:
                    description: Tax rate as a percentage, e.g. 12 for 12% GST.
                    type: number
                type: object
              type: array
            timeZone:
              description: IANA timezone the unit's hours and dates are evaluated
                in. Required so availability is timezone-correct.
              type: string
            type:
              description: What kind of unit this is.
              enum:
              - UNIT_TYPE_UNSPECIFIED
              - UNIT_TYPE_PROVIDER
              - UNIT_TYPE_ROOM
              - UNIT_TYPE_EQUIPMENT
              - UNIT_TYPE_LODGING
              - UNIT_TYPE_SPACE
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        unitId:
          description: Optional caller-chosen ID for the unit; the server generates
            one if unset.
          type: string
      type: object
    freebusy.property.v1.DeleteUnitRequest:
      description: Request message for DeleteUnit.
      properties:
        name:
          description: 'The unit to delete. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.property.v1.GetPropertyRequest:
      description: Request message for GetProperty.
      properties:
        name:
          description: 'The property to retrieve. Format: properties/{property}'
          type: string
      type: object
    freebusy.property.v1.GetUnitRequest:
      description: Request message for GetUnit.
      properties:
        name:
          description: 'The unit to retrieve. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.property.v1.ListPropertiesRequest:
      description: Request message for ListProperties.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `organisation = "organisations/7"`,
            `state = PROPERTY_STATE_ACTIVE`, `tags:"beachfront"`, or a display_name
            match.
          type: string
        orderBy:
          description: Sort order, e.g. "display_name" or "create_time desc".
          type: string
        pageSize:
          description: Maximum number of properties to return. The server may cap
            this.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListProperties call, for pagination.
          type: string
      type: object
    freebusy.property.v1.ListPropertiesResponse:
      description: Response message for ListProperties.
      properties:
        nextPageToken:
          description: Next page token, if more results remain. Omitted if this is
            the last page.
          type: string
        properties:
          description: The page of properties.
          items:
            description: 'A hotel (or other lodging property): the guest-facing venue
              a chain operates. A Property belongs to an Organisation (the chain/brand)
              and carries the showcase media, address, and informational policies
              shown to guests. Its bookable inventory lives in child Units (room types);
              pricing and availability are modeled there, not here.'
            properties:
              address:
                description: Postal address of the property.
                properties:
                  addressLines:
                    description: Unstructured address lines describing the lower levels
                      of an address.
                    items:
                      type: string
                    type: array
                  administrativeArea:
                    description: Optional. Highest administrative subdivision which
                      is used for postal addresses of a country or region. For example,
                      this can be a state, a province, an oblast, or a prefecture.
                      For Spain, this is the province and not the autonomous community
                      (for example, "Barcelona" and not "Catalonia"). Many countries
                      don't use an administrative area in postal addresses. For example,
                      in Switzerland, this should be left unpopulated.
                    type: string
                  languageCode:
                    description: Optional. BCP-47 language code of the contents of
                      this address (if known). This is often the UI language of the
                      input form or is expected to match one of the languages used
                      in the address' country/region, or their transliterated equivalents.
                      This can affect formatting in certain countries, but is not
                      critical to the correctness of the data and will never affect
                      any validation or other non-formatting related operations.
                    type: string
                  locality:
                    description: 'Optional. Generally refers to the city or town portion
                      of the address. Examples: US city, IT comune, UK post town.
                      In regions of the world where localities are not well defined
                      or do not fit into this structure well, leave `locality` empty
                      and use `address_lines`.'
                    type: string
                  organization:
                    description: Optional. The name of the organization at the address.
                    type: string
                  postalCode:
                    description: Optional. Postal code of the address. Not all countries
