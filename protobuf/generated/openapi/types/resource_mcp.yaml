components:
  schemas:
    freebusy.resource.v1.AddResourceArgs:
      description: Arguments for the "add_resource" prompt.
      properties:
        bookingMode:
          description: 'How it is booked: time-slot appointments or nightly stays.'
          enum:
          - BOOKING_MODE_UNSPECIFIED
          - BOOKING_MODE_TIME_SLOT
          - BOOKING_MODE_NIGHTLY
          type: string
        capacity:
          description: Number of interchangeable units in the pool. Defaults to 1.
          format: int32
          type: integer
        displayName:
          description: Human-friendly name of the resource.
          type: string
        timeZone:
          description: IANA timezone the resource operates in (e.g. "America/New_York").
          type: string
        type:
          description: What kind of bookable thing it is (e.g. "provider", "room",
            "unit_type").
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
