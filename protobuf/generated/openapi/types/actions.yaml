components:
  schemas:
    freebusy.organisation.v1.DeleteMemberRequest:
      description: Request message for DeleteMember.
      properties:
        name:
          description: 'The member to remove. Format: organisations/{organisation}/members/{member}'
          type: string
      type: object
    freebusy.organisation.v1.InviteMemberRequest:
      description: Request message for InviteMember.
      properties:
        email:
          description: Email address to invite.
          type: string
        parent:
          description: 'The organisation to invite the member to. Format: organisations/{organisation}'
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
        role:
          description: Role to grant on acceptance.
          enum:
          - ORGANISATION_ROLE_UNSPECIFIED
          - ORGANISATION_ROLE_OWNER
          - ORGANISATION_ROLE_ADMIN
          - ORGANISATION_ROLE_MEMBER
          - ORGANISATION_ROLE_VIEWER
          type: string
      type: object
    freebusy.organisation.v1.InviteMemberResponse:
      description: Response message for InviteMember.
      properties:
        member:
          description: The created member (in INVITED state).
          properties:
            createTime:
              description: Creation timestamp (when the invite was created).
              format: date-time
              type: string
            displayName:
              description: Cached display name of the member.
              type: string
            email:
              description: The invited email address. Format is enforced at the entry
                point (InviteMemberRequest.email), not on the stored field, so legacy
                rows never brick a role update.
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            inviter:
              description: 'The user who issued the invite. Format: users/{user}'
              type: string
            name:
              description: 'The member name. Format: organisations/{organisation}/members/{member}'
              type: string
            role:
              description: The member's role in the organisation.
              enum:
              - ORGANISATION_ROLE_UNSPECIFIED
              - ORGANISATION_ROLE_OWNER
              - ORGANISATION_ROLE_ADMIN
              - ORGANISATION_ROLE_MEMBER
              - ORGANISATION_ROLE_VIEWER
              type: string
            state:
              description: Confirmation state of the membership. New members start
                INVITED (database default).
              enum:
              - MEMBER_STATE_UNSPECIFIED
              - MEMBER_STATE_INVITED
              - MEMBER_STATE_ACTIVE
              - MEMBER_STATE_SUSPENDED
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            user:
              description: 'The user, once the invite is accepted. Format: users/{user}'
              type: string
          type: object
      type: object
    freebusy.organisation.v1.UpdateMemberRequest:
      description: Request message for UpdateMember. The role is the only mutable
        field; set update_mask to "role" to change it.
      properties:
        member:
          description: The member to update; its name identifies the target.
          properties:
            createTime:
              description: Creation timestamp (when the invite was created).
              format: date-time
              type: string
            displayName:
              description: Cached display name of the member.
              type: string
            email:
              description: The invited email address. Format is enforced at the entry
                point (InviteMemberRequest.email), not on the stored field, so legacy
                rows never brick a role update.
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            inviter:
              description: 'The user who issued the invite. Format: users/{user}'
              type: string
            name:
              description: 'The member name. Format: organisations/{organisation}/members/{member}'
              type: string
            role:
              description: The member's role in the organisation.
              enum:
              - ORGANISATION_ROLE_UNSPECIFIED
              - ORGANISATION_ROLE_OWNER
              - ORGANISATION_ROLE_ADMIN
              - ORGANISATION_ROLE_MEMBER
              - ORGANISATION_ROLE_VIEWER
              type: string
            state:
              description: Confirmation state of the membership. New members start
                INVITED (database default).
              enum:
              - MEMBER_STATE_UNSPECIFIED
              - MEMBER_STATE_INVITED
              - MEMBER_STATE_ACTIVE
              - MEMBER_STATE_SUSPENDED
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            user:
              description: 'The user, once the invite is accepted. Format: users/{user}'
              type: string
          type: object
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable fields.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
