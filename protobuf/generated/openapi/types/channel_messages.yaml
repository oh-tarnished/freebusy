components:
  schemas:
    freebusy.channel.v1.ChannelSyncStatus:
      description: A rollup of a channel's sync health, modeled as a singleton sub-resource
        of the channel (one per channel) and read via GetChannelSyncStatus.
      properties:
        failedCount:
          description: Count of updates that failed since the last success.
          format: int32
          type: integer
        lastError:
          description: Most recent error message, when the last sync failed.
          type: string
        lastSyncTime:
          description: When ARI/reservations last synced successfully.
          format: date-time
          type: string
        name:
          description: 'The sync-status name. Format: channels/{channel}/syncStatus'
          type: string
        pendingCount:
          description: Count of updates still queued.
          format: int32
          type: integer
        state:
          description: Current connection state.
          enum:
          - CHANNEL_STATE_UNSPECIFIED
          - CHANNEL_STATE_CONNECTED
          - CHANNEL_STATE_DISABLED
          - CHANNEL_STATE_ERROR
          type: string
      type: object
    freebusy.channel.v1.CreateChannelRequest:
      description: Request message for CreateChannel.
      properties:
        channel:
          description: The channel to create. Its name and state fields are ignored.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            credentialRef:
              description: Opaque handle to the stored credentials for this connection
                (a secret-manager key or vault path). The secrets themselves are never
                returned by the API.
              type: string
            displayName:
              description: Human-friendly label (e.g. "Booking.com — Goa Resort").
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            externalPropertyId:
              description: The channel's own code for this hotel (e.g. the Booking.com
                hotel id).
              type: string
            lastSyncTime:
              description: When ARI/reservations last synced successfully.
              format: date-time
              type: string
            name:
              description: 'The channel name. Format: channels/{channel}'
              type: string
            property:
              description: 'The property this channel distributes. Format: properties/{property}'
              type: string
            state:
              description: Connection state.
              enum:
              - CHANNEL_STATE_UNSPECIFIED
              - CHANNEL_STATE_CONNECTED
              - CHANNEL_STATE_DISABLED
              - CHANNEL_STATE_ERROR
              type: string
            type:
              description: 'Which OTA/GDS this connects to. Immutable: the adapter
                and external ID space are fixed per channel.'
              enum:
              - CHANNEL_TYPE_UNSPECIFIED
              - CHANNEL_TYPE_AGODA
              - CHANNEL_TYPE_BOOKING_COM
              - CHANNEL_TYPE_EXPEDIA
              - CHANNEL_TYPE_AIRBNB
              - CHANNEL_TYPE_MAKEMYTRIP
              - CHANNEL_TYPE_GOIBIBO
              - CHANNEL_TYPE_GDS
              - CHANNEL_TYPE_DIRECT
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        channelId:
          description: Optional caller-chosen ID for the channel; the server generates
            one if unset.
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
      type: object
    freebusy.channel.v1.CreateUnitMappingRequest:
      description: Request message for CreateUnitMapping.
      properties:
        parent:
          description: 'The channel to add the mapping to. Format: channels/{channel}'
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
        unitMapping:
          description: The mapping to create. Its name field is ignored.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            externalRatePlanId:
              description: The channel's rate-plan id this unit maps to.
              type: string
            externalRoomTypeId:
              description: The channel's room-type id this unit maps to.
              type: string
            name:
              description: 'The mapping name. Format: channels/{channel}/unitMappings/{unit_mapping}'
              type: string
            state:
              description: Mapping state.
              enum:
              - MAPPING_STATE_UNSPECIFIED
              - MAPPING_STATE_MAPPED
              - MAPPING_STATE_UNMAPPED
              type: string
            unit:
              description: 'The freebusy unit being mapped. Format: properties/{property}/units/{unit}'
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        unitMappingId:
          description: Optional caller-chosen ID for the mapping; the server generates
            one if unset.
          type: string
      type: object
    freebusy.channel.v1.DeleteChannelRequest:
      description: Request message for DeleteChannel.
      properties:
        force:
          description: If true, delete the channel and its unit mappings; if false
            and mappings exist, the call fails.
          type: boolean
        name:
          description: 'The channel to delete. Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.DeleteUnitMappingRequest:
      description: Request message for DeleteUnitMapping.
      properties:
        name:
          description: 'The mapping to delete. Format: channels/{channel}/unitMappings/{unit_mapping}'
          type: string
      type: object
    freebusy.channel.v1.DisableChannelRequest:
      description: Request message for DisableChannel.
      properties:
        name:
          description: 'The channel to disable (pause ARI push and reservation pull).
            Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.EnableChannelRequest:
      description: Request message for EnableChannel.
      properties:
        name:
          description: 'The channel to enable (resume ARI push and reservation pull).
            Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.GetChannelRequest:
      description: Request message for GetChannel.
      properties:
        name:
          description: 'The channel to retrieve. Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.GetChannelSyncStatusRequest:
      description: Request message for GetChannelSyncStatus.
      properties:
        name:
          description: 'The sync-status singleton to read. Format: channels/{channel}/syncStatus'
          type: string
      type: object
    freebusy.channel.v1.GetUnitMappingRequest:
      description: Request message for GetUnitMapping.
      properties:
        name:
          description: 'The mapping to retrieve. Format: channels/{channel}/unitMappings/{unit_mapping}'
          type: string
      type: object
    freebusy.channel.v1.ImportReservationRequest:
      description: Request message for ImportReservation. Lands a reservation made
        on a channel so it reconciles into a freebusy Booking (create/modify/cancel).
      properties:
        reservation:
          description: The reservation as it exists on the channel.
          properties:
            channel:
              description: 'The channel the reservation came from. Format: channels/{channel}'
              type: string
            externalId:
              description: The channel's own id for this reservation (used for idempotency
                and modify/cancel matching).
              type: string
            guest:
              description: Guest contact details supplied by the channel.
              properties:
                displayName:
                  description: Full name of the guest.
                  type: string
                email:
                  description: Email address for the confirmation and any follow-ups.
                  type: string
                phoneNumber:
                  description: Phone number in E.164 form (e.g. "+14155552671").
                  type: string
              type: object
            op:
              description: Whether this is a create, modify, or cancel.
              enum:
              - RESERVATION_OP_UNSPECIFIED
              - RESERVATION_OP_CREATE
              - RESERVATION_OP_MODIFY
              - RESERVATION_OP_CANCEL
              type: string
            stay:
              description: 'The stay: check-in to check-out (end_date is the check-out
                date).'
              properties:
                endDate:
                  description: Exclusive end date of the range.
                  properties:
                    day:
                      description: Day of a month. Must be from 1 to 31 and valid
                        for the year and month, or 0 to specify a year by itself or
                        a year and month where the day isn't significant.
                      format: int32
                      type: integer
                    month:
                      description: Month of a year. Must be from 1 to 12, or 0 to
                        specify a year without a month and day.
                      format: int32
                      type: integer
                    year:
                      description: Year of the date. Must be from 1 to 9999, or 0
                        to specify a date without a year.
                      format: int32
                      type: integer
                  type: object
                startDate:
                  description: Inclusive first date of the range.
                  properties:
                    day:
                      description: Day of a month. Must be from 1 to 31 and valid
                        for the year and month, or 0 to specify a year by itself or
                        a year and month where the day isn't significant.
                      format: int32
                      type: integer
                    month:
                      description: Month of a year. Must be from 1 to 12, or 0 to
                        specify a year without a month and day.
                      format: int32
                      type: integer
                    year:
                      description: Year of the date. Must be from 1 to 9999, or 0
                        to specify a date without a year.
                      format: int32
                      type: integer
                  type: object
              type: object
            total:
              description: The reservation total as charged on the channel.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            unit:
              description: 'The resolved freebusy unit being booked. Format: properties/{property}/units/{unit}'
              type: string
            units:
              description: Number of units / rooms reserved. Defaults to 1.
              format: int32
              type: integer
          type: object
      type: object
    freebusy.channel.v1.ImportReservationResponse:
      description: Response message for ImportReservation.
      properties:
        booking:
          description: 'The freebusy booking created or updated from the reservation.
            Format: bookings/{booking}'
          type: string
      type: object
    freebusy.channel.v1.ListChannelsRequest:
      description: Request message for ListChannels.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `property = "properties/9"`,
            `type = CHANNEL_TYPE_AGODA`, or `state = CHANNEL_STATE_CONNECTED`.
          type: string
        orderBy:
          description: Sort order, e.g. "create_time desc".
          type: string
        pageSize:
          description: Maximum number of channels to return. The server may cap this.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListChannels call's next_page_token.
          type: string
      type: object
    freebusy.channel.v1.ListChannelsResponse:
      description: Response message for ListChannels.
      properties:
        channels:
          description: The page of channels.
          items:
            description: 'A connection between one property and one distribution channel
              (OTA/GDS). It is the anchor for 2-way ARI: availability/rates/inventory
              are pushed out per mapped unit, and reservations made on the channel
              are pulled in as bookings. Credentials are never carried in the API
              — only an opaque handle to where they are stored.'
            properties:
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              credentialRef:
                description: Opaque handle to the stored credentials for this connection
                  (a secret-manager key or vault path). The secrets themselves are
                  never returned by the API.
                type: string
              displayName:
                description: Human-friendly label (e.g. "Booking.com — Goa Resort").
                type: string
              etag:
                description: Opaque version for optimistic concurrency (AIP-154);
                  echo on update/delete.
                type: string
              externalPropertyId:
                description: The channel's own code for this hotel (e.g. the Booking.com
                  hotel id).
                type: string
              lastSyncTime:
                description: When ARI/reservations last synced successfully.
                format: date-time
                type: string
              name:
                description: 'The channel name. Format: channels/{channel}'
                type: string
              property:
                description: 'The property this channel distributes. Format: properties/{property}'
                type: string
              state:
                description: Connection state.
                enum:
                - CHANNEL_STATE_UNSPECIFIED
                - CHANNEL_STATE_CONNECTED
                - CHANNEL_STATE_DISABLED
                - CHANNEL_STATE_ERROR
                type: string
              type:
                description: 'Which OTA/GDS this connects to. Immutable: the adapter
                  and external ID space are fixed per channel.'
                enum:
                - CHANNEL_TYPE_UNSPECIFIED
                - CHANNEL_TYPE_AGODA
                - CHANNEL_TYPE_BOOKING_COM
                - CHANNEL_TYPE_EXPEDIA
                - CHANNEL_TYPE_AIRBNB
                - CHANNEL_TYPE_MAKEMYTRIP
                - CHANNEL_TYPE_GOIBIBO
                - CHANNEL_TYPE_GDS
                - CHANNEL_TYPE_DIRECT
                type: string
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
            type: object
          type: array
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
      type: object
    freebusy.channel.v1.ListSyncEventsRequest:
      description: Request message for ListSyncEvents.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `direction = SYNC_DIRECTION_OUTBOUND`,
            `state = SYNC_STATE_FAILED`.
          type: string
        orderBy:
          description: Sort order, e.g. "event_time desc".
          type: string
        pageSize:
          description: Maximum number of events to return.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListSyncEvents call's next_page_token.
          type: string
        parent:
          description: 'The channel whose sync events to list. Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.ListSyncEventsResponse:
      description: Response message for ListSyncEvents.
      properties:
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
        syncEvents:
          description: The page of sync events.
          items:
            description: A record of one sync attempt, for observability of the ARI
              push / reservation pull. Returned by ListSyncEvents; not a standalone
              resource.
            properties:
              channel:
                description: 'The channel involved. Format: channels/{channel}'
                type: string
              date:
                description: The date the event concerned, when applicable.
                properties:
                  day:
                    description: Day of a month. Must be from 1 to 31 and valid for
                      the year and month, or 0 to specify a year by itself or a year
                      and month where the day isn't significant.
                    format: int32
                    type: integer
                  month:
                    description: Month of a year. Must be from 1 to 12, or 0 to specify
                      a year without a month and day.
                    format: int32
                    type: integer
                  year:
                    description: Year of the date. Must be from 1 to 9999, or 0 to
                      specify a date without a year.
                    format: int32
                    type: integer
                type: object
              direction:
                description: Whether this was an outbound push or an inbound pull.
                enum:
                - SYNC_DIRECTION_UNSPECIFIED
                - SYNC_DIRECTION_OUTBOUND
                - SYNC_DIRECTION_INBOUND
                type: string
              error:
                description: Human-readable error when state is FAILED.
                type: string
              eventTime:
                description: When the event occurred.
                format: date-time
                type: string
              state:
                description: Outcome.
                enum:
                - SYNC_STATE_UNSPECIFIED
                - SYNC_STATE_PENDING
                - SYNC_STATE_SUCCESS
                - SYNC_STATE_FAILED
                type: string
              unit:
                description: 'The unit involved, when the event is unit-scoped. Format:
                  properties/{property}/units/{unit}'
                type: string
            type: object
          type: array
      type: object
    freebusy.channel.v1.ListUnitMappingsRequest:
      description: Request message for ListUnitMappings.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `state = MAPPING_STATE_UNMAPPED`.
          type: string
        orderBy:
          description: Sort order.
          type: string
        pageSize:
          description: Maximum number of mappings to return.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListUnitMappings call's next_page_token.
          type: string
        parent:
          description: 'The channel whose unit mappings to list. Format: channels/{channel}'
          type: string
      type: object
    freebusy.channel.v1.ListUnitMappingsResponse:
      description: Response message for ListUnitMappings.
      properties:
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
        unitMappings:
          description: The page of unit mappings.
          items:
            description: 'Maps a freebusy Unit to its counterpart on the channel.
              ARI for a unit only flows once a MAPPED mapping exists: the external
              room-type and rate-plan ids key the availability/rate/restriction push
              and resolve inbound reservations back to the right unit.'
            properties:
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              etag:
                description: Opaque version for optimistic concurrency (AIP-154);
                  echo on update/delete.
                type: string
              externalRatePlanId:
                description: The channel's rate-plan id this unit maps to.
                type: string
              externalRoomTypeId:
                description: The channel's room-type id this unit maps to.
                type: string
              name:
                description: 'The mapping name. Format: channels/{channel}/unitMappings/{unit_mapping}'
                type: string
              state:
                description: Mapping state.
                enum:
                - MAPPING_STATE_UNSPECIFIED
                - MAPPING_STATE_MAPPED
                - MAPPING_STATE_UNMAPPED
                type: string
              unit:
                description: 'The freebusy unit being mapped. Format: properties/{property}/units/{unit}'
                type: string
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
            type: object
          type: array
      type: object
    freebusy.channel.v1.PushAriRequest:
      description: Request message for PushAri. Pushes availability/rate/restriction
        updates for a channel's mapped units (AIP-231 batch shape). Unmapped units
        are rejected.
      properties:
        channel:
          description: 'The channel to push to. Format: channels/{channel}'
          type: string
        updates:
          description: The per-unit, per-date updates to publish.
          items:
            description: One day's availability, rate, and restrictions for a unit
              — the atomic unit of an outbound ARI push. It is the channel-facing
              projection of the unit's price and its Schedule's stay constraints for
              a single date.
            properties:
              available:
                description: Number of units available to sell on this date.
                format: int32
                type: integer
              date:
                description: The date (in the unit's timezone) the values apply to.
                properties:
                  day:
                    description: Day of a month. Must be from 1 to 31 and valid for
                      the year and month, or 0 to specify a year by itself or a year
                      and month where the day isn't significant.
                    format: int32
                    type: integer
                  month:
                    description: Month of a year. Must be from 1 to 12, or 0 to specify
                      a year without a month and day.
                    format: int32
                    type: integer
                  year:
                    description: Year of the date. Must be from 1 to 9999, or 0 to
                      specify a date without a year.
                    format: int32
                    type: integer
                type: object
              rate:
                description: Nightly rate to publish for this date.
                properties:
                  currencyCode:
                    description: The three-letter currency code defined in ISO 4217.
                    type: string
                  nanos:
                    description: Number of nano (10^-9) units of the amount. The value
                      must be between -999,999,999 and +999,999,999 inclusive. If
                      `units` is positive, `nanos` must be positive or zero. If `units`
                      is zero, `nanos` can be positive, zero, or negative. If `units`
                      is negative, `nanos` must be negative or zero. For example $-1.75
                      is represented as `units`=-1 and `nanos`=-750,000,000.
                    format: int32
                    type: integer
                  units:
                    description: The whole units of the amount. For example if `currencyCode`
                      is `"USD"`, then 1 unit is one US dollar.
                    format: int64
                    type: integer
                    x-kubernetes-int-or-string: true
                type: object
              restrictions:
                description: Booking restrictions to publish for this date.
                properties:
                  arrivalClosed:
                    description: 'Closed to arrival: a stay may not start on this
                      date.'
                    type: boolean
                  departureClosed:
                    description: 'Closed to departure: a stay may not end on this
                      date.'
                    type: boolean
                  maxStay:
                    description: Maximum length of stay. Zero means no maximum.
                    format: int32
                    type: integer
                  minStay:
                    description: Minimum length of stay. Zero means no minimum.
                    format: int32
                    type: integer
                  stopSell:
                    description: 'Stop-sell: the unit is not sellable on this date
                      regardless of inventory.'
                    type: boolean
                type: object
              unit:
                description: 'The unit this update is for. Format: properties/{property}/units/{unit}'
                type: string
            type: object
          type: array
      type: object
    freebusy.channel.v1.PushAriResponse:
      description: Response message for PushAri.
      properties:
        accepted:
          description: Number of updates accepted for publishing.
          format: int32
          type: integer
        events:
          description: Per-update sync events (queued or failed), for observability.
          items:
            description: A record of one sync attempt, for observability of the ARI
              push / reservation pull. Returned by ListSyncEvents; not a standalone
              resource.
            properties:
              channel:
                description: 'The channel involved. Format: channels/{channel}'
                type: string
              date:
                description: The date the event concerned, when applicable.
                properties:
                  day:
                    description: Day of a month. Must be from 1 to 31 and valid for
                      the year and month, or 0 to specify a year by itself or a year
                      and month where the day isn't significant.
                    format: int32
                    type: integer
                  month:
                    description: Month of a year. Must be from 1 to 12, or 0 to specify
                      a year without a month and day.
                    format: int32
                    type: integer
                  year:
                    description: Year of the date. Must be from 1 to 9999, or 0 to
                      specify a date without a year.
                    format: int32
                    type: integer
                type: object
              direction:
                description: Whether this was an outbound push or an inbound pull.
                enum:
                - SYNC_DIRECTION_UNSPECIFIED
                - SYNC_DIRECTION_OUTBOUND
                - SYNC_DIRECTION_INBOUND
                type: string
              error:
                description: Human-readable error when state is FAILED.
                type: string
              eventTime:
                description: When the event occurred.
                format: date-time
                type: string
              state:
                description: Outcome.
                enum:
                - SYNC_STATE_UNSPECIFIED
                - SYNC_STATE_PENDING
                - SYNC_STATE_SUCCESS
                - SYNC_STATE_FAILED
                type: string
              unit:
                description: 'The unit involved, when the event is unit-scoped. Format:
                  properties/{property}/units/{unit}'
                type: string
            type: object
          type: array
      type: object
    freebusy.channel.v1.UpdateChannelRequest:
      description: Request message for UpdateChannel.
      properties:
        channel:
          description: The channel to update; its name identifies the target.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            credentialRef:
              description: Opaque handle to the stored credentials for this connection
                (a secret-manager key or vault path). The secrets themselves are never
                returned by the API.
              type: string
            displayName:
              description: Human-friendly label (e.g. "Booking.com — Goa Resort").
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            externalPropertyId:
              description: The channel's own code for this hotel (e.g. the Booking.com
                hotel id).
              type: string
            lastSyncTime:
              description: When ARI/reservations last synced successfully.
              format: date-time
              type: string
            name:
              description: 'The channel name. Format: channels/{channel}'
              type: string
            property:
              description: 'The property this channel distributes. Format: properties/{property}'
              type: string
            state:
              description: Connection state.
              enum:
              - CHANNEL_STATE_UNSPECIFIED
              - CHANNEL_STATE_CONNECTED
              - CHANNEL_STATE_DISABLED
              - CHANNEL_STATE_ERROR
              type: string
            type:
              description: 'Which OTA/GDS this connects to. Immutable: the adapter
                and external ID space are fixed per channel.'
              enum:
              - CHANNEL_TYPE_UNSPECIFIED
              - CHANNEL_TYPE_AGODA
              - CHANNEL_TYPE_BOOKING_COM
              - CHANNEL_TYPE_EXPEDIA
              - CHANNEL_TYPE_AIRBNB
              - CHANNEL_TYPE_MAKEMYTRIP
              - CHANNEL_TYPE_GOIBIBO
              - CHANNEL_TYPE_GDS
              - CHANNEL_TYPE_DIRECT
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable fields.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
      type: object
    freebusy.channel.v1.UpdateUnitMappingRequest:
      description: Request message for UpdateUnitMapping.
      properties:
        unitMapping:
          description: The mapping to update; its name identifies the target.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            etag:
