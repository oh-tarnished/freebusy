components:
  schemas:
    freebusy.property.v1.AddPropertyArgs:
      description: Arguments for the "add_property" prompt.
      properties:
        displayName:
          description: Human-friendly name of the property (e.g. "Grand Beach Resort,
            Goa").
          type: string
        organisation:
          description: 'The chain/brand that owns the property. Format: organisations/{organisation}'
          type: string
        timeZone:
          description: IANA timezone the property operates in (e.g. "Asia/Kolkata").
          type: string
      type: object
    freebusy.property.v1.AddUnitArgs:
      description: Arguments for the "add_unit" prompt.
      properties:
        bookingMode:
          description: 'How it is booked: time-slot appointments or nightly stays.'
          enum:
          - BOOKING_MODE_UNSPECIFIED
          - BOOKING_MODE_TIME_SLOT
          - BOOKING_MODE_NIGHTLY
          type: string
        capacity:
          description: Number of interchangeable units in the pool. Defaults to 1.
          format: int32
          type: integer
        displayName:
          description: Human-friendly name of the unit (e.g. "Deluxe King").
          type: string
        property:
          description: 'The property to add the unit to. Format: properties/{property}'
          type: string
        timeZone:
          description: IANA timezone the unit operates in (e.g. "Asia/Kolkata").
          type: string
        type:
          description: What kind of unit it is (e.g. "room", "lodging").
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
