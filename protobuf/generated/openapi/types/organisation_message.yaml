components:
  schemas:
    freebusy.organisation.v1.CreateOrganisationRequest:
      description: Request message for CreateOrganisation.
      properties:
        organisation:
          description: The organisation to create. The name and state fields are ignored.
            The caller becomes the organisation's first OWNER.
          properties:
            billingEmail:
              description: Billing contact email.
              type: string
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            displayName:
              description: Human-friendly organisation name (e.g. "Acme Inc.").
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            memberCount:
              description: Number of members across all states.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            name:
              description: 'The organisation name. Format: organisations/{organisation}'
              type: string
            settings:
              description: Arbitrary organisation-level settings.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            slug:
              description: URL-safe slug, unique across organisations.
              type: string
            state:
              description: Lifecycle state.
              enum:
              - ORGANISATION_STATE_UNSPECIFIED
              - ORGANISATION_STATE_ACTIVE
              - ORGANISATION_STATE_SUSPENDED
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        organisationId:
          description: Optional caller-chosen ID for the organisation; the server
            generates one if unset.
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
      type: object
    freebusy.organisation.v1.DeleteOrganisationRequest:
      description: Request message for DeleteOrganisation.
      properties:
        force:
          description: If true, delete the organisation and its members; otherwise
            the call fails when the organisation still has members.
          type: boolean
        name:
          description: 'The organisation to delete. Format: organisations/{organisation}'
          type: string
      type: object
    freebusy.organisation.v1.GetMemberRequest:
      description: Request message for GetMember.
      properties:
        name:
          description: 'The member to retrieve. Format: organisations/{organisation}/members/{member}'
          type: string
      type: object
    freebusy.organisation.v1.GetOrganisationRequest:
      description: Request message for GetOrganisation.
      properties:
        name:
          description: 'The organisation to retrieve. Format: organisations/{organisation}'
          type: string
      type: object
    freebusy.organisation.v1.ListMembersRequest:
      description: Request message for ListMembers.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `role = ADMIN` or `state
            = ACTIVE`.
          type: string
        orderBy:
          description: Sort order, e.g. "create_time desc".
          type: string
        pageSize:
          description: Maximum number of members to return. The server may cap this.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListMembers call's next_page_token.
          type: string
        parent:
          description: 'The organisation whose members to list. Format: organisations/{organisation}'
          type: string
      type: object
    freebusy.organisation.v1.ListMembersResponse:
      description: Response message for ListMembers.
      properties:
        members:
          description: The page of members.
          items:
            description: The membership of a user in an organisation, with their role.
            properties:
              createTime:
                description: Creation timestamp (when the invite was created).
                format: date-time
                type: string
              displayName:
                description: Cached display name of the member.
                type: string
              email:
                description: The invited email address.
                type: string
              etag:
                description: Opaque version for optimistic concurrency (AIP-154);
                  echo on update/delete.
                type: string
              inviter:
                description: 'The user who issued the invite. Format: users/{user}'
                type: string
              name:
                description: 'The member name. Format: organisations/{organisation}/members/{member}'
                type: string
              role:
                description: The member's role in the organisation.
                enum:
                - ORGANISATION_ROLE_UNSPECIFIED
                - ORGANISATION_ROLE_OWNER
                - ORGANISATION_ROLE_ADMIN
                - ORGANISATION_ROLE_MEMBER
                - ORGANISATION_ROLE_VIEWER
                type: string
              state:
                description: Confirmation state of the membership.
                enum:
                - MEMBER_STATE_UNSPECIFIED
                - MEMBER_STATE_INVITED
                - MEMBER_STATE_ACTIVE
                - MEMBER_STATE_SUSPENDED
                type: string
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
              user:
                description: 'The user, once the invite is accepted. Format: users/{user}'
                type: string
            type: object
          type: array
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
      type: object
    freebusy.organisation.v1.ListOrganisationsRequest:
      description: Request message for ListOrganisations.
      properties:
        filter:
          description: Filter expression over organisation fields (e.g. display_name).
          type: string
        orderBy:
          description: Sort order, e.g. "create_time desc".
          type: string
        pageSize:
          description: Maximum number of organisations to return. The server may cap
            this. Zero lets the server pick a default.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListOrganisations call's next_page_token.
          type: string
      type: object
    freebusy.organisation.v1.ListOrganisationsResponse:
      description: Response message for ListOrganisations.
      properties:
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
        organisations:
          description: The page of organisations (those the caller belongs to).
          items:
            description: A tenant. Organisation is the unit of multi-tenancy; the
              shell enforces isolation with row-level security keyed off the caller's
              organisation, so most resource names stay flat and the organisation
              appears explicitly only here.
            properties:
              billingEmail:
                description: Billing contact email.
                type: string
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              displayName:
                description: Human-friendly organisation name (e.g. "Acme Inc.").
                type: string
              etag:
                description: Opaque version for optimistic concurrency (AIP-154);
                  echo on update/delete.
                type: string
              memberCount:
                description: Number of members across all states.
                format: int64
                type: integer
                x-kubernetes-int-or-string: true
              name:
                description: 'The organisation name. Format: organisations/{organisation}'
                type: string
              settings:
                description: Arbitrary organisation-level settings.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              slug:
                description: URL-safe slug, unique across organisations.
                type: string
              state:
                description: Lifecycle state.
                enum:
                - ORGANISATION_STATE_UNSPECIFIED
                - ORGANISATION_STATE_ACTIVE
                - ORGANISATION_STATE_SUSPENDED
                type: string
              updateTime:
                description: Last-modification timestamp.
                format: date-time
                type: string
            type: object
          type: array
      type: object
    freebusy.organisation.v1.UpdateOrganisationRequest:
      description: Request message for UpdateOrganisation.
      properties:
        organisation:
          description: The organisation to update; its name identifies the target.
          properties:
            billingEmail:
              description: Billing contact email.
              type: string
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            displayName:
              description: Human-friendly organisation name (e.g. "Acme Inc.").
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            memberCount:
              description: Number of members across all states.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            name:
              description: 'The organisation name. Format: organisations/{organisation}'
              type: string
            settings:
              description: Arbitrary organisation-level settings.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            slug:
              description: URL-safe slug, unique across organisations.
              type: string
            state:
              description: Lifecycle state.
              enum:
              - ORGANISATION_STATE_UNSPECIFIED
              - ORGANISATION_STATE_ACTIVE
              - ORGANISATION_STATE_SUSPENDED
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
          type: object
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable fields.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
