components:
  schemas:
    freebusy.booking.v1.BookSlotArgs:
      description: Arguments for the "book_slot" prompt.
      properties:
        offering:
          description: Offering to book, as a resource name or a display name (e.g.
            "30-min consult").
          type: string
        promoCode:
          description: Promo code to apply, if any.
          type: string
        resource:
          description: Resource to book, as a resource name ("resources/42") or a
            display name.
          type: string
        startTime:
          description: Start of the booking (RFC 3339, e.g. "2026-07-01T14:00:00Z").
          format: date-time
          type: string
        units:
          description: Number of units / party size. Defaults to 1.
          format: int32
          type: integer
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
