components:
  schemas:
    freebusy.schedule.v1.AvailabilityException:
      description: 'An override of a resource''s normal hours on a specific span:
        a blackout / holiday closure, or extra hours beyond the recurring rules.'
      properties:
        createTime:
          description: Creation timestamp.
          format: date-time
          type: string
        dateRange:
          description: A range of whole calendar dates in the resource's timezone,
            the natural form for NIGHTLY blackouts (e.g. "closed Dec 24 through Dec
            26").
          properties:
            endDate:
              description: Exclusive end date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
            startDate:
              description: Inclusive first date of the range.
              properties:
                day:
                  description: Day of a month. Must be from 1 to 31 and valid for
                    the year and month, or 0 to specify a year by itself or a year
                    and month where the day isn't significant.
                  format: int32
                  type: integer
                month:
                  description: Month of a year. Must be from 1 to 12, or 0 to specify
                    a year without a month and day.
                  format: int32
                  type: integer
                year:
                  description: Year of the date. Must be from 1 to 9999, or 0 to specify
                    a date without a year.
                  format: int32
                  type: integer
              type: object
          type: object
        kind:
          description: Whether this span closes the resource or adds extra availability.
          enum:
          - EXCEPTION_KIND_UNSPECIFIED
          - EXCEPTION_KIND_CLOSURE
          - EXCEPTION_KIND_EXTRA_HOURS
          type: string
        name:
          description: 'The exception name. Format: resources/{resource}/availabilityExceptions/{availability_exception}'
          type: string
        reason:
          description: Human-readable reason (e.g. "Public holiday").
          type: string
        window:
          description: An exact time window, the natural form for TIME_SLOT resources.
          properties:
            endTime:
              description: Exclusive end of the interval.
              format: date-time
              type: string
            startTime:
              description: Inclusive start of the interval.
              format: date-time
              type: string
          type: object
      type: object
    freebusy.schedule.v1.BufferSettings:
      description: Buffer and notice settings applied around bookings.
      properties:
        endDelta:
          description: Turnover / cleaning time reserved after each booking.
          type: string
        gap:
          description: Minimum gap enforced between two adjacent bookings.
          type: string
        maxAdvance:
          description: How far into the future bookings may be made.
          type: string
        minNotice:
          description: Minimum lead time between now and a booking's start.
          type: string
        startDelta:
          description: Prep time reserved before each booking.
          type: string
      type: object
    freebusy.schedule.v1.CancellationPolicy:
      description: Refund rules graded by how far ahead of a booking's start it is
        cancelled.
      properties:
        tiers:
          description: Ordered refund tiers. For a given cancellation the tier with
            the largest `cutoff` that is still satisfied (cancelled at least `cutoff`
            before the booking start) determines the refund. If no tier is satisfied,
            the booking is non-refundable.
          items:
            description: 'One tier of a CancellationPolicy: cancel at least `cutoff`
              before the booking start to receive `refund_percent` of the total back.'
            properties:
              cutoff:
                description: Minimum lead time before the booking start for this tier
                  to apply (e.g. 48h).
                type: string
              refundPercent:
                description: Percentage of the booking total refunded at this tier
                  (0-100).
                format: int32
                type: integer
            type: object
          type: array
      type: object
    freebusy.schedule.v1.RecurringRule:
      description: A recurring availability window expressed as an RRULE plus a daily
        open span. The freebusy engine expands these against the resource's timezone.
      properties:
        closes:
          description: Local time-of-day the window closes, 24-hour "HH:MM" (e.g.
            "17:00"). A closes at or before opens means the span crosses midnight
            into the next day (e.g. opens "22:00", closes "02:00").
          type: string
        opens:
          description: Local time-of-day the window opens, 24-hour "HH:MM" (e.g. "09:00").
            Unset (with closes also unset) means open the whole day.
          type: string
        rrule:
          description: RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
          type: string
      type: object
    freebusy.schedule.v1.RefundTier:
      description: 'One tier of a CancellationPolicy: cancel at least `cutoff` before
        the booking start to receive `refund_percent` of the total back.'
      properties:
        cutoff:
          description: Minimum lead time before the booking start for this tier to
            apply (e.g. 48h).
          type: string
        refundPercent:
          description: Percentage of the booking total refunded at this tier (0-100).
          format: int32
          type: integer
      type: object
    freebusy.schedule.v1.Schedule:
      description: 'Aggregate read view of a resource''s availability configuration:
        the inputs the freebusy engine consumes. Modeled as a singleton resource,
        one per resource.'
      properties:
        buffers:
          description: Buffer and notice settings.
          properties:
            endDelta:
              description: Turnover / cleaning time reserved after each booking.
              type: string
            gap:
              description: Minimum gap enforced between two adjacent bookings.
              type: string
            maxAdvance:
              description: How far into the future bookings may be made.
              type: string
            minNotice:
              description: Minimum lead time between now and a booking's start.
              type: string
            startDelta:
              description: Prep time reserved before each booking.
              type: string
          type: object
        cancellationPolicy:
          description: Refund rules applied when a booking on this resource is cancelled.
            Unset means cancellations are non-refundable by default.
          properties:
            tiers:
              description: Ordered refund tiers. For a given cancellation the tier
                with the largest `cutoff` that is still satisfied (cancelled at least
                `cutoff` before the booking start) determines the refund. If no tier
                is satisfied, the booking is non-refundable.
              items:
                description: 'One tier of a CancellationPolicy: cancel at least `cutoff`
                  before the booking start to receive `refund_percent` of the total
                  back.'
                properties:
                  cutoff:
                    description: Minimum lead time before the booking start for this
                      tier to apply (e.g. 48h).
                    type: string
                  refundPercent:
                    description: Percentage of the booking total refunded at this
                      tier (0-100).
                    format: int32
                    type: integer
                type: object
              type: array
          type: object
        etag:
          description: Opaque version for optimistic concurrency (AIP-154); echo on
            update.
          type: string
        exceptions:
          description: 'Resource names of the active exceptions; manage them with
            the AvailabilityException standard methods. Format: resources/{resource}/availabilityExceptions/{availability_exception}'
          items:
            type: string
          type: array
        name:
          description: 'The schedule name. Format: resources/{resource}/schedule'
          type: string
        recurringRules:
          description: Recurring working hours.
          items:
            description: A recurring availability window expressed as an RRULE plus
              a daily open span. The freebusy engine expands these against the resource's
              timezone.
            properties:
              closes:
                description: Local time-of-day the window closes, 24-hour "HH:MM"
                  (e.g. "17:00"). A closes at or before opens means the span crosses
                  midnight into the next day (e.g. opens "22:00", closes "02:00").
                type: string
              opens:
                description: Local time-of-day the window opens, 24-hour "HH:MM" (e.g.
                  "09:00"). Unset (with closes also unset) means open the whole day.
                type: string
              rrule:
                description: RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
                type: string
            type: object
          type: array
        stayConstraints:
          description: Stay rules (NIGHTLY resources).
          properties:
            advanceMaxDays:
              description: Latest a stay may begin, in days from now. Zero means no
                limit.
              format: int32
              type: integer
            advanceMinDays:
              description: Earliest a stay may begin, in days from now.
              format: int32
              type: integer
            checkinWeekdays:
              description: Allowed check-in weekdays. Empty means any day.
              items:
                description: Day of the week, numbered to match google.type.DayOfWeek
                  (Monday = 1).
                enum:
                - WEEKDAY_UNSPECIFIED
                - WEEKDAY_MONDAY
                - WEEKDAY_TUESDAY
                - WEEKDAY_WEDNESDAY
                - WEEKDAY_THURSDAY
                - WEEKDAY_FRIDAY
                - WEEKDAY_SATURDAY
                - WEEKDAY_SUNDAY
                type: string
              type: array
            checkoutWeekdays:
              description: Allowed check-out weekdays. Empty means any day.
              items:
                description: Day of the week, numbered to match google.type.DayOfWeek
                  (Monday = 1).
                enum:
                - WEEKDAY_UNSPECIFIED
                - WEEKDAY_MONDAY
                - WEEKDAY_TUESDAY
                - WEEKDAY_WEDNESDAY
                - WEEKDAY_THURSDAY
                - WEEKDAY_FRIDAY
                - WEEKDAY_SATURDAY
                - WEEKDAY_SUNDAY
                type: string
              type: array
            maxNights:
              description: Maximum number of nights per booking. Zero means no maximum.
              format: int32
              type: integer
            minNights:
              description: Minimum number of nights per booking.
              format: int32
              type: integer
          type: object
      type: object
    freebusy.schedule.v1.StayConstraints:
      description: Stay rules that affect bookability for NIGHTLY resources.
      properties:
        advanceMaxDays:
          description: Latest a stay may begin, in days from now. Zero means no limit.
          format: int32
          type: integer
        advanceMinDays:
          description: Earliest a stay may begin, in days from now.
          format: int32
          type: integer
        checkinWeekdays:
          description: Allowed check-in weekdays. Empty means any day.
          items:
            description: Day of the week, numbered to match google.type.DayOfWeek
              (Monday = 1).
            enum:
            - WEEKDAY_UNSPECIFIED
            - WEEKDAY_MONDAY
            - WEEKDAY_TUESDAY
            - WEEKDAY_WEDNESDAY
            - WEEKDAY_THURSDAY
            - WEEKDAY_FRIDAY
            - WEEKDAY_SATURDAY
            - WEEKDAY_SUNDAY
            type: string
          type: array
        checkoutWeekdays:
          description: Allowed check-out weekdays. Empty means any day.
          items:
            description: Day of the week, numbered to match google.type.DayOfWeek
              (Monday = 1).
            enum:
            - WEEKDAY_UNSPECIFIED
            - WEEKDAY_MONDAY
            - WEEKDAY_TUESDAY
            - WEEKDAY_WEDNESDAY
            - WEEKDAY_THURSDAY
            - WEEKDAY_FRIDAY
            - WEEKDAY_SATURDAY
            - WEEKDAY_SUNDAY
            type: string
          type: array
        maxNights:
          description: Maximum number of nights per booking. Zero means no maximum.
          format: int32
          type: integer
        minNights:
          description: Minimum number of nights per booking.
          format: int32
          type: integer
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
