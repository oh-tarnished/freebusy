      properties:
        nextPageToken:
          description: Token to pass as page_token to retrieve the next page; empty
            when no more.
          type: string
        redemptions:
          description: The page of redemptions, newest first by default.
          items:
            description: Redemption is a single use of a promo code, modeled as a
              sub-resource of PromoCode rather than an inline list — so it has its
              own name/lifecycle and is listed with paging (ListRedemptions). The
              {promo_code} parent segment generates the promo_code_id FK back to the
              owning code (1:n into promocode.redemptions); amount_applied is the
              shared google.type.Money in common.moneys. Redemptions are created during
              CreateBooking, never directly.
            properties:
              amountApplied:
                description: The discount actually applied at redemption.
                properties:
                  currencyCode:
                    description: The three-letter currency code defined in ISO 4217.
                    type: string
                  nanos:
                    description: Number of nano (10^-9) units of the amount. The value
                      must be between -999,999,999 and +999,999,999 inclusive. If
                      `units` is positive, `nanos` must be positive or zero. If `units`
                      is zero, `nanos` can be positive, zero, or negative. If `units`
                      is negative, `nanos` must be negative or zero. For example $-1.75
                      is represented as `units`=-1 and `nanos`=-750,000,000.
                    format: int32
                    type: integer
                  units:
                    description: The whole units of the amount. For example if `currencyCode`
                      is `"USD"`, then 1 unit is one US dollar.
                    format: int64
                    type: integer
                    x-kubernetes-int-or-string: true
                type: object
              booking:
                description: 'The booking the code was applied to. Format: bookings/{booking}'
                type: string
              customer:
                description: 'The customer who redeemed the code. Format: users/{user}'
                type: string
              name:
                description: 'The redemption resource name. Format: promoCodes/{promo_code}/redemptions/{redemption}'
                type: string
              redeemedTime:
                description: When the code was redeemed.
                format: date-time
                type: string
            type: object
          type: array
        totalSize:
          description: Total number of redemptions for the promo code, when the server
            computes it; 0 if unknown.
          format: int32
          type: integer
      type: object
