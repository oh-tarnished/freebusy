    freebusy.promocode.v1.ValidatePromoCodeRequest:
      description: Request message for ValidatePromoCode. Computes the discount a
        code would apply to a prospective booking without redeeming it.
      properties:
        code:
          description: The human-entered code to validate (e.g. "SUMMER25").
          type: string
        customer:
          description: 'Customer redeeming the code, for per-customer limit checks.
            Format: users/{user}'
          type: string
        property:
          description: 'Property being booked, for scope checks. Format: properties/{property}'
          type: string
        subtotal:
          description: Subtotal the discount would apply to.
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        unit:
          description: 'Unit being booked, for scope checks. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.promocode.v1.ValidatePromoCodeResponse:
      description: Response message for ValidatePromoCode.
      properties:
        discountAmount:
          description: Discount the code applies to the subtotal.
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
