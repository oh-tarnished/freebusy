components:
  schemas:
    freebusy.promocode.v1.CreatePromoCodeRequest:
      description: Request message for CreatePromoCode.
      properties:
        codeGeneration:
          description: 'Whether the human-facing code is supplied by the caller (MANUAL)
            or minted by the server (AUTO). Unset defaults to MANUAL. When AUTO, promo_code.code
            is ignored and the server returns the generated code on the created resource.
            (-- api-linter: core::0133::request-unknown-fields=disabled aip.dev/not-precedent:
            Code generation mode is intrinsic to creating a promo code and has no
            standard AIP-133 equivalent. --)'
          enum:
          - CODE_GENERATION_UNSPECIFIED
          - CODE_GENERATION_MANUAL
          - CODE_GENERATION_AUTO
          type: string
        promoCode:
          description: 'The promo code to create. Server-assigned fields are ignored
            on input: name, state, redemption_count, redemptions, create_time, update_time,
            etag. promo_code.code is honored only when code_generation is MANUAL (or
            unset).'
          properties:
            code:
              description: The human-entered code, unique across all promo codes (e.g.
                "SUMMER25").
              type: string
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            description:
              description: Free-form description.
              type: string
            disabled:
              description: If true, the code is manually disabled regardless of its
                window and caps.
              type: boolean
            discount:
              description: How the discount is computed → belongs-to child table promocode.discounts.
              properties:
                amountOff:
                  description: Fixed amount off the subtotal. Normalized into the
                    shared common.moneys table (belongs-to via amount_off_id).
                  properties:
                    currencyCode:
                      description: The three-letter currency code defined in ISO 4217.
                      type: string
                    nanos:
                      description: Number of nano (10^-9) units of the amount. The
                        value must be between -999,999,999 and +999,999,999 inclusive.
                        If `units` is positive, `nanos` must be positive or zero.
                        If `units` is zero, `nanos` can be positive, zero, or negative.
                        If `units` is negative, `nanos` must be negative or zero.
                        For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                      format: int32
                      type: integer
                    units:
                      description: The whole units of the amount. For example if `currencyCode`
                        is `"USD"`, then 1 unit is one US dollar.
                      format: int64
                      type: integer
                      x-kubernetes-int-or-string: true
                  type: object
                percentOff:
                  description: Percentage off the subtotal (1-100).
                  format: int32
                  type: integer
              type: object
            displayName:
              description: Internal display name (not shown to customers).
              type: string
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            limits:
              description: Redemption caps → belongs-to promocode.usage_limits.
              properties:
                maxRedemptions:
                  description: Maximum total redemptions across all customers. Unset
                    means unlimited.
                  maximum: 9223372036854776000
                  minimum: -9.223372036854776e+18
                  nullable: true
                  type: integer
                perCustomerLimit:
                  description: Maximum redemptions per customer. Unset means unlimited.
                  maximum: 2147483647
                  minimum: -2147483648
                  nullable: true
                  type: integer
              type: object
            name:
              description: 'The promo code name. Format: promoCodes/{promo_code}'
              type: string
            redemptionCount:
              description: How many times the code has been redeemed. Cheap summary
                on the resource; the individual redemptions are a paginated sub-collection
                (promoCodes/{promo_code}/redemptions) listed via ListRedemptions,
                not inlined here, so reads stay bounded as redemptions accumulate.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
            scope:
              description: What the code applies to (eligibility) → belongs-to promocode.scopes.
              properties:
                applicableProperties:
                  description: 'Properties the code applies to. Empty means all properties.
                    Format: properties/{property}'
                  items:
                    type: string
                  type: array
                applicableUnits:
                  description: 'Units the code applies to. Empty means all units.
                    Format: properties/{property}/units/{unit}'
                  items:
                    type: string
                  type: array
                minSubtotal:
                  description: Minimum subtotal required for the code to apply. Normalized
                    into the shared common.moneys table (belongs-to via min_subtotal_id).
                  properties:
                    currencyCode:
                      description: The three-letter currency code defined in ISO 4217.
                      type: string
                    nanos:
                      description: Number of nano (10^-9) units of the amount. The
                        value must be between -999,999,999 and +999,999,999 inclusive.
                        If `units` is positive, `nanos` must be positive or zero.
                        If `units` is zero, `nanos` can be positive, zero, or negative.
                        If `units` is negative, `nanos` must be negative or zero.
                        For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                      format: int32
                      type: integer
                    units:
                      description: The whole units of the amount. For example if `currencyCode`
                        is `"USD"`, then 1 unit is one US dollar.
                      format: int64
                      type: integer
                      x-kubernetes-int-or-string: true
                  type: object
              type: object
            state:
              description: 'Derived lifecycle state, recomputed on every read/validate
                (no background job): DISABLED when `disabled` is set; EXPIRED once
                now > window.end_time (the expiry) or the code is out of redemptions;
                otherwise ACTIVE. This is how a code auto-disables at its expiry without
                a stored flag to flip.'
              enum:
              - PROMO_CODE_STATE_UNSPECIFIED
              - PROMO_CODE_STATE_ACTIVE
              - PROMO_CODE_STATE_DISABLED
              - PROMO_CODE_STATE_EXPIRED
              type: string
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            window:
              description: When the code is redeemable → belongs-to promocode.redemption_windows.
              properties:
                endTime:
                  description: 'The code''s expiry: the latest moment it can be redeemed.
                    Once now passes this, the derived PromoCode.state becomes EXPIRED.
                    Unset means never expires.'
                  format: date-time
                  type: string
                startTime:
                  description: Earliest the code can be redeemed. Unset means no lower
                    bound.
                  format: date-time
                  type: string
              type: object
          type: object
        promoCodeId:
          description: Optional caller-chosen ID for the promo code; the server generates
            one if unset.
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
        validateOnly:
          description: If true, validate the request and return what would happen,
            but don't commit.
          type: boolean
      type: object
    freebusy.promocode.v1.DeletePromoCodeRequest:
      description: Request message for DeletePromoCode.
      properties:
        etag:
          description: 'Optional optimistic-concurrency guard: if set, the delete
            fails unless it matches the current PromoCode.etag (AIP-154). Echo the
            etag you last read.'
          type: string
        force:
          description: If true, delete the promo code along with its redemptions;
            otherwise the delete fails when redemptions exist.
          type: boolean
        name:
          description: 'The promo code to delete. Format: promoCodes/{promo_code}'
          type: string
      type: object
