    freebusy.promocode.v1.ListRedemptionsRequest:
      description: Request message for ListRedemptions.
      properties:
        filter:
          description: Filter expression over redemption fields, e.g. `customer =
            "users/123"` (AIP-160).
          type: string
        orderBy:
          description: Sort order, e.g. "redeemed_time desc".
          type: string
        pageSize:
          description: Maximum number of redemptions to return. The server may cap
            this.
          format: int32
          type: integer
        pageToken:
          description: Page token from a previous ListRedemptions call's next_page_token.
          type: string
        parent:
          description: 'The promo code whose redemptions to list. Format: promoCodes/{promo_code}'
          type: string
      type: object
