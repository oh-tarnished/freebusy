components:
  schemas:
    freebusy.schedule.v1.CreateAvailabilityExceptionRequest:
      description: Request message for CreateAvailabilityException.
      properties:
        availabilityException:
          description: The exception to add. Its name field is ignored.
          properties:
            createTime:
              description: Creation timestamp.
              format: date-time
              type: string
            dateRange:
              description: A range of whole calendar dates in the unit's timezone,
                the natural form for NIGHTLY blackouts (e.g. "closed Dec 24 through
                Dec 26").
              properties:
                endDate:
                  description: Exclusive end date of the range.
                  properties:
                    day:
                      description: Day of a month. Must be from 1 to 31 and valid
                        for the year and month, or 0 to specify a year by itself or
                        a year and month where the day isn't significant.
                      format: int32
                      type: integer
                    month:
                      description: Month of a year. Must be from 1 to 12, or 0 to
                        specify a year without a month and day.
                      format: int32
                      type: integer
                    year:
                      description: Year of the date. Must be from 1 to 9999, or 0
                        to specify a date without a year.
                      format: int32
                      type: integer
                  type: object
                startDate:
                  description: Inclusive first date of the range.
                  properties:
                    day:
                      description: Day of a month. Must be from 1 to 31 and valid
                        for the year and month, or 0 to specify a year by itself or
                        a year and month where the day isn't significant.
                      format: int32
                      type: integer
                    month:
                      description: Month of a year. Must be from 1 to 12, or 0 to
                        specify a year without a month and day.
                      format: int32
                      type: integer
                    year:
                      description: Year of the date. Must be from 1 to 9999, or 0
                        to specify a date without a year.
                      format: int32
                      type: integer
                  type: object
              type: object
            kind:
              description: Whether this span closes the unit or adds extra availability.
              enum:
              - EXCEPTION_KIND_UNSPECIFIED
              - EXCEPTION_KIND_CLOSURE
              - EXCEPTION_KIND_EXTRA_HOURS
              type: string
            name:
              description: 'The exception name. Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}'
              type: string
            reason:
              description: Human-readable reason (e.g. "Public holiday").
              type: string
            window:
              description: An exact time window, the natural form for TIME_SLOT units.
              properties:
                endTime:
                  description: Exclusive end of the interval.
                  format: date-time
                  type: string
                startTime:
                  description: Inclusive start of the interval.
                  format: date-time
                  type: string
              type: object
          type: object
        availabilityExceptionId:
          description: Optional caller-chosen ID for the exception; the server generates
            one if unset.
          type: string
        parent:
          description: 'The unit to add the exception to. Format: properties/{property}/units/{unit}'
          type: string
        requestId:
          description: Caller-supplied idempotency key; identical retries return the
            first result.
          type: string
      type: object
    freebusy.schedule.v1.DeleteAvailabilityExceptionRequest:
      description: Request message for DeleteAvailabilityException.
      properties:
        name:
          description: 'The exception to remove. Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}'
          type: string
      type: object
    freebusy.schedule.v1.GetAvailabilityExceptionRequest:
      description: Request message for GetAvailabilityException.
      properties:
        name:
          description: 'The exception to retrieve. Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}'
          type: string
      type: object
    freebusy.schedule.v1.GetScheduleRequest:
      description: Request message for GetSchedule.
      properties:
        name:
          description: 'The schedule to read. Format: properties/{property}/units/{unit}/schedule'
          type: string
      type: object
    freebusy.schedule.v1.ListAvailabilityExceptionsRequest:
      description: Request message for ListAvailabilityExceptions.
      properties:
        filter:
          description: Filter expression (AIP-160), e.g. `kind = EXCEPTION_KIND_CLOSURE`.
          type: string
        orderBy:
          description: Sort order, e.g. "window.start_time" or "create_time desc".
          type: string
        pageSize:
          description: Maximum number of exceptions to return.
          format: int32
          type: integer
        pageToken:
          description: Token for the page of results to return. Empty for the first
            page.
          type: string
        parent:
          description: 'The unit whose exceptions to list. Format: properties/{property}/units/{unit}'
          type: string
      type: object
    freebusy.schedule.v1.ListAvailabilityExceptionsResponse:
      description: Response message for ListAvailabilityExceptions.
      properties:
        availabilityExceptions:
          description: The page of exceptions.
          items:
            description: 'An override of a unit''s normal hours on a specific span:
              a blackout / holiday closure, or extra hours beyond the recurring rules.'
            properties:
              createTime:
                description: Creation timestamp.
                format: date-time
                type: string
              dateRange:
                description: A range of whole calendar dates in the unit's timezone,
                  the natural form for NIGHTLY blackouts (e.g. "closed Dec 24 through
                  Dec 26").
                properties:
                  endDate:
                    description: Exclusive end date of the range.
                    properties:
                      day:
                        description: Day of a month. Must be from 1 to 31 and valid
                          for the year and month, or 0 to specify a year by itself
                          or a year and month where the day isn't significant.
                        format: int32
                        type: integer
                      month:
                        description: Month of a year. Must be from 1 to 12, or 0 to
                          specify a year without a month and day.
                        format: int32
                        type: integer
                      year:
                        description: Year of the date. Must be from 1 to 9999, or
                          0 to specify a date without a year.
                        format: int32
                        type: integer
                    type: object
                  startDate:
                    description: Inclusive first date of the range.
                    properties:
                      day:
                        description: Day of a month. Must be from 1 to 31 and valid
                          for the year and month, or 0 to specify a year by itself
                          or a year and month where the day isn't significant.
                        format: int32
                        type: integer
                      month:
                        description: Month of a year. Must be from 1 to 12, or 0 to
                          specify a year without a month and day.
                        format: int32
                        type: integer
                      year:
                        description: Year of the date. Must be from 1 to 9999, or
                          0 to specify a date without a year.
                        format: int32
                        type: integer
                    type: object
                type: object
              kind:
                description: Whether this span closes the unit or adds extra availability.
                enum:
                - EXCEPTION_KIND_UNSPECIFIED
                - EXCEPTION_KIND_CLOSURE
                - EXCEPTION_KIND_EXTRA_HOURS
                type: string
              name:
                description: 'The exception name. Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}'
                type: string
              reason:
                description: Human-readable reason (e.g. "Public holiday").
                type: string
              window:
                description: An exact time window, the natural form for TIME_SLOT
                  units.
                properties:
                  endTime:
                    description: Exclusive end of the interval.
                    format: date-time
                    type: string
                  startTime:
                    description: Inclusive start of the interval.
                    format: date-time
                    type: string
                type: object
            type: object
          type: array
        nextPageToken:
          description: Token for the next page of results. Empty if there are no more
            pages.
          type: string
      type: object
    freebusy.schedule.v1.UpdateScheduleRequest:
      description: 'Request message for UpdateSchedule. Set update_mask to the section(s)
        to replace: "recurring_rules", "buffers", "stay_constraints", and/or "cancellation_policy".'
      properties:
        schedule:
          description: The schedule to update; its name identifies the target.
          properties:
            buffers:
              description: Buffer and notice settings.
              properties:
                endDelta:
                  description: Turnover / cleaning time reserved after each booking.
                  type: string
                gap:
                  description: Minimum gap enforced between two adjacent bookings.
                  type: string
                maxAdvance:
                  description: How far into the future bookings may be made.
                  type: string
                minNotice:
                  description: Minimum lead time between now and a booking's start.
                  type: string
                startDelta:
                  description: Prep time reserved before each booking.
                  type: string
              type: object
            cancellationPolicy:
              description: Refund rules applied when a booking on this unit is cancelled.
                Unset means cancellations are non-refundable by default.
              properties:
                tiers:
                  description: Ordered refund tiers. For a given cancellation the
                    tier with the largest `cutoff` that is still satisfied (cancelled
                    at least `cutoff` before the booking start) determines the refund.
                    If no tier is satisfied, the booking is non-refundable.
                  items:
                    description: 'One tier of a CancellationPolicy: cancel at least
                      `cutoff` before the booking start to receive `refund_percent`
                      of the total back.'
                    properties:
                      cutoff:
                        description: Minimum lead time before the booking start for
                          this tier to apply (e.g. 48h).
                        type: string
                      refundPercent:
                        description: Percentage of the booking total refunded at this
                          tier (0-100).
                        format: int32
                        type: integer
                    type: object
                  type: array
              type: object
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update.
              type: string
            exceptions:
              description: 'Resource names of the active exceptions; manage them with
                the AvailabilityException standard methods. Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}'
              items:
                type: string
              type: array
            name:
              description: 'The schedule name. Format: properties/{property}/units/{unit}/schedule'
              type: string
            recurringRules:
              description: Recurring working hours.
              items:
                description: A recurring availability window expressed as an RRULE
                  plus a daily open span. The freebusy engine expands these against
                  the unit's timezone.
                properties:
                  closes:
                    description: Local time-of-day the window closes, 24-hour "HH:MM"
                      (e.g. "17:00"). A closes at or before opens means the span crosses
                      midnight into the next day (e.g. opens "22:00", closes "02:00").
                    type: string
                  opens:
                    description: Local time-of-day the window opens, 24-hour "HH:MM"
                      (e.g. "09:00"). Unset (with closes also unset) means open the
                      whole day.
                    type: string
                  rrule:
                    description: RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
                    type: string
                type: object
              type: array
            stayConstraints:
              description: Stay rules (NIGHTLY units).
              properties:
                advanceMaxDays:
                  description: Latest a stay may begin, in days from now. Zero means
                    no limit.
                  format: int32
                  type: integer
                advanceMinDays:
                  description: Earliest a stay may begin, in days from now.
                  format: int32
                  type: integer
                checkinWeekdays:
                  description: Allowed check-in weekdays. Empty means any day.
                  items:
                    description: Day of the week, numbered to match google.type.DayOfWeek
                      (Monday = 1).
                    enum:
                    - WEEKDAY_UNSPECIFIED
                    - WEEKDAY_MONDAY
                    - WEEKDAY_TUESDAY
                    - WEEKDAY_WEDNESDAY
                    - WEEKDAY_THURSDAY
                    - WEEKDAY_FRIDAY
                    - WEEKDAY_SATURDAY
                    - WEEKDAY_SUNDAY
                    type: string
                  type: array
                checkoutWeekdays:
                  description: Allowed check-out weekdays. Empty means any day.
                  items:
                    description: Day of the week, numbered to match google.type.DayOfWeek
                      (Monday = 1).
                    enum:
                    - WEEKDAY_UNSPECIFIED
                    - WEEKDAY_MONDAY
                    - WEEKDAY_TUESDAY
                    - WEEKDAY_WEDNESDAY
                    - WEEKDAY_THURSDAY
                    - WEEKDAY_FRIDAY
                    - WEEKDAY_SATURDAY
                    - WEEKDAY_SUNDAY
                    type: string
                  type: array
                maxNights:
                  description: Maximum number of nights per booking. Zero means no
                    maximum.
                  format: int32
                  type: integer
                minNights:
                  description: Minimum number of nights per booking.
                  format: int32
                  type: integer
              type: object
          type: object
        updateMask:
          description: Fields to overwrite. Omit to replace all mutable sections.
          properties:
            paths:
              description: The set of field mask paths.
              items:
                type: string
              type: array
          type: object
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
