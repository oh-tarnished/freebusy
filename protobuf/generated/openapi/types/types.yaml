components:
  schemas:
    freebusy.shared.v1.Contact:
      description: Contact details for the person a booking is for. When a booking
        carries a `customer` (a users/{user} reference) these typically mirror the
        user's profile; for walk-in or email-only bookings made by someone who is
        not a registered user, this is the only contact information captured. The
        server requires at least one reachable channel (email or phone) when no customer
        is set.
      properties:
        displayName:
          description: Full name of the guest.
          type: string
        email:
          description: Email address for the confirmation and any follow-ups.
          type: string
        phoneNumber:
          description: Phone number in E.164 form (e.g. "+14155552671").
          type: string
      type: object
    freebusy.shared.v1.DateRange:
      description: 'A half-open range of calendar dates [start_date, end_date), evaluated
        in the resource''s local timezone. The natural query and exception shape for
        NIGHTLY resources: end_date is the check-out date and is not itself included.'
      properties:
        endDate:
          description: Exclusive end date of the range.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
        startDate:
          description: Inclusive first date of the range.
          properties:
            day:
              description: Day of a month. Must be from 1 to 31 and valid for the
                year and month, or 0 to specify a year by itself or a year and month
                where the day isn't significant.
              format: int32
              type: integer
            month:
              description: Month of a year. Must be from 1 to 12, or 0 to specify
                a year without a month and day.
              format: int32
              type: integer
            year:
              description: Year of the date. Must be from 1 to 9999, or 0 to specify
                a date without a year.
              format: int32
              type: integer
          type: object
      type: object
    freebusy.shared.v1.PriceComponent:
      description: 'One line in a price breakdown: a base charge, a fee, a tax, or
        a discount. Clients branch on `type` and `code`; the signed `amount` rolls
        up to the booking total (charges positive, discounts negative).'
      properties:
        amount:
          description: 'Signed amount: positive for charges (base, fees, taxes), negative
            for discounts. Summing every component yields the booking total.'
          properties:
            currencyCode:
              description: The three-letter currency code defined in ISO 4217.
              type: string
            nanos:
              description: Number of nano (10^-9) units of the amount. The value must
                be between -999,999,999 and +999,999,999 inclusive. If `units` is
                positive, `nanos` must be positive or zero. If `units` is zero, `nanos`
                can be positive, zero, or negative. If `units` is negative, `nanos`
                must be negative or zero. For example $-1.75 is represented as `units`=-1
                and `nanos`=-750,000,000.
              format: int32
              type: integer
            units:
              description: The whole units of the amount. For example if `currencyCode`
                is `"USD"`, then 1 unit is one US dollar.
              format: int64
              type: integer
              x-kubernetes-int-or-string: true
          type: object
        code:
          description: Stable machine code for the line, e.g. "base", "cleaning_fee",
            "occupancy_tax", or a promo code. Clients key display and logic off this.
          type: string
        displayName:
          description: Human-readable label suitable for display on an itemized receipt.
          type: string
        type:
          description: Which kind of line this is.
          enum:
          - TYPE_UNSPECIFIED
          - TYPE_BASE
          - TYPE_FEE
          - TYPE_TAX
          - TYPE_DISCOUNT
          type: string
      type: object
    freebusy.shared.v1.TimeWindow:
      description: A half-open time interval [start_time, end_time). Used for query
        windows and for a booking's reserved span in both TIME_SLOT and NIGHTLY modes.
      properties:
        endTime:
          description: Exclusive end of the interval.
          format: date-time
          type: string
        startTime:
          description: Inclusive start of the interval.
          format: date-time
          type: string
      type: object
info:
  title: OpenAPI Spec for Solo APIs.
  version: v1
openapi: 3.0.1
paths: null
