components:
  schemas:
    freebusy.booking.v1.CreateBookingRequest:
      description: Request message for CreateBooking. This places a hold transactionally;
        the request_id makes retries safe (the same id always yields the same booking
        instead of a duplicate hold). The promo code and hold TTL are set on the Booking
        resource itself.
      properties:
        booking:
          description: The booking to create. Supply unit, window, and optionally
            units, customer, contact, notes, attributes, promo_code, and hold_ttl.
            Provide contact when there is no customer (a guest booking). Output-only
            fields are ignored.
          properties:
            assignedUnit:
              description: Which specific unit of the pool was assigned (the shell's
                atomic pick).
              type: string
            attributes:
              description: Arbitrary attributes.
              type: object
              x-kubernetes-preserve-unknown-fields: true
            cancelReason:
              description: Why the booking was cancelled, when state is CANCELLED.
              enum:
              - CANCEL_REASON_UNSPECIFIED
              - CANCEL_REASON_REQUESTED_BY_CUSTOMER
              - CANCEL_REASON_REQUESTED_BY_OPERATOR
              - CANCEL_REASON_PAYMENT_FAILED
              - CANCEL_REASON_NO_SHOW
              - CANCEL_REASON_OTHER
              type: string
            cancelTime:
              description: When the booking was cancelled, if at all.
              format: date-time
              type: string
            confirmTime:
              description: When the booking was confirmed, if at all.
              format: date-time
              type: string
            contact:
              description: Contact details for the booker. Required when `customer`
                is unset (a guest / walk-in booking); when `customer` is set these
                supplement or override the user's profile contact for this booking.
                The booker is not necessarily one of the guests below.
              properties:
                displayName:
                  description: Full name of the guest.
                  type: string
                email:
                  description: Email address for the confirmation and any follow-ups.
                  type: string
                phoneNumber:
                  description: Phone number in E.164 form (e.g. "+14155552671").
                  type: string
              type: object
            createTime:
              description: Creation timestamp (when the hold was placed).
              format: date-time
              type: string
            customer:
              description: 'The user the booking is for. Format: users/{user}'
              type: string
            discount:
              description: Discount applied from the promo code.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            etag:
              description: Opaque version for optimistic concurrency (AIP-154); echo
                on update/delete.
              type: string
            guests:
              description: The people staying under this booking (the party), with
                the registration details a hotel captures at check-in — name, nationality,
                ID, and the foreigner-registration fields required for foreign nationals
                — plus each guest's own preferences. The number of guests must not
                exceed `units × unit.max_occupancy`. Distinct from `customer`/`contact`,
                who is the booker.
              items:
                description: 'A guest is a person who stays under a booking. It is
                  one of three distinct people the system models, all in the identity
                  domain: - User (identity.proto): the account that signs in and books
                  online. - Guest (this message): a person actually staying — the
                  party on a booking. - Member (organisation): hotel staff who manage
                  the chain/property.'
                properties:
                  ageGroup:
                    description: Age bracket; given explicitly, or derived from birth_date
                      by the server.
                    enum:
                    - AGE_GROUP_UNSPECIFIED
                    - AGE_GROUP_ADULT
                    - AGE_GROUP_CHILD
                    - AGE_GROUP_INFANT
                    type: string
                  birthDate:
                    description: Date of birth.
                    properties:
                      day:
                        description: Day of a month. Must be from 1 to 31 and valid
                          for the year and month, or 0 to specify a year by itself
                          or a year and month where the day isn't significant.
                        format: int32
                        type: integer
                      month:
                        description: Month of a year. Must be from 1 to 12, or 0 to
                          specify a year without a month and day.
                        format: int32
                        type: integer
                      year:
                        description: Year of the date. Must be from 1 to 9999, or
                          0 to specify a date without a year.
                        format: int32
                        type: integer
                    type: object
                  displayName:
                    description: Full legal name, exactly as on the presented ID /
                      passport.
                    type: string
                  email:
                    description: Contact email (typically only for the lead guest).
                    type: string
                  foreigner:
                    description: Foreigner-registration details, present when the
                      guest is a foreign national (drives Form C / FRRO filing). Omitted
                      for domestic guests.
                    properties:
                      arrivalDate:
                        description: Date the guest arrived in the country.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      entryPort:
                        description: Port / place of entry into the country.
                        type: string
                      nextDestination:
                        description: The guest's next destination after this stay.
                        type: string
                      origin:
                        description: Where the guest is arriving from (last city /
                          country).
                        type: string
                      visaExpiryDate:
                        description: Date the visa expires.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      visaIssueDate:
                        description: Date the visa was issued.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      visaIssuePlace:
                        description: Place the visa was issued.
                        type: string
                      visaNumber:
                        description: Visa number.
                        type: string
                      visaType:
                        description: Visa type / category (e.g. "Tourist", "Business",
                          "Employment").
                        type: string
                      visitPurpose:
                        description: Purpose of visit (e.g. "Tourism", "Business",
                          "Medical").
                        type: string
                    type: object
                  gender:
                    description: Gender as recorded for registration.
                    enum:
                    - GENDER_UNSPECIFIED
                    - GENDER_MALE
                    - GENDER_FEMALE
                    - GENDER_OTHER
                    - GENDER_UNDISCLOSED
                    type: string
                  idDocument:
                    description: Government identity document presented at check-in.
                    properties:
                      expiryDate:
                        description: Date the document expires.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      issueDate:
                        description: Date the document was issued.
                        properties:
                          day:
                            description: Day of a month. Must be from 1 to 31 and
                              valid for the year and month, or 0 to specify a year
                              by itself or a year and month where the day isn't significant.
                            format: int32
                            type: integer
                          month:
                            description: Month of a year. Must be from 1 to 12, or
                              0 to specify a year without a month and day.
                            format: int32
                            type: integer
                          year:
                            description: Year of the date. Must be from 1 to 9999,
                              or 0 to specify a date without a year.
                            format: int32
                            type: integer
                        type: object
                      issuePlace:
                        description: Place of issue (city / office), as printed on
                          the document.
                        type: string
                      issuingCountry:
                        description: Issuing country as an ISO 3166-1 alpha-2 code.
                        type: string
                      number:
                        description: The document number.
                        type: string
                      type:
                        description: Which kind of document this is.
                        enum:
                        - ID_DOCUMENT_TYPE_UNSPECIFIED
                        - ID_DOCUMENT_TYPE_PASSPORT
                        - ID_DOCUMENT_TYPE_NATIONAL_ID
                        - ID_DOCUMENT_TYPE_DRIVING_LICENSE
                        - ID_DOCUMENT_TYPE_AADHAAR
                        - ID_DOCUMENT_TYPE_VOTER_ID
                        - ID_DOCUMENT_TYPE_OTHER
                        type: string
                    type: object
                  localAddress:
                    description: Local address / reference in the country of stay
                      (the "address in India" field on Form C).
                    properties:
                      addressLines:
                        description: Unstructured address lines describing the lower
                          levels of an address.
                        items:
                          type: string
                        type: array
                      administrativeArea:
                        description: Optional. Highest administrative subdivision
                          which is used for postal addresses of a country or region.
                          For example, this can be a state, a province, an oblast,
                          or a prefecture. For Spain, this is the province and not
                          the autonomous community (for example, "Barcelona" and not
                          "Catalonia"). Many countries don't use an administrative
                          area in postal addresses. For example, in Switzerland, this
                          should be left unpopulated.
                        type: string
                      languageCode:
                        description: Optional. BCP-47 language code of the contents
                          of this address (if known). This is often the UI language
                          of the input form or is expected to match one of the languages
                          used in the address' country/region, or their transliterated
                          equivalents. This can affect formatting in certain countries,
                          but is not critical to the correctness of the data and will
                          never affect any validation or other non-formatting related
                          operations.
                        type: string
                      locality:
                        description: 'Optional. Generally refers to the city or town
                          portion of the address. Examples: US city, IT comune, UK
                          post town. In regions of the world where localities are
                          not well defined or do not fit into this structure well,
                          leave `locality` empty and use `address_lines`.'
                        type: string
                      organization:
                        description: Optional. The name of the organization at the
                          address.
                        type: string
                      postalCode:
                        description: Optional. Postal code of the address. Not all
                          countries use or require postal codes to be present, but
                          where they are used, they may trigger additional validation
                          with other parts of the address (for example, state or zip
                          code validation in the United States).
                        type: string
                      recipients:
                        description: Optional. The recipient at the address. This
                          field may, under certain circumstances, contain multiline
                          information. For example, it might contain "care of" information.
                        items:
                          type: string
                        type: array
                      regionCode:
                        description: 'Required. CLDR region code of the country/region
                          of the address. This is never inferred and it is up to the
                          user to ensure the value is correct. See https://cldr.unicode.org/
                          and https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
                          for details. Example: "CH" for Switzerland.'
                        type: string
                      revision:
                        description: The schema revision of the `PostalAddress`. This
                          must be set to 0, which is the latest revision.
                        format: int32
                        type: integer
                      sortingCode:
                        description: Optional. Additional, country-specific, sorting
                          code. This is not used in most regions. Where it is used,
                          the value is either a string like "CEDEX", optionally followed
                          by a number (for example, "CEDEX 7"), or just a number alone,
                          representing the "sector code" (Jamaica), "delivery area
                          indicator" (Malawi) or "post office indicator" (Côte d'Ivoire).
                        type: string
                      sublocality:
                        description: Optional. Sublocality of the address. For example,
                          this can be a neighborhood, borough, or district.
                        type: string
                    type: object
                  nationality:
                    description: Nationality as an ISO 3166-1 alpha-2 country code
                      (e.g. "IN", "GB", "US"). Required for foreign-national registration.
                    type: string
                  permanentAddress:
                    description: Permanent / home address in the country of residence.
                    properties:
                      addressLines:
                        description: Unstructured address lines describing the lower
                          levels of an address.
                        items:
                          type: string
                        type: array
                      administrativeArea:
                        description: Optional. Highest administrative subdivision
                          which is used for postal addresses of a country or region.
                          For example, this can be a state, a province, an oblast,
                          or a prefecture. For Spain, this is the province and not
                          the autonomous community (for example, "Barcelona" and not
                          "Catalonia"). Many countries don't use an administrative
                          area in postal addresses. For example, in Switzerland, this
                          should be left unpopulated.
                        type: string
                      languageCode:
                        description: Optional. BCP-47 language code of the contents
                          of this address (if known). This is often the UI language
                          of the input form or is expected to match one of the languages
                          used in the address' country/region, or their transliterated
                          equivalents. This can affect formatting in certain countries,
                          but is not critical to the correctness of the data and will
                          never affect any validation or other non-formatting related
                          operations.
                        type: string
                      locality:
                        description: 'Optional. Generally refers to the city or town
                          portion of the address. Examples: US city, IT comune, UK
                          post town. In regions of the world where localities are
                          not well defined or do not fit into this structure well,
                          leave `locality` empty and use `address_lines`.'
                        type: string
                      organization:
                        description: Optional. The name of the organization at the
                          address.
                        type: string
                      postalCode:
                        description: Optional. Postal code of the address. Not all
                          countries use or require postal codes to be present, but
                          where they are used, they may trigger additional validation
                          with other parts of the address (for example, state or zip
                          code validation in the United States).
                        type: string
                      recipients:
                        description: Optional. The recipient at the address. This
                          field may, under certain circumstances, contain multiline
                          information. For example, it might contain "care of" information.
                        items:
                          type: string
                        type: array
                      regionCode:
                        description: 'Required. CLDR region code of the country/region
                          of the address. This is never inferred and it is up to the
                          user to ensure the value is correct. See https://cldr.unicode.org/
                          and https://www.unicode.org/cldr/charts/30/supplemental/territory_information.html
                          for details. Example: "CH" for Switzerland.'
                        type: string
                      revision:
                        description: The schema revision of the `PostalAddress`. This
                          must be set to 0, which is the latest revision.
                        format: int32
                        type: integer
                      sortingCode:
                        description: Optional. Additional, country-specific, sorting
                          code. This is not used in most regions. Where it is used,
                          the value is either a string like "CEDEX", optionally followed
                          by a number (for example, "CEDEX 7"), or just a number alone,
                          representing the "sector code" (Jamaica), "delivery area
                          indicator" (Malawi) or "post office indicator" (Côte d'Ivoire).
                        type: string
                      sublocality:
                        description: Optional. Sublocality of the address. For example,
                          this can be a neighborhood, borough, or district.
                        type: string
                    type: object
                  phoneNumber:
                    description: Contact phone in E.164 form (typically only for the
                      lead guest).
                    type: string
                  preferences:
                    description: The guest's own stay preferences and special requests,
                      kept with the guest so they travel with them across the booking.
                    properties:
                      accessibility:
                        description: Accessibility needs (e.g. "wheelchair", "hearing-accessible",
                          "ground-floor").
                        items:
                          type: string
                        type: array
                      bed:
                        description: Preferred bed type.
                        enum:
                        - BED_PREFERENCE_UNSPECIFIED
                        - BED_PREFERENCE_NO_PREFERENCE
                        - BED_PREFERENCE_KING
                        - BED_PREFERENCE_QUEEN
                        - BED_PREFERENCE_TWIN
                        - BED_PREFERENCE_SINGLE
                        type: string
                      dietary:
                        description: Dietary requirements / requests (e.g. "vegetarian",
                          "jain", "halal", "gluten-free").
                        items:
                          type: string
                        type: array
                      floorPreference:
                        description: Preferred floor; 0 means no preference.
                        format: int32
                        type: integer
                      loyaltyNumber:
                        description: Loyalty-programme membership number, if any.
                        type: string
                      notes:
                        description: Any additional free-text notes about the guest.
                        type: string
                      smoking:
                        description: Preferred smoking / non-smoking room.
                        enum:
                        - SMOKING_PREFERENCE_UNSPECIFIED
                        - SMOKING_PREFERENCE_NON_SMOKING
                        - SMOKING_PREFERENCE_SMOKING
                        type: string
                      specialRequests:
                        description: Free-form special requests (e.g. "late check-in",
                          "crib", "high floor").
                        items:
                          type: string
                        type: array
                    type: object
                  primary:
                    description: Whether this is the lead / primary guest (the registered
                      occupant the booking is held under). Exactly one guest in a
                      party is primary.
                    type: boolean
                type: object
              type: array
            holdExpireTime:
              description: When the pending hold lapses, if not confirmed first.
              format: date-time
              type: string
            holdTtl:
              description: Requested time-to-live of the hold, set at creation. The
                server caps this and reflects the effective expiry in hold_expire_time.
              type: string
            name:
              description: 'The booking name. Format: bookings/{booking}'
              type: string
            notes:
              description: Free-form notes on the booking.
              type: string
            occupancy:
              description: Party-size breakdown, for capacity math and child pricing.
                When guests are listed the counts must reconcile with them; otherwise
                it stands alone as the occupancy. `adults + children` counts against
                `unit.max_occupancy`.
              properties:
                adults:
                  description: Number of adults.
                  format: int32
                  type: integer
                children:
                  description: Number of children.
                  format: int32
                  type: integer
                infants:
                  description: Number of infants (usually not counted against occupancy).
                  format: int32
                  type: integer
              type: object
            price:
              description: Computed subtotal before discounts.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            priceComponents:
              description: 'Itemized breakdown behind the total: the base charge,
                each fee and tax, and each discount, as signed lines. `price` is the
                TYPE_BASE subtotal and `total` is the sum of every component; these
                lines expose the fees and taxes in between. Empty for simple bookings
                with no fees or taxes configured.'
              items:
                description: 'One line in a price breakdown: a base charge, a fee,
                  a tax, or a discount. Clients branch on `type` and `code`; the signed
                  `amount` rolls up to the booking total (charges positive, discounts
                  negative).'
                properties:
                  amount:
                    description: 'Signed amount: positive for charges (base, fees,
                      taxes), negative for discounts. Summing every component yields
                      the booking total.'
                    properties:
                      currencyCode:
                        description: The three-letter currency code defined in ISO
                          4217.
                        type: string
                      nanos:
                        description: Number of nano (10^-9) units of the amount. The
                          value must be between -999,999,999 and +999,999,999 inclusive.
                          If `units` is positive, `nanos` must be positive or zero.
                          If `units` is zero, `nanos` can be positive, zero, or negative.
                          If `units` is negative, `nanos` must be negative or zero.
                          For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000.
                        format: int32
                        type: integer
                      units:
                        description: The whole units of the amount. For example if
                          `currencyCode` is `"USD"`, then 1 unit is one US dollar.
                        format: int64
                        type: integer
                        x-kubernetes-int-or-string: true
                    type: object
                  code:
                    description: Stable machine code for the line, e.g. "base", "cleaning_fee",
                      "occupancy_tax", or a promo code. Clients key display and logic
                      off this.
                    type: string
                  displayName:
                    description: Human-readable label suitable for display on an itemized
                      receipt.
                    type: string
                  type:
                    description: Which kind of line this is.
                    enum:
                    - TYPE_UNSPECIFIED
                    - TYPE_BASE
                    - TYPE_FEE
                    - TYPE_TAX
                    - TYPE_DISCOUNT
                    type: string
                type: object
              type: array
            promoCode:
              description: 'The promo code to apply to this booking, set at creation,
                if any. Format: promo-codes/{promo_code}'
              type: string
            refundAmount:
              description: Amount refunded on cancellation, computed from the unit's
                cancellation policy and how far ahead of the booking start it was
                cancelled. Set only once the booking is CANCELLED. Use PreviewCancellation
                to see this before committing.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            refundPercent:
              description: Percentage of the total that `refund_amount` represents
                (0-100).
              format: int32
              type: integer
            state:
              description: Current lifecycle state.
              enum:
              - BOOKING_STATE_UNSPECIFIED
              - BOOKING_STATE_PENDING_HOLD
              - BOOKING_STATE_CONFIRMED
              - BOOKING_STATE_CANCELLED
              - BOOKING_STATE_EXPIRED
              - BOOKING_STATE_COMPLETED
              - BOOKING_STATE_NO_SHOW
              type: string
            total:
              description: Final total after discounts.
              properties:
                currencyCode:
                  description: The three-letter currency code defined in ISO 4217.
                  type: string
                nanos:
                  description: Number of nano (10^-9) units of the amount. The value
                    must be between -999,999,999 and +999,999,999 inclusive. If `units`
                    is positive, `nanos` must be positive or zero. If `units` is zero,
                    `nanos` can be positive, zero, or negative. If `units` is negative,
                    `nanos` must be negative or zero. For example $-1.75 is represented
                    as `units`=-1 and `nanos`=-750,000,000.
                  format: int32
                  type: integer
                units:
                  description: The whole units of the amount. For example if `currencyCode`
                    is `"USD"`, then 1 unit is one US dollar.
                  format: int64
                  type: integer
                  x-kubernetes-int-or-string: true
              type: object
            unit:
              description: 'The unit being booked. Format: properties/{property}/units/{unit}'
              type: string
            units:
              description: Number of units / party size reserved. Defaults to 1.
              format: int32
              type: integer
            updateTime:
              description: Last-modification timestamp.
              format: date-time
              type: string
            window:
              description: The reserved span. For NIGHTLY units this spans check-in
                to check-out.
              properties:
                endTime:
                  description: Exclusive end of the interval.
                  format: date-time
                  type: string
                startTime:
                  description: Inclusive start of the interval.
                  format: date-time
                  type: string
              type: object
          type: object
        bookingId:
          description: Optional caller-chosen ID for the booking; the server generates
