            description: |-
                Lists the regulatory licences/certificates under a property — both
                 property-wide and per-unit ones.
            operationId: LicenceService_ListLicences
            parameters:
                - name: property
                  in: path
                  description: The property id.
                  required: true
                  schema:
                    type: string
                - name: pageSize
                  in: query
                  description: Maximum number of licences to return. Must be at most 1000; larger values are rejected.
                  schema:
                    type: integer
                    format: int32
                - name: pageToken
                  in: query
                  description: Page token from a previous ListLicences call's next_page_token.
                  schema:
                    type: string
                - name: filter
                  in: query
                  description: |-
                    Filter expression (AIP-160), e.g. `type = LICENCE_TYPE_FIRE_SAFETY`,
                     `target = LICENCE_TARGET_UNIT`, `unit = properties/p1/units/u1`, or
                     `expiry_date <= 2026-08-01` to find licences due for renewal.
                  schema:
                    type: string
                - name: orderBy
                  in: query
                  description: Sort order, e.g. "expiry_date" or "create_time desc".
                  schema:
                    type: string
            responses:
