                issueDate:
                    type: string
                    description: Date the licence was issued.
                    format: date
                expiryDate:
                    type: string
                    description: |-
                        Date the licence expires. List calls may filter on this field (e.g.
                         `expiry_date <= 2026-08-01`) to find licences due for renewal.
                    format: date
                attachment:
                    allOf:
                        - $ref: '#/components/schemas/Attachment'
