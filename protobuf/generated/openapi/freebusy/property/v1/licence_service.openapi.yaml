        post:
            tags:
                - LicenceService
            description: |-
                Creates a licence under a property, e.g. after uploading a scan of a trade
                 or fire-safety certificate. Set the licence's `unit` to cover a single
                 unit instead of the whole property.
            operationId: LicenceService_CreateLicence
            parameters:
                - name: property
                  in: path
                  description: The property id.
                  required: true
                  schema:
                    type: string
                - name: licenceId
                  in: query
                  description: Optional caller-chosen ID for the licence; the server generates one if unset.
                  schema:
                    type: string
                - name: requestId
