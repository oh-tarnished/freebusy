components:
    schemas:
        ArchivePropertyRequest:
            required:
                - name
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The property to archive.
                         Format: properties/{property}
            description: Request message for ArchiveProperty.
        DateRange:
            required:
                - startDate
                - endDate
            type: object
            properties:
                startDate:
                    type: string
                    description: Inclusive first date of the range.
                    format: date
                endDate:
                    type: string
                    description: Exclusive end date of the range.
                    format: date
            description: |-
                A half-open range of calendar dates [start_date, end_date), evaluated in the
                 resource's local timezone. The natural query and exception shape for NIGHTLY
                 resources: end_date is the check-out date and is not itself included.
        Fee:
            required:
                - code
            type: object
            properties:
                code:
                    type: string
                    description: Stable machine code, e.g. "cleaning_fee".
                displayName:
                    type: string
                    description: Human-readable label for receipts.
                amount:
                    allOf:
                        - $ref: '#/components/schemas/Money'
                    description: Fixed fee amount, when charging a flat fee.
                percent:
                    type: integer
                    description: Percent of the base subtotal (1-100), when charging a proportional fee.
                    format: int32
                pricingUnit:
                    type: integer
                    description: |-
                        What the fee is charged per (per booking, per night, per person). Defaults
                         to per booking.
                    format: enum
                taxable:
                    type: boolean
                    description: Whether this fee is included in the taxable base.
            description: |-
                A fee added on top of a unit's base subtotal. Exactly one of `amount` or
                 `percent` is set. Surfaces as a TYPE_FEE line in a booking's price_components.
        GoogleProtobufAny:
            type: object
            properties:
