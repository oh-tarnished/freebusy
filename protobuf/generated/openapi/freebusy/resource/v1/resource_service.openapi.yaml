                - name: pageToken
                  in: query
                  description: Page token from a previous ListOfferings call's next_page_token.
                  schema:
                    type: string
                - name: orderBy
                  in: query
                  description: Sort order, e.g. "display_name" or "create_time desc".
                  schema:
                    type: string
                - name: filter
                  in: query
                  description: Filter expression (AIP-160), e.g. a match on display_name.
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListOfferingsResponse'
