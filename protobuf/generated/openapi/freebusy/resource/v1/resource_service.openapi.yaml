                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
    /v1/resources/{resource}:archive:
        post:
            tags:
                - ResourceService
            description: Archives a resource, hiding it from availability and new bookings.
            operationId: ResourceService_ArchiveResource
            parameters:
                - name: resource
                  in: path
                  description: The resource id.
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
