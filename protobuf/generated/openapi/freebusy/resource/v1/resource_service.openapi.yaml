            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/Resource'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Resource'
                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
    /v1/resources/{resource}/offerings:
        get:
            tags:
                - ResourceService
            description: Lists the offerings attached to a resource.
            operationId: ResourceService_ListOfferings
            parameters:
                - name: resource
                  in: path
                  description: The resource id.
                  required: true
                  schema:
                    type: string
                - name: pageSize
                  in: query
