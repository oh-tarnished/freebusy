            parameters:
                - name: resource
                  in: path
                  description: The resource id.
                  required: true
                  schema:
                    type: string
                - name: offering
                  in: path
                  description: The offering id.
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content: {}
                default:
                    description: Default error response
                    content:
                        application/json:
