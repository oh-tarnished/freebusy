                default:
                    description: Default error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
        patch:
            tags:
                - IdentityService
            description: Updates the signed-in user's profile.
            operationId: IdentityService_UpdateUser
            parameters:
