syntax = "proto3";

package freebusy.channel.v1;

// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)

import "freebusy/channel/v1/enums.proto";
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "google/type/date.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/channel/v1/channelpbv1;channelpbv1";
option java_multiple_files = true;
option java_outer_classname = "ChannelProto";
option java_package = "dev.ohtarnished.freebusy.channel.v1";

// A connection between one property and one distribution channel (OTA/GDS). It
// is the anchor for 2-way ARI: availability/rates/inventory are pushed out per
// mapped unit, and reservations made on the channel are pulled in as bookings.
// Credentials are never carried in the API — only an opaque handle to where they
// are stored.
message Channel {
  option (google.api.resource) = {
    type: "freebusy.channel.v1/Channel"
    pattern: "channels/{channel}"
    singular: "channel"
    plural: "channels"
  };

  // The channel name.
  // Format: channels/{channel}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The property this channel distributes.
  // Format: properties/{property}
  string property = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Property"}
  ];

  // Which OTA/GDS this connects to. Immutable: the adapter and external ID space
  // are fixed per channel.
  ChannelType type = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Human-friendly label (e.g. "Booking.com — Goa Resort").
  string display_name = 4 [(google.api.field_behavior) = OPTIONAL];

  // The channel's own code for this hotel (e.g. the Booking.com hotel id).
  string external_property_id = 5 [(google.api.field_behavior) = OPTIONAL];

  // Opaque handle to the stored credentials for this connection (a secret-manager
  // key or vault path). The secrets themselves are never returned by the API.
  string credential_ref = 6 [(google.api.field_behavior) = OPTIONAL];

  // Connection state.
  ChannelState state = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When ARI/reservations last synced successfully.
  google.protobuf.Timestamp last_sync_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 11;
}

// Maps a freebusy Unit to its counterpart on the channel. ARI for a unit only
// flows once a MAPPED mapping exists: the external room-type and rate-plan ids
// key the availability/rate/restriction push and resolve inbound reservations
// back to the right unit.
message UnitMapping {
  option (google.api.resource) = {
    type: "freebusy.channel.v1/UnitMapping"
    pattern: "channels/{channel}/unitMappings/{unit_mapping}"
    singular: "unitMapping"
    plural: "unitMappings"
  };

  // The mapping name.
  // Format: channels/{channel}/unitMappings/{unit_mapping}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The freebusy unit being mapped.
  // Format: properties/{property}/units/{unit}
  string unit = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}
  ];

  // The channel's room-type id this unit maps to.
  string external_room_type_id = 3 [(google.api.field_behavior) = REQUIRED];

  // The channel's rate-plan id this unit maps to.
  string external_rate_plan_id = 4 [(google.api.field_behavior) = OPTIONAL];

  // Mapping state.
  MappingState state = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 8;
}

// One day's availability, rate, and restrictions for a unit — the atomic unit of
// an outbound ARI push. It is the channel-facing projection of the unit's price
// and its Schedule's stay constraints for a single date.
message AriUpdate {
  // The unit this update is for.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}
  ];

  // The date (in the unit's timezone) the values apply to.
  google.type.Date date = 2 [(google.api.field_behavior) = REQUIRED];

  // Number of units available to sell on this date.
  int32 available = 3 [(google.api.field_behavior) = OPTIONAL];

  // Nightly rate to publish for this date.
  google.type.Money rate = 4 [(google.api.field_behavior) = OPTIONAL];

  // Booking restrictions to publish for this date.
  Restrictions restrictions = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Sell restrictions published to a channel for a date.
message Restrictions {
  // Minimum length of stay. Zero means no minimum.
  int32 min_stay = 1 [(google.api.field_behavior) = OPTIONAL];

  // Maximum length of stay. Zero means no maximum.
  int32 max_stay = 2 [(google.api.field_behavior) = OPTIONAL];

  // Closed to arrival: a stay may not start on this date.
  bool arrival_closed = 3 [(google.api.field_behavior) = OPTIONAL];

  // Closed to departure: a stay may not end on this date.
  bool departure_closed = 4 [(google.api.field_behavior) = OPTIONAL];

  // Stop-sell: the unit is not sellable on this date regardless of inventory.
  bool stop_sell = 5 [(google.api.field_behavior) = OPTIONAL];
}

// A reservation as it exists on the channel, landed inbound so it can be
// reconciled into a freebusy Booking. The unit is resolved from the channel's
// external ids via the UnitMapping.
message ExternalReservation {
  // The channel the reservation came from.
  // Format: channels/{channel}
  string channel = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // The channel's own id for this reservation (used for idempotency and
  // modify/cancel matching).
  string external_id = 2 [(google.api.field_behavior) = REQUIRED];

  // The resolved freebusy unit being booked.
  // Format: properties/{property}/units/{unit}
  string unit = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}
  ];

  // Guest contact details supplied by the channel.
  freebusy.shared.v1.Contact guest = 4 [(google.api.field_behavior) = OPTIONAL];

  // The stay: check-in to check-out (end_date is the check-out date).
  freebusy.shared.v1.DateRange stay = 5 [(google.api.field_behavior) = REQUIRED];

  // Number of units / rooms reserved. Defaults to 1.
  int32 units = 6 [(google.api.field_behavior) = OPTIONAL];

  // The reservation total as charged on the channel.
  google.type.Money total = 7 [(google.api.field_behavior) = OPTIONAL];

  // Whether this is a create, modify, or cancel.
  ReservationOp op = 8 [(google.api.field_behavior) = REQUIRED];
}

// A record of one sync attempt, for observability of the ARI push / reservation
// pull. Returned by ListSyncEvents; not a standalone resource.
message SyncEvent {
  // Whether this was an outbound push or an inbound pull.
  SyncDirection direction = 1;

  // The channel involved.
  // Format: channels/{channel}
  string channel = 2 [(google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}];

  // The unit involved, when the event is unit-scoped.
  // Format: properties/{property}/units/{unit}
  string unit = 3 [(google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}];

  // The date the event concerned, when applicable.
  google.type.Date date = 4;

  // Outcome.
  SyncState state = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-readable error when state is FAILED.
  string error = 6;

  // When the event occurred.
  google.protobuf.Timestamp event_time = 7;
}
