syntax = "proto3";

package freebusy.channel.v1;

import "freebusy/channel/v1/channel.proto";
import "freebusy/channel/v1/channel_messages.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "mcp/protobuf/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/channel/v1/channelpbv1;channelpbv1";
option java_multiple_files = true;
option java_outer_classname = "ChannelServiceProto";
option java_package = "dev.ohtarnished.freebusy.channel.v1";

// ChannelService is the distribution layer: it manages a property's connections
// to OTAs/GDS and drives 2-way ARI — pushing availability/rates/inventory out per
// mapped unit and landing reservations made on a channel back as bookings. The
// per-OTA adapters that actually talk to each channel run behind these methods.
service ChannelService {
  option (google.api.default_host) = "freebusy.ohtarnished.dev";
  option (mcp.service) = {
    app: {
      name: "Channel Manager"
      version: "1.0.0"
      description: "Connect properties to OTAs/GDS and sync availability, rates, and reservations."
    }
  };

  // Lists channels.
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse) {
    option (google.api.http) = {get: "/v1/channels"};
    option (mcp.tool) = {description: "List OTA/GDS channels. Filter by property, type, or state."};
  }

  // Gets a single channel.
  rpc GetChannel(GetChannelRequest) returns (Channel) {
    option (google.api.http) = {get: "/v1/{name=channels/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a single channel connection by name."};
  }

  // Creates a channel connection for a property.
  rpc CreateChannel(CreateChannelRequest) returns (Channel) {
    option (google.api.http) = {
      post: "/v1/channels"
      body: "channel"
    };
    option (google.api.method_signature) = "channel,channel_id";
    option (mcp.tool) = {description: "Connect a property to an OTA/GDS (Agoda, Booking.com, Expedia, Airbnb, ...)."};
  }

  // Updates a channel.
  rpc UpdateChannel(UpdateChannelRequest) returns (Channel) {
    option (google.api.http) = {
      patch: "/v1/{channel.name=channels/*}"
      body: "channel"
    };
    option (google.api.method_signature) = "channel,update_mask";
    option (mcp.tool) = {description: "Update a channel's label, external property id, or credentials handle."};
  }

  // Deletes a channel connection.
  rpc DeleteChannel(DeleteChannelRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=channels/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Remove an OTA/GDS channel connection by name."};
  }

  // Enables a channel, resuming ARI push and reservation pull.
  rpc EnableChannel(EnableChannelRequest) returns (Channel) {
    option (google.api.http) = {
      post: "/v1/{name=channels/*}:enable"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Enable a channel so availability/rates sync and reservations flow again."};
  }

  // Disables a channel, pausing ARI push and reservation pull.
  rpc DisableChannel(DisableChannelRequest) returns (Channel) {
    option (google.api.http) = {
      post: "/v1/{name=channels/*}:disable"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Pause a channel so no availability/rates are pushed and no reservations are pulled."};
  }

  // Lists the unit mappings on a channel.
  rpc ListUnitMappings(ListUnitMappingsRequest) returns (ListUnitMappingsResponse) {
    option (google.api.http) = {get: "/v1/{parent=channels/*}/unitMappings"};
    option (google.api.method_signature) = "parent";
    option (mcp.tool) = {description: "List the unit-to-external-room mappings on a channel."};
  }

  // Gets a single unit mapping.
  rpc GetUnitMapping(GetUnitMappingRequest) returns (UnitMapping) {
    option (google.api.http) = {get: "/v1/{name=channels/*/unitMappings/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a single unit mapping by name."};
  }

  // Maps a unit to the channel's external room type / rate plan.
  rpc CreateUnitMapping(CreateUnitMappingRequest) returns (UnitMapping) {
    option (google.api.http) = {
      post: "/v1/{parent=channels/*}/unitMappings"
      body: "unit_mapping"
    };
    option (google.api.method_signature) = "parent,unit_mapping,unit_mapping_id";
    option (mcp.tool) = {description: "Map a freebusy unit to the channel's room type + rate plan so ARI can flow."};
  }

  // Updates a unit mapping.
  rpc UpdateUnitMapping(UpdateUnitMappingRequest) returns (UnitMapping) {
    option (google.api.http) = {
      patch: "/v1/{unit_mapping.name=channels/*/unitMappings/*}"
      body: "unit_mapping"
    };
    option (google.api.method_signature) = "unit_mapping,update_mask";
    option (mcp.tool) = {description: "Update a unit mapping's external room-type or rate-plan id."};
  }

  // Deletes a unit mapping.
  rpc DeleteUnitMapping(DeleteUnitMappingRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=channels/*/unitMappings/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Remove a unit mapping by name."};
  }

  // Pushes availability/rate/restriction updates for a channel's mapped units.
  rpc PushAri(PushAriRequest) returns (PushAriResponse) {
    option (google.api.http) = {
      post: "/v1/{channel=channels/*}:pushAri"
      body: "*"
    };
    option (google.api.method_signature) = "channel,updates";
    option (mcp.tool) = {description: "Push availability, rates, and restrictions for a channel's mapped units over a date range."};
  }

  // Lands a reservation made on a channel, reconciling it into a booking.
  rpc ImportReservation(ImportReservationRequest) returns (ImportReservationResponse) {
    option (google.api.http) = {
      post: "/v1/{reservation.channel=channels/*}:importReservation"
      body: "*"
    };
    option (google.api.method_signature) = "reservation";
    option (mcp.tool) = {description: "Land a channel reservation (create/modify/cancel) as a freebusy booking."};
  }

  // Reports a channel's sync health.
  rpc GetChannelSyncStatus(GetChannelSyncStatusRequest) returns (ChannelSyncStatus) {
    option (google.api.http) = {get: "/v1/{name=channels/*/syncStatus}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a channel's sync health: state, last sync, and pending/failed counts."};
  }

  // Lists a channel's sync events.
  rpc ListSyncEvents(ListSyncEventsRequest) returns (ListSyncEventsResponse) {
    option (google.api.http) = {get: "/v1/{parent=channels/*}/syncEvents"};
    option (google.api.method_signature) = "parent";
    option (mcp.tool) = {description: "List a channel's push/pull sync events. Filter by direction or status."};
  }
}
