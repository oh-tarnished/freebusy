syntax = "proto3";

package freebusy.channel.v1;

import "freebusy/channel/v1/channel.proto";
import "freebusy/channel/v1/enums.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/channel/v1/channelpbv1;channelpbv1";
option java_multiple_files = true;
option java_outer_classname = "ChannelMessagesProto";
option java_package = "dev.ohtarnished.freebusy.channel.v1";

// Request message for ListChannels.
message ListChannelsRequest {
  // Maximum number of channels to return. The server may cap this.
  int32 page_size = 1 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListChannels call's next_page_token.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression (AIP-160), e.g. `property = "properties/9"`,
  // `type = CHANNEL_TYPE_AGODA`, or `state = CHANNEL_STATE_CONNECTED`.
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // Sort order, e.g. "create_time desc".
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListChannels.
message ListChannelsResponse {
  // The page of channels.
  repeated Channel channels = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}

// Request message for GetChannel.
message GetChannelRequest {
  // The channel to retrieve.
  // Format: channels/{channel}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];
}

// Request message for CreateChannel.
message CreateChannelRequest {
  // The channel to create. Its name and state fields are ignored.
  Channel channel = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional caller-chosen ID for the channel; the server generates one if unset.
  string channel_id = 2 [(google.api.field_behavior) = OPTIONAL];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 3 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for UpdateChannel.
message UpdateChannelRequest {
  // The channel to update; its name identifies the target.
  Channel channel = 1 [(google.api.field_behavior) = REQUIRED];

  // Fields to overwrite. Omit to replace all mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteChannel.
message DeleteChannelRequest {
  // The channel to delete.
  // Format: channels/{channel}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // If true, delete the channel and its unit mappings; if false and mappings
  // exist, the call fails.
  bool force = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for EnableChannel.
message EnableChannelRequest {
  // The channel to enable (resume ARI push and reservation pull).
  // Format: channels/{channel}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];
}

// Request message for DisableChannel.
message DisableChannelRequest {
  // The channel to disable (pause ARI push and reservation pull).
  // Format: channels/{channel}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];
}

// Request message for ListUnitMappings.
message ListUnitMappingsRequest {
  // The channel whose unit mappings to list.
  // Format: channels/{channel}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // Maximum number of mappings to return.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListUnitMappings call's next_page_token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression (AIP-160), e.g. `state = MAPPING_STATE_UNMAPPED`.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sort order.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListUnitMappings.
message ListUnitMappingsResponse {
  // The page of unit mappings.
  repeated UnitMapping unit_mappings = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}

// Request message for GetUnitMapping.
message GetUnitMappingRequest {
  // The mapping to retrieve.
  // Format: channels/{channel}/unitMappings/{unit_mapping}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/UnitMapping"}
  ];
}

// Request message for CreateUnitMapping.
message CreateUnitMappingRequest {
  // The channel to add the mapping to.
  // Format: channels/{channel}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // The mapping to create. Its name field is ignored.
  UnitMapping unit_mapping = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional caller-chosen ID for the mapping; the server generates one if unset.
  string unit_mapping_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 4 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for UpdateUnitMapping.
message UpdateUnitMappingRequest {
  // The mapping to update; its name identifies the target.
  UnitMapping unit_mapping = 1 [(google.api.field_behavior) = REQUIRED];

  // Fields to overwrite. Omit to replace all mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteUnitMapping.
message DeleteUnitMappingRequest {
  // The mapping to delete.
  // Format: channels/{channel}/unitMappings/{unit_mapping}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/UnitMapping"}
  ];
}

// Request message for PushAri. Pushes availability/rate/restriction updates for a
// channel's mapped units (AIP-231 batch shape). Unmapped units are rejected.
message PushAriRequest {
  // The channel to push to.
  // Format: channels/{channel}
  string channel = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // The per-unit, per-date updates to publish.
  repeated AriUpdate updates = 2 [(google.api.field_behavior) = REQUIRED];
}

// Response message for PushAri.
message PushAriResponse {
  // Number of updates accepted for publishing.
  int32 accepted = 1;

  // Per-update sync events (queued or failed), for observability.
  repeated SyncEvent events = 2;
}

// Request message for ImportReservation. Lands a reservation made on a channel so
// it reconciles into a freebusy Booking (create/modify/cancel).
message ImportReservationRequest {
  // The reservation as it exists on the channel.
  ExternalReservation reservation = 1 [(google.api.field_behavior) = REQUIRED];
}

// Response message for ImportReservation.
message ImportReservationResponse {
  // The freebusy booking created or updated from the reservation.
  // Format: bookings/{booking}
  string booking = 1 [(google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"}];
}

// Request message for GetChannelSyncStatus.
message GetChannelSyncStatusRequest {
  // The sync-status singleton to read.
  // Format: channels/{channel}/syncStatus
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/ChannelSyncStatus"}
  ];
}

// A rollup of a channel's sync health, modeled as a singleton sub-resource of the
// channel (one per channel) and read via GetChannelSyncStatus.
message ChannelSyncStatus {
  option (google.api.resource) = {
    type: "freebusy.channel.v1/ChannelSyncStatus"
    pattern: "channels/{channel}/syncStatus"
    singular: "channelSyncStatus"
    plural: "channelSyncStatuses"
  };

  // The sync-status name.
  // Format: channels/{channel}/syncStatus
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Current connection state.
  ChannelState state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When ARI/reservations last synced successfully.
  google.protobuf.Timestamp last_sync_time = 3;

  // Count of updates still queued.
  int32 pending_count = 4;

  // Count of updates that failed since the last success.
  int32 failed_count = 5;

  // Most recent error message, when the last sync failed.
  string last_error = 6;
}

// Request message for ListSyncEvents.
message ListSyncEventsRequest {
  // The channel whose sync events to list.
  // Format: channels/{channel}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.channel.v1/Channel"}
  ];

  // Maximum number of events to return.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Page token from a previous ListSyncEvents call's next_page_token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression (AIP-160), e.g. `direction = SYNC_DIRECTION_OUTBOUND`,
  // `state = SYNC_STATE_FAILED`.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sort order, e.g. "event_time desc".
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListSyncEvents.
message ListSyncEventsResponse {
  // The page of sync events.
  repeated SyncEvent sync_events = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}
