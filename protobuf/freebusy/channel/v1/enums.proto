syntax = "proto3";

package freebusy.channel.v1;

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/channel/v1/channelpbv1;channelpbv1";
option java_multiple_files = true;
option java_outer_classname = "EnumsProto";
option java_package = "dev.ohtarnished.freebusy.channel.v1";

// A distribution channel (OTA/GDS) a property is connected to. Values are
// ordered by integration priority: the per-OTA adapters are built Agoda →
// Booking.com → Expedia → Airbnb first, then the rest.
enum ChannelType {
  // Unset.
  CHANNEL_TYPE_UNSPECIFIED = 0;

  // Agoda.
  CHANNEL_TYPE_AGODA = 1;

  // Booking.com.
  CHANNEL_TYPE_BOOKING_COM = 2;

  // Expedia.
  CHANNEL_TYPE_EXPEDIA = 3;

  // Airbnb.
  CHANNEL_TYPE_AIRBNB = 4;

  // MakeMyTrip.
  CHANNEL_TYPE_MAKEMYTRIP = 5;

  // Goibibo.
  CHANNEL_TYPE_GOIBIBO = 6;

  // A Global Distribution System (Amadeus/Sabre/Travelport).
  CHANNEL_TYPE_GDS = 7;

  // The property's own direct booking website.
  CHANNEL_TYPE_DIRECT = 8;
}

// Connection state of a channel.
enum ChannelState {
  // Unset.
  CHANNEL_STATE_UNSPECIFIED = 0;

  // Connected and syncing.
  CHANNEL_STATE_CONNECTED = 1;

  // Configured but paused; no ARI push or reservation pull happens.
  CHANNEL_STATE_DISABLED = 2;

  // Connected but the last sync failed; needs attention.
  CHANNEL_STATE_ERROR = 3;
}

// Whether a unit is mapped to its counterpart on the channel.
enum MappingState {
  // Unset.
  MAPPING_STATE_UNSPECIFIED = 0;

  // Mapped to an external room type + rate plan; ARI flows.
  MAPPING_STATE_MAPPED = 1;

  // Not yet mapped; ARI for this unit is not pushed.
  MAPPING_STATE_UNMAPPED = 2;
}

// The operation an inbound external reservation represents.
enum ReservationOp {
  // Unset.
  RESERVATION_OP_UNSPECIFIED = 0;

  // A new reservation was made on the channel.
  RESERVATION_OP_CREATE = 1;

  // An existing reservation was modified on the channel.
  RESERVATION_OP_MODIFY = 2;

  // A reservation was cancelled on the channel.
  RESERVATION_OP_CANCEL = 3;
}

// Direction of a sync event relative to freebusy.
enum SyncDirection {
  // Unset.
  SYNC_DIRECTION_UNSPECIFIED = 0;

  // Outbound: availability/rates/inventory pushed to the channel.
  SYNC_DIRECTION_OUTBOUND = 1;

  // Inbound: a reservation pulled from the channel.
  SYNC_DIRECTION_INBOUND = 2;
}

// Outcome of a sync event.
enum SyncState {
  // Unset.
  SYNC_STATE_UNSPECIFIED = 0;

  // Queued/in flight.
  SYNC_STATE_PENDING = 1;

  // Completed successfully.
  SYNC_STATE_SUCCESS = 2;

  // Failed; see the event's error.
  SYNC_STATE_FAILED = 3;
}
