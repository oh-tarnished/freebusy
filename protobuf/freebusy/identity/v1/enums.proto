syntax = "proto3";

package freebusy.identity.v1;

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/identity/v1/identitypbv1;identitypbv1";
option java_multiple_files = true;
option java_outer_classname = "EnumsProto";
option java_package = "dev.ohtarnished.freebusy.identity.v1";

// A guest's gender, as recorded on a registration card.
enum Gender {
  // Unset.
  GENDER_UNSPECIFIED = 0;

  // Male.
  GENDER_MALE = 1;

  // Female.
  GENDER_FEMALE = 2;

  // Another gender identity.
  GENDER_OTHER = 3;

  // Declined to state.
  GENDER_UNDISCLOSED = 4;
}

// Which age bracket a guest falls in. Drives occupancy counting and child
// pricing; may be given explicitly or derived from date_of_birth.
enum AgeGroup {
  // Unset.
  AGE_GROUP_UNSPECIFIED = 0;

  // An adult (occupies an adult slot; charged the adult rate).
  AGE_GROUP_ADULT = 1;

  // A child (may be charged a child rate or stay free per policy).
  AGE_GROUP_CHILD = 2;

  // An infant (typically not counted against occupancy).
  AGE_GROUP_INFANT = 3;
}

// The kind of government identity document a guest presents at check-in.
enum IdDocumentType {
  // Unset.
  ID_DOCUMENT_TYPE_UNSPECIFIED = 0;

  // Passport (required for foreign nationals, e.g. India Form C).
  ID_DOCUMENT_TYPE_PASSPORT = 1;

  // A national identity card.
  ID_DOCUMENT_TYPE_NATIONAL_ID = 2;

  // A driving licence.
  ID_DOCUMENT_TYPE_DRIVING_LICENSE = 3;

  // India's Aadhaar card.
  ID_DOCUMENT_TYPE_AADHAAR = 4;

  // A voter identity card.
  ID_DOCUMENT_TYPE_VOTER_ID = 5;

  // Any other accepted document.
  ID_DOCUMENT_TYPE_OTHER = 6;
}

// A guest's smoking preference for room assignment.
enum SmokingPreference {
  // Unset / no preference recorded.
  SMOKING_PREFERENCE_UNSPECIFIED = 0;

  // Prefers a non-smoking room.
  SMOKING_PREFERENCE_NON_SMOKING = 1;

  // Prefers a smoking room.
  SMOKING_PREFERENCE_SMOKING = 2;
}

// A guest's bed-type preference for room assignment.
enum BedPreference {
  // Unset.
  BED_PREFERENCE_UNSPECIFIED = 0;

  // No particular preference.
  BED_PREFERENCE_NO_PREFERENCE = 1;

  // A king bed.
  BED_PREFERENCE_KING = 2;

  // A queen bed.
  BED_PREFERENCE_QUEEN = 3;

  // Two twin beds.
  BED_PREFERENCE_TWIN = 4;

  // A single bed.
  BED_PREFERENCE_SINGLE = 5;
}
