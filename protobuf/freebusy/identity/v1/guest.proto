syntax = "proto3";

package freebusy.identity.v1;

import "freebusy/identity/v1/enums.proto";
import "google/api/field_behavior.proto";
import "google/type/date.proto";
import "google/type/postal_address.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/identity/v1/identitypbv1;identitypbv1";
option java_multiple_files = true;
option java_outer_classname = "GuestProto";
option java_package = "dev.ohtarnished.freebusy.identity.v1";

// A guest is a person who stays under a booking. It is one of three distinct
// people the system models, all in the identity domain:
//   - User   (identity.proto): the account that signs in and books online.
//   - Guest  (this message):   a person actually staying — the party on a booking.
//   - Member (organisation):   hotel staff who manage the chain/property.
//
// The booker (a User, or an anonymous contact) is not necessarily a guest, and a
// booking has one or more guests. This message captures what a hotel records on a
// Guest Registration Card at check-in — identity, nationality, and ID — plus the
// foreigner-registration details required for foreign nationals (e.g. India's
// Form C / FRRO), and the guest's own stay preferences. It is an embedded value
// on a booking, not an addressable account resource.
message Guest {
  // Full legal name, exactly as on the presented ID / passport.
  string display_name = 1 [(google.api.field_behavior) = REQUIRED];

  // Whether this is the lead / primary guest (the registered occupant the
  // booking is held under). Exactly one guest in a party is primary.
  bool primary = 2 [(google.api.field_behavior) = OPTIONAL];

  // Gender as recorded for registration.
  Gender gender = 3 [(google.api.field_behavior) = OPTIONAL];

  // Date of birth.
  google.type.Date birth_date = 4 [(google.api.field_behavior) = OPTIONAL];

  // Age bracket; given explicitly, or derived from birth_date by the server.
  AgeGroup age_group = 5 [(google.api.field_behavior) = OPTIONAL];

  // Nationality as an ISO 3166-1 alpha-2 country code (e.g. "IN", "GB", "US").
  // Required for foreign-national registration.
  string nationality = 6 [(google.api.field_behavior) = OPTIONAL];

  // Government identity document presented at check-in.
  IdDocument id_document = 7 [(google.api.field_behavior) = OPTIONAL];

  // Contact email (typically only for the lead guest).
  string email = 8 [(google.api.field_behavior) = OPTIONAL];

  // Contact phone in E.164 form (typically only for the lead guest).
  string phone_number = 9 [(google.api.field_behavior) = OPTIONAL];

  // Permanent / home address in the country of residence.
  google.type.PostalAddress permanent_address = 10 [(google.api.field_behavior) = OPTIONAL];

  // Local address / reference in the country of stay (the "address in India"
  // field on Form C).
  google.type.PostalAddress local_address = 11 [(google.api.field_behavior) = OPTIONAL];

  // Foreigner-registration details, present when the guest is a foreign national
  // (drives Form C / FRRO filing). Omitted for domestic guests.
  ForeignerDetails foreigner = 12 [(google.api.field_behavior) = OPTIONAL];

  // The guest's own stay preferences and special requests, kept with the guest
  // so they travel with them across the booking.
  GuestPreferences preferences = 13 [(google.api.field_behavior) = OPTIONAL];
}

// A government identity document. Passport fields are required for foreign
// nationals; domestic guests may present any accepted document type.
message IdDocument {
  // Which kind of document this is.
  IdDocumentType type = 1 [(google.api.field_behavior) = REQUIRED];

  // The document number.
  string number = 2 [(google.api.field_behavior) = REQUIRED];

  // Issuing country as an ISO 3166-1 alpha-2 code.
  string issuing_country = 3 [(google.api.field_behavior) = OPTIONAL];

  // Place of issue (city / office), as printed on the document.
  string issue_place = 4 [(google.api.field_behavior) = OPTIONAL];

  // Date the document was issued.
  google.type.Date issue_date = 5 [(google.api.field_behavior) = OPTIONAL];

  // Date the document expires.
  google.type.Date expiry_date = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Foreigner-registration details a hotel must capture for foreign nationals to
// file Form C with the FRRO within 24 hours of arrival (India). Nationals of
// exempt countries (e.g. Nepal, Bhutan) and diplomats may omit these.
message ForeignerDetails {
  // Visa number.
  string visa_number = 1 [(google.api.field_behavior) = OPTIONAL];

  // Visa type / category (e.g. "Tourist", "Business", "Employment").
  string visa_type = 2 [(google.api.field_behavior) = OPTIONAL];

  // Place the visa was issued.
  string visa_issue_place = 3 [(google.api.field_behavior) = OPTIONAL];

  // Date the visa was issued.
  google.type.Date visa_issue_date = 4 [(google.api.field_behavior) = OPTIONAL];

  // Date the visa expires.
  google.type.Date visa_expiry_date = 5 [(google.api.field_behavior) = OPTIONAL];

  // Date the guest arrived in the country.
  google.type.Date arrival_date = 6 [(google.api.field_behavior) = OPTIONAL];

  // Port / place of entry into the country.
  string entry_port = 7 [(google.api.field_behavior) = OPTIONAL];

  // Where the guest is arriving from (last city / country).
  string origin = 8 [(google.api.field_behavior) = OPTIONAL];

  // The guest's next destination after this stay.
  string next_destination = 9 [(google.api.field_behavior) = OPTIONAL];

  // Purpose of visit (e.g. "Tourism", "Business", "Medical").
  string visit_purpose = 10 [(google.api.field_behavior) = OPTIONAL];
}

// A guest's stay preferences and special requests. All optional; used to guide
// unit assignment and to surface requests to housekeeping / front desk.
message GuestPreferences {
  // Preferred smoking / non-smoking room.
  SmokingPreference smoking = 1 [(google.api.field_behavior) = OPTIONAL];

  // Preferred bed type.
  BedPreference bed = 2 [(google.api.field_behavior) = OPTIONAL];

  // Dietary requirements / requests (e.g. "vegetarian", "jain", "halal",
  // "gluten-free").
  repeated string dietary = 3 [(google.api.field_behavior) = OPTIONAL];

  // Accessibility needs (e.g. "wheelchair", "hearing-accessible",
  // "ground-floor").
  repeated string accessibility = 4 [(google.api.field_behavior) = OPTIONAL];

  // Preferred floor; 0 means no preference.
  int32 floor_preference = 5 [(google.api.field_behavior) = OPTIONAL];

  // Loyalty-programme membership number, if any.
  string loyalty_number = 6 [(google.api.field_behavior) = OPTIONAL];

  // Free-form special requests (e.g. "late check-in", "crib", "high floor").
  repeated string special_requests = 7 [(google.api.field_behavior) = OPTIONAL];

  // Any additional free-text notes about the guest.
  string notes = 8 [(google.api.field_behavior) = OPTIONAL];
}
