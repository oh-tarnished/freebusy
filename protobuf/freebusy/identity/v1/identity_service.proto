syntax = "proto3";

package freebusy.identity.v1;

import "freebusy/identity/v1/identity.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "mcp/protobuf/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/identity/v1/identitypbv1;identitypbv1";
option java_multiple_files = true;
option java_outer_classname = "IdentityServiceProto";
option java_package = "dev.ohtarnished.freebusy.identity.v1";

// IdentityService is the thin "who am I" surface. Login itself is an OIDC
// redirect flow over plain HTTP handled by the IdP, never an RPC here.
service IdentityService {
  option (google.api.default_host) = "freebusy.ohtarnished.dev";
  option (mcp.service) = {
    app: {
      name: "Identity"
      version: "1.0.0"
      description: "Read and update the signed-in user's profile."
    }
  };

  // Returns a user. Use "users/me" for the signed-in caller.
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {get: "/v1/{name=users/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a user (\"users/me\" for the signed-in caller), including profile and organisation memberships."};
  }

  // Lists users sharing an organisation with the caller.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
    option (mcp.tool) = {description: "List users sharing an organisation with the caller; filter by organisation or display name."};
  }

  // Updates the signed-in user's profile.
  rpc UpdateUser(UpdateUserRequest) returns (User) {
    option (google.api.http) = {
      patch: "/v1/{user.name=users/*}"
      body: "user"
    };
    option (google.api.method_signature) = "user,update_mask";
    option (mcp.tool) = {description: "Update the signed-in user's profile: display name, avatar, locale, or time zone."};
  }
}
