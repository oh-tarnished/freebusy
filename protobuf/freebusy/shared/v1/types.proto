syntax = "proto3";

package freebusy.shared.v1;

import "buf/validate/validate.proto";
import "freebusy/shared/v1/enums.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "google/type/date.proto";
import "google/type/money.proto";
import "orm/v1/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/shared/v1/sharedpbv1;sharedpbv1";
option java_multiple_files = true;
option java_outer_classname = "TypesProto";
option java_package = "dev.ohtarnished.freebusy.shared.v1";

// A half-open time interval [start_time, end_time). Used for query windows and
// for a booking's reserved span in both TIME_SLOT and NIGHTLY modes.
message TimeWindow {
  // Inclusive start of the interval.
  google.protobuf.Timestamp start_time = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Exclusive end of the interval.
  google.protobuf.Timestamp end_time = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// A half-open range of calendar dates [start_date, end_date), evaluated in the
// resource's local timezone. The natural query and exception shape for NIGHTLY
// resources: end_date is the check-out date and is not itself included.
message DateRange {
  // Inclusive first date of the range.
  google.type.Date start_date = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Exclusive end date of the range.
  google.type.Date end_date = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// Contact details for the person a booking is for. When a booking carries a
// `customer` (a users/{user} reference) these typically mirror the user's
// profile; for walk-in or email-only bookings made by someone who is not a
// registered user, this is the only contact information captured. The server
// requires at least one reachable channel (email or phone) when no customer is
// set.
message Contact {
  // Full name of the guest.
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];

  // Email address for the confirmation and any follow-ups.
  string email = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.email = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Phone number in E.164 form (e.g. "+14155552671").
  string phone_number = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.pattern = "^\\+[1-9][0-9]{1,14}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// One line in a price breakdown: a base charge, a fee, a tax, or a discount.
// Clients branch on `type` and `code`; the signed `amount` rolls up to the
// booking total (charges positive, discounts negative).
message PriceComponent {
  // What a price line represents.
  enum Type {
    // Unset.
    TYPE_UNSPECIFIED = 0;

    // The base charge: nightly/slot subtotal before fees, taxes, and discounts.
    TYPE_BASE = 1;

    // A fee added on top of the base (e.g. cleaning, service, resort).
    TYPE_FEE = 2;

    // A tax on the taxable base (e.g. VAT, occupancy/lodging tax).
    TYPE_TAX = 3;

    // A discount (promo code, length-of-stay); `amount` is negative.
    TYPE_DISCOUNT = 4;
  }

  // Which kind of line this is.
  Type type = 1;

  // Stable machine code for the line, e.g. "base", "cleaning_fee",
  // "occupancy_tax", or a promo code. Clients key display and logic off this.
  string code = 2;

  // Human-readable label suitable for display on an itemized receipt.
  string display_name = 3;

  // Signed amount: positive for charges (base, fees, taxes), negative for
  // discounts. Summing every component yields the booking total.
  google.type.Money amount = 4;
}

// An uploaded file attached to a document- or licence-carrying record (e.g. a
// guest's IdDocument scan, or a property/unit licence certificate). The bytes
// are stored inline in `content` today; `uri` is populated once the file is
// migrated to object storage (S3 or any CDN-fronted host). At most one of the
// two is authoritative at a time — prefer `uri` when both are set.
message Attachment {
  option (orm.v1.table) = {id: ID_STRATEGY_ULID};

  // Original filename as uploaded.
  string filename = 1 [(google.api.field_behavior) = OPTIONAL];

  // MIME type of the file (e.g. "application/pdf", "image/jpeg").
  string mime_type = 2 [(google.api.field_behavior) = OPTIONAL];

  // Size of the file in bytes.
  int64 size_bytes = 3 [(google.api.field_behavior) = OPTIONAL];

  // Raw file content, stored inline in the database. Cleared once the file is
  // migrated to object storage, at which point `uri` takes over.
  bytes content = 4 [(google.api.field_behavior) = OPTIONAL];

  // Location of the file once moved to object storage (e.g. an s3:// or
  // https:// URL). Unset while the file lives inline in `content`.
  string uri = 5 [(google.api.field_behavior) = OPTIONAL];

  // When the file was uploaded.
  google.protobuf.Timestamp upload_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}
