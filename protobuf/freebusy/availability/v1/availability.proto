syntax = "proto3";

package freebusy.availability.v1;

import "buf/validate/validate.proto";
import "freebusy/availability/v1/enums.proto";
// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)
import "freebusy/shared/v1/enums.proto";
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/type/date.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/availability/v1/availabilitypbv1;availabilitypbv1";
option java_multiple_files = true;
option java_outer_classname = "AvailabilityProto";
option java_package = "dev.ohtarnished.freebusy.availability.v1";

// A discrete bookable time slot, produced for TIME_SLOT units.
message Slot {
  // Inclusive start of the slot.
  google.protobuf.Timestamp start_time = 1;

  // Exclusive end of the slot (start + unit/requested duration).
  google.protobuf.Timestamp end_time = 2;

  // Number of units free in this slot (capacity minus overlapping bookings).
  int32 free_count = 3;

  // Whether the slot can actually be booked (free and passes policy).
  bool bookable = 4;

  // Price for booking this slot, derived from the unit's pricing.
  google.type.Money price = 5;
}

// Per-night availability, produced for NIGHTLY units.
message NightAvailability {
  // The night, in the unit's local timezone.
  google.type.Date night = 1;

  // Number of units of the pool free that night.
  int32 free_units = 2;

  // Whether the unit is closed that night (exception/blackout).
  bool closed = 3;

  // Nightly price, derived from the unit's pricing.
  google.type.Money price = 4;
}

// A contiguous span that is bookable end to end.
message BookableRange {
  // The bookable span.
  freebusy.shared.v1.TimeWindow window = 1;

  // Whether the whole span is bookable.
  bool bookable = 2;
}

// Availability for one unit, used in batch responses.
message UnitAvailability {
  // The unit these results are for.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [(google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}];

  // Which shape is populated, matching the unit's booking_mode.
  freebusy.shared.v1.BookingMode mode = 2;

  // Slots, when mode is TIME_SLOT.
  repeated Slot slots = 3;

  // Per-night availability, when mode is NIGHTLY.
  repeated NightAvailability nights = 4;
}

// Request message for ComputeAvailability.
message ComputeAvailabilityRequest {
  // Field number of the removed `offering` field; never reuse it (a unit now
  // carries its own duration and price).
  reserved 4;

  // The unit to compute availability for.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"},
    (buf.validate.field).string.pattern = "^properties/[^/]+/units/[^/]+$"
  ];

  // The period to compute availability over. Exactly one must be set.
  oneof period {
    option (buf.validate.oneof).required = true;

    // An exact time window, the natural form for TIME_SLOT units.
    freebusy.shared.v1.TimeWindow window = 2;

    // A calendar-date range in the unit's timezone, the natural form for
    // NIGHTLY units; end_date is the check-out date.
    freebusy.shared.v1.DateRange date_range = 6;
  }

  // Slot length for TIME_SLOT units. Overrides the unit's default duration when
  // set; ignored for NIGHTLY units.
  google.protobuf.Duration duration = 3 [(google.api.field_behavior) = OPTIONAL];

  // Number of units required to be free. Defaults to 1.
  int32 units = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32.gte = 0
  ];
}

// Response message for ComputeAvailability.
message ComputeAvailabilityResponse {
  // Which shape is populated, matching the unit's booking_mode.
  freebusy.shared.v1.BookingMode mode = 1;

  // Slots, when mode is TIME_SLOT.
  repeated Slot slots = 2;

  // Per-night availability, when mode is NIGHTLY.
  repeated NightAvailability nights = 3;
}

// Request message for CheckAvailability.
message CheckAvailabilityRequest {
  // Field number of the removed `offering` field; never reuse it.
  reserved 4;

  // The unit to test.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"},
    (buf.validate.field).string.pattern = "^properties/[^/]+/units/[^/]+$"
  ];

  // The exact span to test for bookability. Exactly one must be set.
  oneof period {
    option (buf.validate.oneof).required = true;

    // An exact time window, the natural form for TIME_SLOT units.
    freebusy.shared.v1.TimeWindow window = 2;

    // A calendar-date range in the unit's timezone, the natural form for
    // NIGHTLY stays; end_date is the check-out date.
    freebusy.shared.v1.DateRange date_range = 5;
  }

  // Number of units required to be free. Defaults to 1.
  int32 units = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32.gte = 0
  ];
}

// A reason a span is not bookable, as a machine-readable code plus a
// human-readable explanation. Clients should branch on code, never on message.
message UnbookableReason {
  // Why the span is not bookable.
  Code code = 1;

  // Human-readable explanation suitable for display, not for parsing.
  string message = 2;
}

// Response message for CheckAvailability.
message CheckAvailabilityResponse {
  // Whether the span is bookable.
  bool bookable = 1;

  // Free units across the span (the minimum over the span).
  int32 free_count = 2;

  // Why the span is not bookable, when bookable is false.
  repeated UnbookableReason reasons = 3;
}

// Request message for ComputeBookableRanges.
message ComputeBookableRangesRequest {
  // Field number of the removed `offering` field; never reuse it.
  reserved 4;

  // The unit to compute bookable ranges for.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"},
    (buf.validate.field).string.pattern = "^properties/[^/]+/units/[^/]+$"
  ];

  // The period to search within. Exactly one must be set.
  oneof period {
    option (buf.validate.oneof).required = true;

    // An exact time window, the natural form for TIME_SLOT units.
    freebusy.shared.v1.TimeWindow window = 2;

    // A calendar-date range in the unit's timezone, the natural form for
    // NIGHTLY units.
    freebusy.shared.v1.DateRange date_range = 6;
  }

  // Minimum span length for TIME_SLOT units.
  google.protobuf.Duration duration = 3 [(google.api.field_behavior) = OPTIONAL];

  // Number of units required to be free. Defaults to 1.
  int32 units = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32.gte = 0
  ];
}

// Response message for ComputeBookableRanges.
message ComputeBookableRangesResponse {
  // The bookable ranges within the window.
  repeated BookableRange ranges = 1;
}

// Request message for BatchComputeAvailability. Each entry is a full
// ComputeAvailabilityRequest (AIP-231), so per-unit duration and units all work
// in batch exactly as they do in the single call.
message BatchComputeAvailabilityRequest {
  // Field numbers of the earlier flat shape; never reuse them.
  reserved 2 to 4;

  // The individual compute requests. Results are returned in the same order.
  repeated ComputeAvailabilityRequest requests = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).repeated.min_items = 1
  ];
}

// Response message for BatchComputeAvailability.
message BatchComputeAvailabilityResponse {
  // Availability per request, in request order.
  repeated UnitAvailability units = 1;
}

// Request message for SearchAvailability. Sweeps the catalog for units that are
// bookable over a period for a given party size, narrowed by a filter and
// optionally scoped to one property (hotel) or organisation (chain), and sorted
// for presentation. This is the storefront query: one call returns the matching
// units with a lead price, rather than the caller listing units and computing
// availability for each.
message SearchAvailabilityRequest {
  // The period to search over. Exactly one must be set.
  oneof period {
    option (buf.validate.oneof).required = true;

    // An exact time window, the natural form for TIME_SLOT units.
    freebusy.shared.v1.TimeWindow window = 1;

    // A calendar-date range in each unit's timezone, the natural form for
    // NIGHTLY units; end_date is the check-out date.
    freebusy.shared.v1.DateRange date_range = 2;
  }

  // Number of units / party size required free. Defaults to 1.
  int32 units = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32.gte = 0
  ];

  // Filter (AIP-160) over unit fields to narrow the catalog, e.g.
  // `type = UNIT_TYPE_ROOM`, `tags:"beachfront"`, or a display_name match.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sort order for matches, e.g. "price" or "price desc". Defaults to price
  // ascending.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of matches to return. The server may cap this.
  int32 page_size = 6 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Page token from a previous SearchAvailability call's next_page_token.
  string page_token = 7 [(google.api.field_behavior) = OPTIONAL];

  // If true, include units that matched the filter but are not bookable for the
  // period (with bookable=false), instead of dropping them.
  bool include_unavailable = 8 [(google.api.field_behavior) = OPTIONAL];

  // Scope the search to a single property (hotel). Empty searches all properties.
  // Format: properties/{property}
  string property = 9 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Property"},
    (buf.validate.field).string.pattern = "^properties/[^/]+$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Scope the search to a single organisation (chain). Empty searches all
  // organisations the caller can see.
  // Format: organisations/{organisation}
  string organisation = 10 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Organisation"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// One unit matched by SearchAvailability, with a lead price for the period.
// Detailed slots/nights are fetched per unit via ComputeAvailability.
message AvailabilityMatch {
  // The matching unit.
  // Format: properties/{property}/units/{unit}
  string unit = 1 [(google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}];

  // Cached display name of the unit, for convenience.
  string display_name = 2;

  // The unit's booking mode.
  freebusy.shared.v1.BookingMode mode = 3;

  // Whether the unit is bookable for the requested period and units.
  bool bookable = 4;

  // Lead price for the requested period: the stay total for NIGHTLY, or the slot
  // price for TIME_SLOT. Used for sorting and display.
  google.type.Money price = 5;
}

// Response message for SearchAvailability.
message SearchAvailabilityResponse {
  // The matching units, ordered per order_by.
  repeated AvailabilityMatch matches = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}
