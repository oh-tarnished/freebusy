syntax = "proto3";

package freebusy.schedule.v1;

// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)

import "freebusy/schedule/v1/enums.proto";
import "freebusy/shared/v1/enums.proto";
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/schedule/v1/schedulepbv1;schedulepbv1";
option java_multiple_files = true;
option java_outer_classname = "ScheduleProto";
option java_package = "dev.ohtarnished.freebusy.schedule.v1";

// A recurring availability window expressed as an RRULE plus a daily open span.
// The freebusy engine expands these against the unit's timezone.
message RecurringRule {
  // RFC 5545 RRULE, e.g. "FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR".
  string rrule = 1 [(google.api.field_behavior) = REQUIRED];

  // Local time-of-day the window opens, 24-hour "HH:MM" (e.g. "09:00").
  // Unset (with closes also unset) means open the whole day.
  string opens = 2 [(google.api.field_behavior) = OPTIONAL];

  // Local time-of-day the window closes, 24-hour "HH:MM" (e.g. "17:00").
  // A closes at or before opens means the span crosses midnight into the next
  // day (e.g. opens "22:00", closes "02:00").
  string closes = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Buffer and notice settings applied around bookings.
message BufferSettings {
  // Prep time reserved before each booking.
  google.protobuf.Duration start_delta = 1 [(google.api.field_behavior) = OPTIONAL];

  // Turnover / cleaning time reserved after each booking.
  google.protobuf.Duration end_delta = 2 [(google.api.field_behavior) = OPTIONAL];

  // Minimum lead time between now and a booking's start.
  google.protobuf.Duration min_notice = 3 [(google.api.field_behavior) = OPTIONAL];

  // How far into the future bookings may be made.
  google.protobuf.Duration max_advance = 4 [(google.api.field_behavior) = OPTIONAL];

  // Minimum gap enforced between two adjacent bookings.
  google.protobuf.Duration gap = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Stay rules that affect bookability for NIGHTLY units.
message StayConstraints {
  // Minimum number of nights per booking.
  int32 min_nights = 1 [(google.api.field_behavior) = OPTIONAL];

  // Maximum number of nights per booking. Zero means no maximum.
  int32 max_nights = 2 [(google.api.field_behavior) = OPTIONAL];

  // Allowed check-in weekdays. Empty means any day.
  repeated freebusy.shared.v1.Weekday checkin_weekdays = 3 [(google.api.field_behavior) = OPTIONAL];

  // Allowed check-out weekdays. Empty means any day.
  repeated freebusy.shared.v1.Weekday checkout_weekdays = 4 [(google.api.field_behavior) = OPTIONAL];

  // Earliest a stay may begin, in days from now.
  int32 advance_min_days = 5 [(google.api.field_behavior) = OPTIONAL];

  // Latest a stay may begin, in days from now. Zero means no limit.
  int32 advance_max_days = 6 [(google.api.field_behavior) = OPTIONAL];
}

// An override of a unit's normal hours on a specific span: a blackout /
// holiday closure, or extra hours beyond the recurring rules.
message AvailabilityException {
  option (google.api.resource) = {
    type: "freebusy.schedule.v1/AvailabilityException"
    pattern: "properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}"
    singular: "availabilityException"
    plural: "availabilityExceptions"
  };

  // The exception name.
  // Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // Whether this span closes the unit or adds extra availability.
  ExceptionKind kind = 3 [(google.api.field_behavior) = REQUIRED];

  // The affected span. Exactly one must be set.
  oneof span {
    // An exact time window, the natural form for TIME_SLOT units.
    freebusy.shared.v1.TimeWindow window = 4;

    // A range of whole calendar dates in the unit's timezone, the natural
    // form for NIGHTLY blackouts (e.g. "closed Dec 24 through Dec 26").
    freebusy.shared.v1.DateRange date_range = 7;
  }

  // Human-readable reason (e.g. "Public holiday").
  string reason = 5 [(google.api.field_behavior) = OPTIONAL];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Aggregate read view of a unit's availability configuration: the inputs the
// freebusy engine consumes. Modeled as a singleton resource, one per unit.
message Schedule {
  option (google.api.resource) = {
    type: "freebusy.schedule.v1/Schedule"
    pattern: "properties/{property}/units/{unit}/schedule"
    singular: "schedule"
    plural: "schedules"
  };

  // The schedule name.
  // Format: properties/{property}/units/{unit}/schedule
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Recurring working hours.
  repeated RecurringRule recurring_rules = 2 [(google.api.field_behavior) = OPTIONAL];

  // Buffer and notice settings.
  BufferSettings buffers = 3 [(google.api.field_behavior) = OPTIONAL];

  // Stay rules (NIGHTLY units).
  StayConstraints stay_constraints = 4 [(google.api.field_behavior) = OPTIONAL];

  // Resource names of the active exceptions; manage them with the
  // AvailabilityException standard methods.
  // Format: properties/{property}/units/{unit}/availabilityExceptions/{availability_exception}
  repeated string exceptions = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "freebusy.schedule.v1/AvailabilityException"}
  ];

  // Refund rules applied when a booking on this unit is cancelled. Unset
  // means cancellations are non-refundable by default.
  CancellationPolicy cancellation_policy = 7 [(google.api.field_behavior) = OPTIONAL];

  // Opaque version for optimistic concurrency (AIP-154); echo on update.
  string etag = 6;
}

// Refund rules graded by how far ahead of a booking's start it is cancelled.
message CancellationPolicy {
  // Ordered refund tiers. For a given cancellation the tier with the largest
  // `cutoff` that is still satisfied (cancelled at least `cutoff` before the
  // booking start) determines the refund. If no tier is satisfied, the booking
  // is non-refundable.
  repeated RefundTier tiers = 1 [(google.api.field_behavior) = OPTIONAL];
}

// One tier of a CancellationPolicy: cancel at least `cutoff` before the booking
// start to receive `refund_percent` of the total back.
message RefundTier {
  // Minimum lead time before the booking start for this tier to apply (e.g. 48h).
  google.protobuf.Duration cutoff = 1 [(google.api.field_behavior) = REQUIRED];

  // Percentage of the booking total refunded at this tier (0-100).
  int32 refund_percent = 2 [(google.api.field_behavior) = REQUIRED];
}
