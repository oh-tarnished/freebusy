syntax = "proto3";

package freebusy.promocode.v1;

import "freebusy/promocode/v1/enums.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/promocode/v1/promocodepbv1;promocodepbv1";
option java_multiple_files = true;
option java_outer_classname = "PromoCodeProto";
option java_package = "dev.ohtarnished.freebusy.promocode.v1";

// A redeemable discount applied to a booking's subtotal. Scoped by a redemption
// window, usage caps, a minimum subtotal, and an optional set of resources /
// offerings it applies to.
message PromoCode {
  option (google.api.resource) = {
    type: "freebusy.promocode.v1/PromoCode"
    pattern: "promoCodes/{promo_code}"
    singular: "promoCode"
    plural: "promoCodes"
  };

  // The promo code name.
  // Format: promoCodes/{promo_code}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // The human-entered code, unique across all promo codes (e.g. "SUMMER25").
  string code = 3 [(google.api.field_behavior) = REQUIRED];

  // Internal display name (not shown to customers).
  string display_name = 4 [(google.api.field_behavior) = OPTIONAL];

  // Free-form description.
  string description = 5 [(google.api.field_behavior) = OPTIONAL];

  // Whether the discount is a percentage or a fixed amount.
  DiscountType discount_type = 6 [(google.api.field_behavior) = REQUIRED];

  // Percentage off (1-100), when discount_type is PERCENTAGE.
  int32 percent_off = 7 [(google.api.field_behavior) = OPTIONAL];

  // Fixed amount off, when discount_type is FIXED_AMOUNT.
  google.type.Money amount_off = 8 [(google.api.field_behavior) = OPTIONAL];

  // Earliest the code can be redeemed. Unset means no lower bound.
  google.protobuf.Timestamp redeem_start_time = 9 [(google.api.field_behavior) = OPTIONAL];

  // Latest the code can be redeemed. Unset means no upper bound.
  google.protobuf.Timestamp redeem_end_time = 10 [(google.api.field_behavior) = OPTIONAL];

  // Maximum total redemptions across all customers. Zero means unlimited.
  int64 max_redemptions = 11 [(google.api.field_behavior) = OPTIONAL];

  // Maximum redemptions per customer. Zero means unlimited.
  int32 per_customer_limit = 12 [(google.api.field_behavior) = OPTIONAL];

  // Minimum subtotal required for the code to apply.
  google.type.Money min_subtotal = 13 [(google.api.field_behavior) = OPTIONAL];

  // Resources the code applies to. Empty means all resources.
  // Format: resources/{resource}
  repeated string applicable_resources = 14 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.resource.v1/Resource"}
  ];

  // Offerings the code applies to. Empty means all offerings.
  // Format: resources/{resource}/offerings/{offering}
  repeated string applicable_offerings = 15 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.resource.v1/Offering"}
  ];

  // How many times the code has been redeemed.
  int64 redemption_count = 16 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Derived lifecycle state: ACTIVE, DISABLED (when `disabled` is set), or
  // EXPIRED (past the window or out of redemptions).
  PromoCodeState state = 17 [(google.api.field_behavior) = OUTPUT_ONLY];

  // If true, the code is manually disabled regardless of its window and caps.
  bool disabled = 20 [(google.api.field_behavior) = OPTIONAL];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 18 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 19 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 21;
}
