syntax = "proto3";

package freebusy.organisation.v1;

import "buf/validate/validate.proto";
import "freebusy/organisation/v1/enums.proto";
import "freebusy/organisation/v1/organisation.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/organisation/v1/orgpbv1;orgpbv1";
option java_multiple_files = true;
option java_outer_classname = "ActionsProto";
option java_package = "dev.ohtarnished.freebusy.organisation.v1";

// Request message for InviteMember.
message InviteMemberRequest {
  // The organisation to invite the member to.
  // Format: organisations/{organisation}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Organisation"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+$"
  ];

  // Email address to invite.
  string email = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.email = true
  ];

  // Role to grant on acceptance.
  OrganisationRole role = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [0]
    }
  ];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 4 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Response message for InviteMember.
message InviteMemberResponse {
  // The created member (in INVITED state).
  Member member = 1;
}

// Request message for UpdateMember. The role is the only mutable field; set
// update_mask to "role" to change it.
message UpdateMemberRequest {
  // The member to update; its name identifies the target.
  Member member = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "update_member.name"
      message: "member.name must be of the form organisations/{organisation}/members/{member}"
      expression: "this.name.matches('^organisations/[^/]+/members/[^/]+$')"
    }
  ];

  // Fields to overwrite. Omit to replace all mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteMember.
message DeleteMemberRequest {
  // The member to remove.
  // Format: organisations/{organisation}/members/{member}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Member"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+/members/[^/]+$"
  ];
}
