syntax = "proto3";

package freebusy.organisation.v1;

import "buf/validate/validate.proto";
import "freebusy/organisation/v1/organisation.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/organisation/v1/orgpbv1;orgpbv1";
option java_multiple_files = true;
option java_outer_classname = "OrganisationMessageProto";
option java_package = "dev.ohtarnished.freebusy.organisation.v1";

// Request message for ListOrganisations.
message ListOrganisationsRequest {
  // Maximum number of organisations to return. Must be at most 1000; larger values are rejected. Zero lets
  // the server pick a default.
  int32 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Page token from a previous ListOrganisations call's next_page_token.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression over organisation fields (e.g. display_name).
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // Sort order, e.g. "create_time desc".
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListOrganisations.
message ListOrganisationsResponse {
  // The page of organisations (those the caller belongs to).
  repeated Organisation organisations = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}

// Request message for GetOrganisation.
message GetOrganisationRequest {
  // The organisation to retrieve.
  // Format: organisations/{organisation}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Organisation"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+$"
  ];
}

// Request message for CreateOrganisation.
message CreateOrganisationRequest {
  // The organisation to create. The name and state fields are ignored. The caller
  // becomes the organisation's first OWNER.
  Organisation organisation = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "create_organisation.display_name"
      message: "organisation.display_name is required"
      expression: "this.display_name != ''"
    }
  ];

  // Optional caller-chosen ID for the organisation; the server generates one if unset.
  string organisation_id = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.pattern = "^[a-z0-9-]{1,63}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 3 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for UpdateOrganisation.
message UpdateOrganisationRequest {
  // The organisation to update; its name identifies the target.
  Organisation organisation = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "update_organisation.name"
      message: "organisation.name must be of the form organisations/{organisation}"
      expression: "this.name.matches('^organisations/[^/]+$')"
    }
  ];

  // Fields to overwrite. Omit to replace all mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteOrganisation.
message DeleteOrganisationRequest {
  // The organisation to delete.
  // Format: organisations/{organisation}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Organisation"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+$"
  ];

  // If true, delete the organisation and its members; otherwise the call fails when
  // the organisation still has members.
  bool force = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for ListMembers.
message ListMembersRequest {
  // The organisation whose members to list.
  // Format: organisations/{organisation}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Organisation"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+$"
  ];

  // Maximum number of members to return. Must be at most 1000; larger values are rejected.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Page token from a previous ListMembers call's next_page_token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression (AIP-160), e.g. `role = ADMIN` or `state = ACTIVE`.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Sort order, e.g. "create_time desc".
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListMembers.
message ListMembersResponse {
  // The page of members.
  repeated Member members = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}

// Request message for GetMember.
message GetMemberRequest {
  // The member to retrieve.
  // Format: organisations/{organisation}/members/{member}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.organisation.v1/Member"},
    (buf.validate.field).string.pattern = "^organisations/[^/]+/members/[^/]+$"
  ];
}
