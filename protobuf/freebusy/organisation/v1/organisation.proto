syntax = "proto3";

package freebusy.organisation.v1;

import "buf/validate/validate.proto";
import "freebusy/organisation/v1/enums.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "orm/v1/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/organisation/v1/orgpbv1;orgpbv1";
option java_multiple_files = true;
option java_outer_classname = "OrganisationProto";
option java_package = "dev.ohtarnished.freebusy.organisation.v1";

// A chain: the hotel brand/company that owns one or more properties, and the
// unit of multi-tenancy. The shell enforces isolation with row-level security
// keyed off the caller's organisation. Each Property references the Organisation
// it belongs to; members here are the chain's administrators, not its guests
// (guests relate to a property only through bookings).
message Organisation {
  option (google.api.resource) = {
    type: "freebusy.organisation.v1/Organisation"
    pattern: "organisations/{organisation}"
    singular: "organisation"
    plural: "organisations"
  };

  // The organisation name.
  // Format: organisations/{organisation}
  string name = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (buf.validate.field).string.pattern = "^organisations/[^/]+$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // Human-friendly organisation name (e.g. "Acme Inc.").
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED,
    (orm.v1.query) = {search: true}
  ];

  // URL-safe slug, unique across organisations.
  string slug = 4 [(google.api.field_behavior) = OPTIONAL];

  // Billing contact email. Format is validated where the value enters the
  // system (request-entry), not here — a stored value predating stricter rules
  // must never brick an unrelated update.
  string billing_email = 5 [(google.api.field_behavior) = OPTIONAL];

  // Lifecycle state. New organisations start ACTIVE (database default).
  OrganisationState state = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (orm.v1.column) = {default_value: "ACTIVE"}
  ];

  // Arbitrary organisation-level settings.
  google.protobuf.Struct settings = 7 [(google.api.field_behavior) = OPTIONAL];

  // Number of members across all states.
  int64 member_count = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 11;
}

// The membership of a user in an organisation, with their role.
message Member {
  option (google.api.resource) = {
    type: "freebusy.organisation.v1/Member"
    pattern: "organisations/{organisation}/members/{member}"
    singular: "member"
    plural: "members"
  };

  // The member name.
  // Format: organisations/{organisation}/members/{member}
  string name = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (buf.validate.field).string.pattern = "^organisations/[^/]+/members/[^/]+$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // The user, once the invite is accepted.
  // Format: users/{user}
  string user = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "freebusy.identity.v1/User"}
  ];

  // The invited email address. Format is enforced at the entry point
  // (InviteMemberRequest.email), not on the stored field, so legacy rows
  // never brick a role update.
  string email = 4 [
    (google.api.field_behavior) = REQUIRED,
    (orm.v1.query) = {search: true}
  ];

  // Cached display name of the member.
  string display_name = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The member's role in the organisation.
  OrganisationRole role = 6 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).enum.defined_only = true
  ];

  // Confirmation state of the membership. New members start INVITED
  // (database default).
  MemberState state = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (orm.v1.column) = {default_value: "INVITED"}
  ];

  // The user who issued the invite.
  // Format: users/{user}
  string inviter = 8 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "freebusy.identity.v1/User"}
  ];

  // Creation timestamp (when the invite was created).
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 11;
}
