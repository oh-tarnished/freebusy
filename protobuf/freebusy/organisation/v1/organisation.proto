syntax = "proto3";

package freebusy.organisation.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/oh-tarnished/freebusy/gen/organisation/v1/orgpbv1;orgpbv1";
option java_multiple_files = true;
option java_outer_classname = "OrganisationProto";
option java_package = "dev.ohtarnished.freebusy.organisation.v1";

// A tenant. Org is the unit of multi-tenancy; the shell enforces isolation with
// row-level security keyed off the caller's organisation, so most resource names stay
// flat and the organisation appears explicitly only here.
message Org {
  option (google.api.resource) = {
    type: "ohtarnished.freebusy.v1/Org"
    pattern: "orgs/{org}"
    singular: "org"
    plural: "orgs"
  };

  // The organisation name.
  // Format: orgs/{org}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Server-assigned stable UUID.
  string uuid = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Human-friendly organisation name (e.g. "Acme Inc.").
  string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // URL-safe slug, unique across orgs.
  string slug = 4 [(google.api.field_behavior) = OPTIONAL];

  // Billing contact email.
  string billing_email = 5 [(google.api.field_behavior) = OPTIONAL];

  // Lifecycle state.
  OrganisationState state = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Arbitrary organisation-level settings.
  google.protobuf.Struct settings = 7 [(google.api.field_behavior) = OPTIONAL];

  // Number of members across all states.
  int64 member_count = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The membership of a user in an organisation, with their role.
message Member {
  option (google.api.resource) = {
    type: "ohtarnished.freebusy.v1/Member"
    pattern: "orgs/{org}/members/{member}"
    singular: "member"
    plural: "members"
  };

  // The member name.
  // Format: orgs/{org}/members/{member}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Server-assigned stable UUID.
  string uuid = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The user, once the invite is accepted.
  // Format: users/{user}
  string user = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "ohtarnished.freebusy.v1/User"}
  ];

  // The invited email address.
  string email = 4 [(google.api.field_behavior) = REQUIRED];

  // Cached display name of the member.
  string display_name = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The member's role in the organisation.
  OrganisationRole role = 6 [(google.api.field_behavior) = REQUIRED];

  // Confirmation state of the membership.
  State state = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The user who issued the invite.
  // Format: users/{user}
  string inviter = 8 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "ohtarnished.freebusy.v1/User"}
  ];

  // Creation timestamp (when the invite was created).
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Confirmation state of a membership.
  enum State {
    // Unset.
    STATE_UNSPECIFIED = 0;

    // Invited, awaiting acceptance.
    STATE_INVITED = 1;

    // Active member.
    STATE_ACTIVE = 2;

    // Suspended within the organisation.
    STATE_SUSPENDED = 3;
  }
}

// A member's role within an organisation.
enum OrganisationRole {
  // Unset.
  ORGANISATION_ROLE_UNSPECIFIED = 0;

  // Full control, including billing and deletion.
  ORGANISATION_ROLE_OWNER = 1;

  // Manage members and resources.
  ORGANISATION_ROLE_ADMIN = 2;

  // Create and manage bookings and resources.
  ORGANISATION_ROLE_MEMBER = 3;

  // Read-only access.
  ORGANISATION_ROLE_VIEWER = 4;
}

// Lifecycle state of an organisation.
enum OrganisationState {
  // Unset.
  ORGANISATION_STATE_UNSPECIFIED = 0;

  // Active.
  ORGANISATION_STATE_ACTIVE = 1;

  // Suspended; access blocked.
  ORGANISATION_STATE_SUSPENDED = 2;
}
