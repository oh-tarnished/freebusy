syntax = "proto3";

package freebusy.organisation.v1;

import "google/api/field_behavior.proto";

option go_package = "github.com/oh-tarnished/freebusy/gen/organisation/v1/orgpbv1;orgpbv1";
option java_multiple_files = true;
option java_outer_classname = "OrgMcpProto";
option java_package = "dev.ohtarnished.freebusy.organisation.v1";

// Arguments for the "invite_member" prompt.
message InviteMemberArgs {
  // Org to invite into, as a resource name ("orgs/7") or a display name.
  string organisation = 1 [(google.api.field_behavior) = REQUIRED];

  // Email address to invite.
  string email = 2 [(google.api.field_behavior) = REQUIRED];

  // Role to grant, e.g. "owner", "admin", "member", or "viewer".
  string role = 3 [(google.api.field_behavior) = REQUIRED];
}
