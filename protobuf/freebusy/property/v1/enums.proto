syntax = "proto3";

package freebusy.property.v1;

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/property/v1/propertypbv1;propertypbv1";
option java_multiple_files = true;
option java_outer_classname = "EnumsProto";
option java_package = "dev.ohtarnished.freebusy.property.v1";

// Lifecycle status of a property.
enum PropertyState {
  // Unset.
  PROPERTY_STATE_UNSPECIFIED = 0;

  // Live and visible to guests.
  PROPERTY_STATE_ACTIVE = 1;

  // Retired; hidden from storefront and new bookings.
  PROPERTY_STATE_ARCHIVED = 2;
}

// Lifecycle status of a unit.
enum UnitState {
  // Unset.
  UNIT_STATE_UNSPECIFIED = 0;

  // Bookable.
  UNIT_STATE_ACTIVE = 1;

  // Retired; hidden from availability and new bookings.
  UNIT_STATE_ARCHIVED = 2;
}

// Kind of bookable unit.
enum UnitType {
  // Unset.
  UNIT_TYPE_UNSPECIFIED = 0;

  // A person who delivers a service (e.g. a doctor, stylist).
  UNIT_TYPE_PROVIDER = 1;

  // A bookable room or space (e.g. a hotel room, meeting room).
  UNIT_TYPE_ROOM = 2;

  // A bookable piece of equipment (e.g. a kayak).
  UNIT_TYPE_EQUIPMENT = 3;

  // A lodging unit type backed by a pool of identical units (e.g. a room type).
  UNIT_TYPE_LODGING = 4;

  // A generic space or venue.
  UNIT_TYPE_SPACE = 5;
}

// What a unit's price is charged per.
enum PricingUnit {
  // Unset; treated as per-booking.
  PRICING_UNIT_UNSPECIFIED = 0;

  // A flat price for the whole booking.
  PRICING_UNIT_PER_BOOKING = 1;

  // Price multiplied by the number of nights (NIGHTLY units).
  PRICING_UNIT_PER_NIGHT = 2;

  // Price multiplied by party size / units booked.
  PRICING_UNIT_PER_PERSON = 3;
}

// Kind of regulatory licence or certificate held by a property or unit.
enum LicenceType {
  // Unset.
  LICENCE_TYPE_UNSPECIFIED = 0;

  // General trade / shop & establishment licence.
  LICENCE_TYPE_TRADE = 1;

  // Fire safety / no-objection certificate.
  LICENCE_TYPE_FIRE_SAFETY = 2;

  // Liquor / bar licence.
  LICENCE_TYPE_LIQUOR = 3;

  // Food safety registration (e.g. India's FSSAI).
  LICENCE_TYPE_FOOD_SAFETY = 4;

  // Tourism department registration or star classification.
  LICENCE_TYPE_TOURISM = 5;

  // Health / sanitation certificate.
  LICENCE_TYPE_HEALTH = 6;

  // Any other regulatory licence or certificate.
  LICENCE_TYPE_OTHER = 7;
}

// What a licence covers: the whole property or a single unit within it.
enum LicenceTarget {
  // Unset.
  LICENCE_TARGET_UNSPECIFIED = 0;

  // The licence covers the whole property (e.g. a trade licence).
  LICENCE_TARGET_PROPERTY = 1;

  // The licence covers one unit (e.g. a per-room liquor licence); the
  // licence's `unit` field names it.
  LICENCE_TARGET_UNIT = 2;
}

// Lifecycle status of a licence.
enum LicenceState {
  // Unset.
  LICENCE_STATE_UNSPECIFIED = 0;

  // Currently held and in force.
  LICENCE_STATE_ACTIVE = 1;

  // Retired / no longer tracked. Whether it is past its expiry_date is a
  // separate, time-derived fact — not reflected in this state.
  LICENCE_STATE_ARCHIVED = 2;
}
