syntax = "proto3";

package freebusy.property.v1;

import "freebusy/property/v1/property.proto";
import "freebusy/property/v1/property_messages.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "mcp/protobuf/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/property/v1/propertypbv1;propertypbv1";
option java_multiple_files = true;
option java_outer_classname = "LicenceServiceProto";
option java_package = "dev.ohtarnished.freebusy.property.v1";

// LicenceService manages the regulatory licences/certificates of properties
// and their units (trade licences, fire-safety certificates, per-room liquor
// licences, and the like): their issuing authority, validity window, and
// scanned attachment. Every licence is parented by its property; the licence's
// `target` says whether it covers the whole property or the single unit named
// in its `unit` field. Built for compliance workflows such as listing licences
// by expiry_date to find those due for renewal.
service LicenceService {
  option (google.api.default_host) = "freebusy.ohtarnished.dev";
  option (mcp.service) = {
    app: {
      name: "Licences"
      version: "1.0.0"
      description: "Manage the regulatory licences/certificates of properties and units."
    }
  };

  // Lists the regulatory licences/certificates under a property — both
  // property-wide and per-unit ones.
  rpc ListLicences(ListLicencesRequest) returns (ListLicencesResponse) {
    option (google.api.http) = {get: "/v1/{parent=properties/*}/licences"};
    option (google.api.method_signature) = "parent";
    option (mcp.tool) = {description: "List a property's regulatory licences/certificates, property-wide and per-unit alike. Filter by type, target, unit, state, or expiry_date to find licences due for renewal."};
  }

  // Gets a single licence.
  rpc GetLicence(GetLicenceRequest) returns (Licence) {
    option (google.api.http) = {get: "/v1/{name=properties/*/licences/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a single licence/certificate by name."};
  }

  // Creates a licence under a property, e.g. after uploading a scan of a trade
  // or fire-safety certificate. Set the licence's `unit` to cover a single
  // unit instead of the whole property.
  rpc CreateLicence(CreateLicenceRequest) returns (Licence) {
    option (google.api.http) = {
      post: "/v1/{parent=properties/*}/licences"
      body: "licence"
    };
    option (google.api.method_signature) = "parent,licence,licence_id";
    option (mcp.tool) = {description: "Add a regulatory licence/certificate to a property — or to one of its units by setting the licence's unit — with its issuing authority, validity dates, and scanned attachment."};
  }

  // Updates a licence, e.g. to record its renewal.
  rpc UpdateLicence(UpdateLicenceRequest) returns (Licence) {
    option (google.api.http) = {
      patch: "/v1/{licence.name=properties/*/licences/*}"
      body: "licence"
    };
    option (google.api.method_signature) = "licence,update_mask";
    option (mcp.tool) = {description: "Update a licence's number, authority, validity dates, attachment, or notes."};
  }

  // Deletes a licence.
  rpc DeleteLicence(DeleteLicenceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=properties/*/licences/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Delete a licence/certificate by name."};
  }
}
