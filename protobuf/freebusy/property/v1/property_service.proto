syntax = "proto3";

package freebusy.property.v1;

import "freebusy/property/v1/property.proto";
import "freebusy/property/v1/property_messages.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/protobuf/empty.proto";
import "mcp/protobuf/annotations.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/property/v1/propertypbv1;propertypbv1";
option java_multiple_files = true;
option java_outer_classname = "PropertyServiceProto";
option java_package = "dev.ohtarnished.freebusy.property.v1";

// PropertyService is the catalog of hotels (properties) and the bookable units
// (room types) within them. Properties carry showcase media and guest-facing
// policy; units carry pricing, occupancy, and availability inputs.
service PropertyService {
  option (google.api.default_host) = "freebusy.ohtarnished.dev";
  option (mcp.service) = {
    app: {
      name: "Properties"
      version: "1.0.0"
      description: "Manage hotels (properties) and their bookable units."
    }
  };

  // Lists properties.
  rpc ListProperties(ListPropertiesRequest) returns (ListPropertiesResponse) {
    option (google.api.http) = {get: "/v1/properties"};
    option (mcp.tool) = {description: "List hotels (properties). Filter by organisation, state, or tags, search by name, and paginate."};
  }

  // Gets a single property.
  rpc GetProperty(GetPropertyRequest) returns (Property) {
    option (google.api.http) = {get: "/v1/{name=properties/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a single property (hotel) by name, including its media, policy, and unit list."};
  }

  // Creates a property. The caller's chain becomes its owner.
  rpc CreateProperty(CreatePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/properties"
      body: "property"
    };
    option (google.api.method_signature) = "property,property_id";
    option (mcp.tool) = {description: "Create a hotel (property) under an organisation, with an address, timezone, media, and policy."};
    option (mcp.prompt) = {
      name: "add_property"
      description: "Add a hotel (property) to a chain"
      schema: "freebusy.property.v1.AddPropertyArgs"
    };
  }

  // Updates a property.
  rpc UpdateProperty(UpdatePropertyRequest) returns (Property) {
    option (google.api.http) = {
      patch: "/v1/{property.name=properties/*}"
      body: "property"
    };
    option (google.api.method_signature) = "property,update_mask";
    option (mcp.tool) = {description: "Update a property's name, description, address, media, policy, tags, or attributes."};
  }

  // Archives a property, hiding it from the storefront and new bookings.
  rpc ArchiveProperty(ArchivePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/{name=properties/*}:archive"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Archive a property so it stops appearing in the storefront and accepting bookings."};
  }

  // Unarchives a property, restoring it to the active state.
  rpc UnarchiveProperty(UnarchivePropertyRequest) returns (Property) {
    option (google.api.http) = {
      post: "/v1/{name=properties/*}:unarchive"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Restore an archived property so it appears in the storefront and accepts bookings again."};
  }

  // Lists the units (room types) within a property.
  rpc ListUnits(ListUnitsRequest) returns (ListUnitsResponse) {
    option (google.api.http) = {get: "/v1/{parent=properties/*}/units"};
    option (google.api.method_signature) = "parent";
    option (mcp.tool) = {description: "List the units (room types) within a property. Filter by type, state, or name."};
  }

  // Gets a single unit.
  rpc GetUnit(GetUnitRequest) returns (Unit) {
    option (google.api.http) = {get: "/v1/{name=properties/*/units/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Get a single unit (room type) by name, including its pricing and media."};
  }

  // Creates a unit within a property.
  rpc CreateUnit(CreateUnitRequest) returns (Unit) {
    option (google.api.http) = {
      post: "/v1/{parent=properties/*}/units"
      body: "unit"
    };
    option (google.api.method_signature) = "parent,unit,unit_id";
    option (mcp.tool) = {description: "Add a unit (room type) to a property with a type, booking mode, timezone, capacity, and pricing."};
    option (mcp.prompt) = {
      name: "add_unit"
      description: "Add a bookable unit (room type) to a property"
      schema: "freebusy.property.v1.AddUnitArgs"
    };
  }

  // Updates a unit.
  rpc UpdateUnit(UpdateUnitRequest) returns (Unit) {
    option (google.api.http) = {
      patch: "/v1/{unit.name=properties/*/units/*}"
      body: "unit"
    };
    option (google.api.method_signature) = "unit,update_mask";
    option (mcp.tool) = {description: "Update a unit's name, description, capacity, occupancy, pricing, media, or promo codes."};
  }

  // Deletes a unit from a property.
  rpc DeleteUnit(DeleteUnitRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/{name=properties/*/units/*}"};
    option (google.api.method_signature) = "name";
    option (mcp.tool) = {description: "Delete a unit (room type) from a property by name."};
  }
}
