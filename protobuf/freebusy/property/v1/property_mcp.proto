syntax = "proto3";

package freebusy.property.v1;

import "freebusy/shared/v1/enums.proto";
import "google/api/field_behavior.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/property/v1/propertypbv1;propertypbv1";
option java_multiple_files = true;
option java_outer_classname = "PropertyMcpProto";
option java_package = "dev.ohtarnished.freebusy.property.v1";

// Arguments for the "add_property" prompt.
message AddPropertyArgs {
  // The chain/brand that owns the property.
  // Format: organisations/{organisation}
  string organisation = 1 [(google.api.field_behavior) = REQUIRED];

  // Human-friendly name of the property (e.g. "Grand Beach Resort, Goa").
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];

  // IANA timezone the property operates in (e.g. "Asia/Kolkata").
  string time_zone = 3 [(google.api.field_behavior) = REQUIRED];
}

// Arguments for the "add_unit" prompt.
message AddUnitArgs {
  // The property to add the unit to.
  // Format: properties/{property}
  string property = 1 [(google.api.field_behavior) = REQUIRED];

  // Human-friendly name of the unit (e.g. "Deluxe King").
  string display_name = 2 [(google.api.field_behavior) = REQUIRED];

  // What kind of unit it is (e.g. "room", "lodging").
  string type = 3 [(google.api.field_behavior) = REQUIRED];

  // How it is booked: time-slot appointments or nightly stays.
  freebusy.shared.v1.BookingMode booking_mode = 4 [(google.api.field_behavior) = REQUIRED];

  // IANA timezone the unit operates in (e.g. "Asia/Kolkata").
  string time_zone = 5 [(google.api.field_behavior) = REQUIRED];

  // Number of interchangeable units in the pool. Defaults to 1.
  int32 capacity = 6 [(google.api.field_behavior) = OPTIONAL];
}
