syntax = "proto3";

package freebusy.booking.v1;

import "freebusy/booking/v1/enums.proto";
// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/booking/v1/bookingpbv1;bookingpbv1";
option java_multiple_files = true;
option java_outer_classname = "BookingProto";
option java_package = "dev.ohtarnished.freebusy.booking.v1";

// A reservation against a unit. The hold lifecycle lives here as states
// rather than a separate service: CreateBooking places a PENDING_HOLD,
// confirmation flips it to CONFIRMED, and an internal sweeper expires holds that
// are never confirmed.
message Booking {
  option (google.api.resource) = {
    type: "freebusy.booking.v1/Booking"
    pattern: "bookings/{booking}"
    singular: "booking"
    plural: "bookings"
  };

  // The booking name.
  // Format: bookings/{booking}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // The unit being booked.
  // Format: properties/{property}/units/{unit}
  string unit = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}
  ];

  // Field number of the removed `offering` field; never reuse it. A unit now
  // carries its own pricing, so a booking references only the unit.
  reserved 4;

  // The user the booking is for.
  // Format: users/{user}
  string customer = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.identity.v1/User"}
  ];

  // Contact details for the booker. Required when `customer` is unset (a guest /
  // walk-in booking); when `customer` is set these supplement or override the
  // user's profile contact for this booking.
  freebusy.shared.v1.Contact contact = 24 [(google.api.field_behavior) = OPTIONAL];

  // Number of units / party size reserved. Defaults to 1.
  int32 units = 6 [(google.api.field_behavior) = OPTIONAL];

  // The reserved span. For NIGHTLY resources this spans check-in to check-out.
  freebusy.shared.v1.TimeWindow window = 7 [(google.api.field_behavior) = REQUIRED];

  // Which specific unit of the pool was assigned (the shell's atomic pick).
  string assigned_unit = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Current lifecycle state.
  BookingState state = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the pending hold lapses, if not confirmed first.
  google.protobuf.Timestamp hold_expire_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Computed subtotal before discounts.
  google.type.Money price = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The promo code to apply to this booking, set at creation, if any.
  // Format: promo-codes/{promo_code}
  string promo_code = 12 [
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {type: "oh-tarnished.dev/PromoCode"}
  ];

  // Discount applied from the promo code.
  google.type.Money discount = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Final total after discounts.
  google.type.Money total = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Itemized breakdown behind the total: the base charge, each fee and tax, and
  // each discount, as signed lines. `price` is the TYPE_BASE subtotal and
  // `total` is the sum of every component; these lines expose the fees and taxes
  // in between. Empty for simple bookings with no fees or taxes configured.
  repeated freebusy.shared.v1.PriceComponent price_components = 25 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Free-form notes on the booking.
  string notes = 15 [(google.api.field_behavior) = OPTIONAL];

  // Arbitrary attributes.
  google.protobuf.Struct attributes = 16 [(google.api.field_behavior) = OPTIONAL];

  // Why the booking was cancelled, when state is CANCELLED.
  CancelReason cancel_reason = 17 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp (when the hold was placed).
  google.protobuf.Timestamp create_time = 18 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 19 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the booking was confirmed, if at all.
  google.protobuf.Timestamp confirm_time = 20 [(google.api.field_behavior) = OUTPUT_ONLY];

  // When the booking was cancelled, if at all.
  google.protobuf.Timestamp cancel_time = 21 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Amount refunded on cancellation, computed from the unit's cancellation
  // policy and how far ahead of the booking start it was cancelled. Set only
  // once the booking is CANCELLED. Use PreviewCancellation to see this before
  // committing.
  google.type.Money refund_amount = 26 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Percentage of the total that `refund_amount` represents (0-100).
  int32 refund_percent = 27 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Requested time-to-live of the hold, set at creation. The server caps this
  // and reflects the effective expiry in hold_expire_time.
  google.protobuf.Duration hold_ttl = 22 [(google.api.field_behavior) = IMMUTABLE];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 23;
}
