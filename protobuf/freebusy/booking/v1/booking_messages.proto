syntax = "proto3";

package freebusy.booking.v1;

import "buf/validate/validate.proto";
import "freebusy/booking/v1/booking.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/booking/v1/bookingpbv1;bookingpbv1";
option java_multiple_files = true;
option java_outer_classname = "BookingMessagesProto";
option java_package = "dev.ohtarnished.freebusy.booking.v1";

// Request message for CreateBooking. This places a hold transactionally; the
// request_id makes retries safe (the same id always yields the same booking
// instead of a duplicate hold). The promo code and hold TTL are set on the
// Booking resource itself.
message CreateBookingRequest {
  // The booking to create. Supply unit, window, and optionally units,
  // customer, contact, notes, attributes, promo_code, and hold_ttl.
  // Provide contact when there is no customer (a guest booking). Output-only
  // fields are ignored.
  Booking booking = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "create_booking.unit"
      message: "booking.unit is required"
      expression: "this.unit != ''"
    },
    (buf.validate.field).cel = {
      id: "create_booking.window"
      message: "booking.window is required"
      expression: "has(this.window)"
    }
  ];

  // Caller-supplied idempotency key that dedupes retries of this create. Reusing
  // an id returns the booking created by the first call.
  string request_id = 2 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Optional caller-chosen ID for the booking; the server generates one if unset.
  string booking_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.pattern = "^[a-z0-9-]{1,63}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // If true, validate the request (availability + policy) and report what would
  // happen, but place no hold.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for GetBooking.
message GetBookingRequest {
  // The booking to retrieve.
  // Format: bookings/{booking}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+$"
  ];
}

// Request message for GetBookingGuests.
message GetBookingGuestsRequest {
  // The singleton guests sub-resource to retrieve.
  // Format: bookings/{booking}/guests
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/BookingGuests"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+/guests$"
  ];
}

// Request message for ListBookings.
message ListBookingsRequest {
  // Maximum number of bookings to return. Must be at most 1000; larger values are rejected.
  int32 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Page token from a previous ListBookings call's next_page_token.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Filter expression (AIP-160), e.g. `unit = "properties/9/units/42"`,
  // `customer = "users/7"`, `state = CONFIRMED`, or a window overlap predicate.
  string filter = 3 [(google.api.field_behavior) = OPTIONAL];

  // Sort order, e.g. "create_time desc" or "window.start_time".
  string order_by = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListBookings.
message ListBookingsResponse {
  // The page of bookings.
  repeated Booking bookings = 1;

  // Token to pass as page_token to retrieve the next page; empty when no more.
  string next_page_token = 2;
}
