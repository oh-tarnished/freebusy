syntax = "proto3";

package freebusy.booking.v1;

import "buf/validate/validate.proto";
import "freebusy/booking/v1/booking.proto";
// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)
import "freebusy/booking/v1/enums.proto";
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/booking/v1/bookingpbv1;bookingpbv1";
option java_multiple_files = true;
option java_outer_classname = "BookingActionsProto";
option java_package = "dev.ohtarnished.freebusy.booking.v1";

// Request message for ConfirmBooking. Confirmation normally arrives via the
// payment webhook rather than a direct client call; either way it flips a
// PENDING_HOLD to CONFIRMED.
message ConfirmBookingRequest {
  // The booking to confirm.
  // Format: bookings/{booking}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+$"
  ];

  // Opaque reference to the payment/settlement that confirmed this booking.
  string payment_ref = 2 [(google.api.field_behavior) = OPTIONAL];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 3 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for CancelBooking.
message CancelBookingRequest {
  // The booking to cancel.
  // Format: bookings/{booking}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+$"
  ];

  // Why the booking is being cancelled.
  CancelReason reason = 2 [(google.api.field_behavior) = OPTIONAL];

  // Free-form note explaining the cancellation.
  string note = 3 [(google.api.field_behavior) = OPTIONAL];

  // Caller-supplied idempotency key; identical retries return the first result.
  string request_id = 4 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for RescheduleBooking. Atomically moves a booking to a new
// span (and optionally unit), re-running availability and the exclusion
// check on the new window.
message RescheduleBookingRequest {
  // The booking to reschedule.
  // Format: bookings/{booking}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+$"
  ];

  // The new reserved span.
  freebusy.shared.v1.TimeWindow window = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // The new unit, when changing it as part of the reschedule.
  // Format: properties/{property}/units/{unit}
  string unit = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {type: "freebusy.property.v1/Unit"}
  ];

  // Caller-supplied idempotency key that dedupes retries of this reschedule.
  string request_id = 4 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Request message for UpdateBookingGuests. Replaces the whole staying party —
// the guest list and the occupancy breakdown — on a booking. Allowed only while
// the booking is PENDING_HOLD or CONFIRMED; the new party is re-validated against
// the unit's max occupancy.
message UpdateBookingGuestsRequest {
  // The new guest party and occupancy; its name identifies the target booking.
  // Format: bookings/{booking}/guests
  BookingGuests booking_guests = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Fields to overwrite. Omit to replace both guests and occupancy.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for PreviewCancellation. Computes the refund a cancellation
// would yield right now, under the unit's cancellation policy, without
// cancelling the booking.
message PreviewCancellationRequest {
  // The booking to preview a cancellation for.
  // Format: bookings/{booking}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "freebusy.booking.v1/Booking"},
    (buf.validate.field).string.pattern = "^bookings/[^/]+$"
  ];
}

// Response message for PreviewCancellation.
message PreviewCancellationResponse {
  // Whether cancelling now would refund anything.
  bool refundable = 1;

  // Percentage of the total that would be refunded (0-100).
  int32 refund_percent = 2;

  // Amount that would be refunded now.
  google.type.Money refund_amount = 3;

  // Amount that would be retained (total minus refund_amount).
  google.type.Money non_refundable_amount = 4;

  // Human-readable summary of the policy tier that applied, for display.
  string policy_summary = 5;
}
