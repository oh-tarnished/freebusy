syntax = "proto3";

package freebusy.resource.v1;

import "freebusy/shared/v1/enums.proto";
import "google/api/field_behavior.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/resource/v1/resourcepbv1;resourcepbv1";
option java_multiple_files = true;
option java_outer_classname = "ResourceMcpProto";
option java_package = "dev.ohtarnished.freebusy.resource.v1";

// Arguments for the "add_resource" prompt.
message AddResourceArgs {
  // Human-friendly name of the resource.
  string display_name = 1 [(google.api.field_behavior) = REQUIRED];

  // What kind of bookable thing it is (e.g. "provider", "room", "unit_type").
  string type = 2 [(google.api.field_behavior) = REQUIRED];

  // How it is booked: time-slot appointments or nightly stays.
  freebusy.shared.v1.BookingMode booking_mode = 3 [(google.api.field_behavior) = REQUIRED];

  // IANA timezone the resource operates in (e.g. "America/New_York").
  string time_zone = 4 [(google.api.field_behavior) = REQUIRED];

  // Number of interchangeable units in the pool. Defaults to 1.
  int32 capacity = 5 [(google.api.field_behavior) = OPTIONAL];
}
