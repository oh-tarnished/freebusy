syntax = "proto3";

package freebusy.resource.v1;

// (-- api-linter: core::0215::foreign-type-reference=disabled
//     aip.dev/not-precedent: freebusy.shared.v1 is a deliberate, API-wide
//     shared-types package; reusing it beats inlining per-package copies. --)

import "freebusy/resource/v1/enums.proto";
import "freebusy/shared/v1/enums.proto";
import "freebusy/shared/v1/types.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/type/money.proto";

option go_package = "github.com/oh-tarnished/freebusy/protobuf/generated/go/resource/v1/resourcepbv1;resourcepbv1";
option java_multiple_files = true;
option java_outer_classname = "ResourceProto";
option java_package = "dev.ohtarnished.freebusy.resource.v1";

// A bookable thing: a provider, room, piece of equipment, or a unit type. A
// resource is a pool of `capacity` interchangeable units; the freebusy engine
// computes how many are free for a given window. Its booking_mode decides
// whether availability is produced as time slots or per-night counts.
message Resource {
  option (google.api.resource) = {
    type: "freebusy.resource.v1/Resource"
    pattern: "resources/{resource}"
    singular: "resource"
    plural: "resources"
  };

  // The resource name.
  // Format: resources/{resource}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // Human-friendly name (e.g. "Dr. Lee", "Deluxe King", "Kayak #3").
  string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Free-form description.
  string description = 4 [(google.api.field_behavior) = OPTIONAL];

  // What kind of bookable thing this is.
  ResourceType type = 5 [(google.api.field_behavior) = REQUIRED];

  // How this resource is booked, and therefore the availability shape it
  // yields. Immutable: flipping it after bookings exist would invalidate every
  // existing booking and availability computation.
  freebusy.shared.v1.BookingMode booking_mode = 6 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Number of interchangeable units in the pool. Defaults to 1 when unset.
  int32 capacity = 7 [(google.api.field_behavior) = OPTIONAL];

  // IANA timezone (e.g. "America/New_York") the resource's hours and dates are
  // evaluated in. Required so availability is timezone-correct.
  string time_zone = 8 [(google.api.field_behavior) = REQUIRED];

  // Arbitrary tags for grouping and filtering.
  repeated string tags = 9 [(google.api.field_behavior) = OPTIONAL];

  // Arbitrary attributes used for templating, policy, and segmentation.
  google.protobuf.Struct attributes = 10 [(google.api.field_behavior) = OPTIONAL];

  // Resource names of the offerings attached to this resource (e.g. "30-min
  // consult"); manage them with the Offering standard methods.
  // Format: resources/{resource}/offerings/{offering}
  repeated string offerings = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "freebusy.resource.v1/Offering"}
  ];

  // Lifecycle state.
  ResourceState state = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 15;
}

// A specific way a resource can be booked, carrying its duration and price. A
// "30-min consult" and a "60-min session" are two offerings on the same
// provider. For NIGHTLY resources the duration is unused and price is per-night.
message Offering {
  option (google.api.resource) = {
    type: "freebusy.resource.v1/Offering"
    pattern: "resources/{resource}/offerings/{offering}"
    singular: "offering"
    plural: "offerings"
  };

  // The offering name.
  // Format: resources/{resource}/offerings/{offering}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Was `uid`; the name's final segment (a ULID) is the canonical ID.
  reserved 2;

  // Human-friendly name (e.g. "30-min consult").
  string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Free-form description.
  string description = 4 [(google.api.field_behavior) = OPTIONAL];

  // Slot length. Required for TIME_SLOT resources; ignored for NIGHTLY.
  google.protobuf.Duration duration = 5 [(google.api.field_behavior) = OPTIONAL];

  // Price charged for the offering, interpreted per pricing_unit.
  google.type.Money price = 6 [(google.api.field_behavior) = OPTIONAL];

  // What the price is charged per.
  PricingUnit pricing_unit = 7 [(google.api.field_behavior) = OPTIONAL];

  // Rate calendar: date- and weekday-scoped overrides of `price`. For NIGHTLY
  // resources this is the seasonal/weekend rate calendar; for TIME_SLOT it
  // varies slot price by date or day. `price` is the default when no override
  // matches. Later-listed overrides win where they overlap.
  repeated RateOverride rate_overrides = 12 [(google.api.field_behavior) = OPTIONAL];

  // Length-of-stay discounts applied to the NIGHTLY subtotal when a stay is at
  // least `min_nights` long. The most generous matching discount applies.
  repeated LosDiscount los_discounts = 13 [(google.api.field_behavior) = OPTIONAL];

  // Fees added on top of the base subtotal (e.g. cleaning, service). Each
  // surfaces as a TYPE_FEE line in a booking's price_components.
  repeated Fee fees = 14 [(google.api.field_behavior) = OPTIONAL];

  // Taxes applied to the taxable base (subtotal plus taxable fees). Each
  // surfaces as a TYPE_TAX line in a booking's price_components.
  repeated Tax taxes = 15 [(google.api.field_behavior) = OPTIONAL];
  // Lifecycle state.
  OfferingState state = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Creation timestamp.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Last-modification timestamp.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Opaque version for optimistic concurrency (AIP-154); echo on update/delete.
  string etag = 11;
}

// A price override for a span of dates and/or specific weekdays, layered over an
// offering's base `price`. The price is still interpreted per the offering's
// pricing_unit (per night, per booking, per person).
message RateOverride {
  // Dates the override applies to, in the resource's timezone. Unset means it
  // applies on every date (a pure weekday rule).
  freebusy.shared.v1.DateRange date_range = 1 [(google.api.field_behavior) = OPTIONAL];

  // Weekdays the override applies to. Empty means every day within date_range.
  repeated freebusy.shared.v1.Weekday weekdays = 2 [(google.api.field_behavior) = OPTIONAL];

  // The price in effect while this override matches.
  google.type.Money price = 3 [(google.api.field_behavior) = REQUIRED];
}

// A discount applied to a NIGHTLY subtotal once the stay reaches a minimum
// length. Exactly one of percent_off or amount_off is set.
message LosDiscount {
  // Minimum nights for the discount to apply.
  int32 min_nights = 1 [(google.api.field_behavior) = REQUIRED];

  // Percent off the subtotal (1-100), when discounting by percentage.
  int32 percent_off = 2 [(google.api.field_behavior) = OPTIONAL];

  // Fixed amount off the subtotal, when discounting by a flat amount.
  google.type.Money amount_off = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A fee added on top of an offering's base subtotal. Exactly one of `amount` or
// `percent` is set. Surfaces as a TYPE_FEE line in a booking's price_components.
message Fee {
  // Stable machine code, e.g. "cleaning_fee".
  string code = 1 [(google.api.field_behavior) = REQUIRED];

  // Human-readable label for receipts.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Fixed fee amount, when charging a flat fee.
  google.type.Money amount = 3 [(google.api.field_behavior) = OPTIONAL];

  // Percent of the base subtotal (1-100), when charging a proportional fee.
  int32 percent = 4 [(google.api.field_behavior) = OPTIONAL];

  // What the fee is charged per (per booking, per night, per person). Defaults
  // to per booking.
  PricingUnit pricing_unit = 5 [(google.api.field_behavior) = OPTIONAL];

  // Whether this fee is included in the taxable base.
  bool taxable = 6 [(google.api.field_behavior) = OPTIONAL];
}

// A tax applied to the taxable base (base subtotal plus taxable fees). Surfaces
// as a TYPE_TAX line in a booking's price_components.
message Tax {
  // Stable machine code, e.g. "occupancy_tax" or "vat".
  string code = 1 [(google.api.field_behavior) = REQUIRED];

  // Human-readable label for receipts.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Tax rate as a percentage, e.g. 8.5 for 8.5%.
  double percent = 3 [(google.api.field_behavior) = REQUIRED];
}
