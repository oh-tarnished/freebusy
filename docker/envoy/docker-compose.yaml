name: "freebusy_envoy"
services:
  envoy:
    image: envoyproxy/envoy:v1.34.1
    # launch.yaml is generated by `just gen envoy`; Envoy reads its config from
    # /etc/envoy/envoy.yaml by default, so mount it there read-only.
    volumes:
      - ./launch.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080" # grpc-web listener (browser -> Envoy)
      - "9901:9901" # admin UI (http://localhost:9901)
    # launch.yaml routes to host.docker.internal:50051 (the freebusy gRPC
    # backend running on the host). Docker Desktop resolves this automatically;
    # this mapping makes it work on plain Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9901/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
